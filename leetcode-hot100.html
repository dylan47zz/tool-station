.template-header .title{font-size:16px;font-weight:600;color:var(--accent)}

.back-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:50%;color:var(--text);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:200;transition:all .2s}

<script>
const categoriesData = [{"category": "信息的前向流动 (动态规划)", "categoryEssence": "所有动态规划的本质：将大问题分解为有序的子问题，利用信息从前到后的单向流动，避免重复计算。", "template": {"title": "DP统一框架：状态 → 转移 → 初始化", "explain": "<strong>三步走</strong>：<br>• <strong>定义状态</strong>：dp[i]代表什么？需要几个维度？<br>• <strong>状态转移</strong>：dp[i]如何从子问题推导？<br>• <strong>初始化+遍历顺序</strong>：base case是什么？遍历顺序保证依赖已计算？<br><br><strong>常见子类型</strong>：线性DP、背包（0-1/完全）、LIS/LCS、区间DP、树形DP", "code": "def dp_framework(items):\n    n = len(items)\n    dp = [初始值] * (n + 1)\n    dp[0] = base_case\n    for i in range(1, n + 1):\n        for choice in all_choices:\n            dp[i] = 最优(dp[i], dp[前置状态] + 代价)\n    return dp[n]"}, "problems": [{"id": 70, "name": "爬楼梯", "difficulty": "Easy", "insights": ["到达第n阶只能从n-1或n-2来，所以f(n)=f(n-1)+f(n-2)", "本质就是斐波那契：每步选1或2，走法数=前两步走法之和", "为什么是前两步而非更多：一步最多跨2阶，更早的状态无法直接到达n", "与爬楼梯同构：都是计数型DP问题，转移方程完全一致", "空间优化：只需要前两个值，不需要整个数组"], "templateCode": "def climbStairs(self, n):\n    if n <= 2:\n        return n\n    dp = [0] * (n + 1)\n    dp[1], dp[2] = 1, 2\n    for i in range(3, n + 1):\n        dp[i] = dp[i - 1] + dp[i - 2]\n    return dp[n]", "optimizedCode": "def climbStairs(self, n):\n    if n <= 2:\n        return n\n    a, b = 1, 2\n    for _ in range(3, n + 1):\n        a, b = b, a + b\n    return b"}, {"id": 198, "name": "打家劫舍", "difficulty": "Medium", "insights": ["相邻不能偷→每个房子只有偷或不偷两种选择", "偷第i家就不能偷i-1，收益=nums[i]+dp[i-2]；不偷则收益=dp[i-1]", "状态转移本质：dp[i]表示前i家最大收益，取max(偷i, 不偷i)", "只需前两个状态，空间可压缩到O(1)"], "templateCode": "def rob(self, nums):\n    n = len(nums)\n    if n == 0:\n        return 0\n    if n == 1:\n        return nums[0]\n    dp = [0] * n\n    dp[0] = nums[0]\n    dp[1] = max(nums[0], nums[1])\n    for i in range(2, n):\n        dp[i] = max(dp[i - 1], dp[i - 2] + nums[i])\n    return dp[-1]", "optimizedCode": "def rob(self, nums):\n    prev2, prev1 = 0, 0\n    for num in nums:\n        prev2, prev1 = prev1, max(prev1, prev2 + num)\n    return prev1"}, {"id": 213, "name": "打家劫舍II", "difficulty": "Medium", "insights": ["环形意味着首尾相邻，不能同时偷第一和最后一间", "拆环为链：不偷第一间→考虑[1:]；不偷最后一间→考虑[:-1]", "两次线性DP取最大值即可覆盖所有合法情况", "本质：首尾只能选其一或都不选，两种线性情况取max"], "templateCode": "def rob(self, nums):\n    def linear_rob(arr):\n        n = len(arr)\n        if n == 0:\n            return 0\n        if n == 1:\n            return arr[0]\n        dp = [0] * n\n        dp[0] = arr[0]\n        dp[1] = max(arr[0], arr[1])\n        for i in range(2, n):\n            dp[i] = max(dp[i - 1], dp[i - 2] + arr[i])\n        return dp[-1]\n    if len(nums) == 1:\n        return nums[0]\n    return max(linear_rob(nums[:-1]), linear_rob(nums[1:]))", "optimizedCode": "def rob(self, nums):\n    def linear_rob(arr):\n        prev2, prev1 = 0, 0\n        for num in arr:\n            prev2, prev1 = prev1, max(prev1, prev2 + num)\n        return prev1\n    if len(nums) == 1:\n        return nums[0]\n    return max(linear_rob(nums[:-1]), linear_rob(nums[1:]))"}, {"id": 337, "name": "打家劫舍III", "difficulty": "Medium", "insights": ["树形结构：偷父节点则子节点不能偷，不偷则子节点可偷可不偷", "每个节点返回两个值：偷该节点的最大值和不偷该节点的最大值", "后序遍历：先算子树结果再决定当前节点，自底向上传递", "为什么不能贪心：局部最优不保证全局最优，子树间有约束传递"], "templateCode": "def rob(self, root):\n    def dfs(node):\n        if not node:\n            return (0, 0)\n        left = dfs(node.left)\n        right = dfs(node.right)\n        # (偷当前, 不偷当前)\n        rob = node.val + left[1] + right[1]\n        not_rob = max(left) + max(right)\n        return (rob, not_rob)\n    return max(dfs(root))", "optimizedCode": "def rob(self, root):\n    # 每个节点返回(偷当前最大值, 不偷当前最大值)\n    def dfs(node):\n        if not node:\n            return (0, 0)\n        left = dfs(node.left)\n        right = dfs(node.right)\n        # 偷当前：子节点都不能偷\n        rob_cur = node.val + left[1] + right[1]\n        # 不偷当前：子节点偷不偷都行，取各自最大\n        not_rob_cur = max(left[0], left[1]) + max(right[0], right[1])\n        return (rob_cur, not_rob_cur)\n    return max(dfs(root))"}, {"id": 322, "name": "零钱兑换", "difficulty": "Medium", "insights": ["完全背包：每种硬币可无限用，求凑出金额的最少硬币数", "dp[i]=凑金额i的最少硬币数，dp[i]=min(dp[i-coin]+1)", "初始化dp[0]=0，其余为inf：表示尚未找到方案", "与01背包区别：内层正序遍历，因为硬币可重复使用"], "templateCode": "def coinChange(self, coins, amount):\n    dp = [float('inf')] * (amount + 1)\n    dp[0] = 0\n    for i in range(1, amount + 1):\n        for coin in coins:\n            if i >= coin:\n                dp[i] = min(dp[i], dp[i - coin] + 1)\n    return dp[amount] if dp[amount] != float('inf') else -1", "optimizedCode": "def coinChange(self, coins, amount):\n    dp = [float('inf')] * (amount + 1)\n    dp[0] = 0\n    # 按硬币外层循环，内层正序=完全背包\n    for coin in coins:\n        for i in range(coin, amount + 1):\n            dp[i] = min(dp[i], dp[i - coin] + 1)\n    return dp[amount] if dp[amount] != float('inf') else -1"}, {"id": 300, "name": "最长递增子序列", "difficulty": "Medium", "insights": ["LIS不是连续子序列，每个位置要检查前面所有比它小的", "dp[i]=以nums[i]结尾的LIS长度，对j<i若nums[j]<nums[i]则dp[i]=max(dp[j]+1)", "O(n²)暴力：每个位置回看所有前置位置", "贪心+二分优化：维护tail数组，tail[i]=长度i+1的LIS最小末尾，二分找插入位"], "templateCode": "def lengthOfLIS(self, nums):\n    n = len(nums)\n    dp = [1] * n\n    for i in range(1, n):\n        for j in range(i):\n            if nums[j] < nums[i]:\n                dp[i] = max(dp[i], dp[j] + 1)\n    return max(dp)", "optimizedCode": "def lengthOfLIS(self, nums):\n    # tail[i]: 长度为i+1的LIS的最小末尾元素\n    import bisect\n    tail = []\n    for num in nums:\n        pos = bisect.bisect_left(tail, num)\n        if pos == len(tail):\n            tail.append(num)\n        else:\n            tail[pos] = num\n    return len(tail)"}, {"id": 139, "name": "单词拆分", "difficulty": "Medium", "insights": ["dp[i]=s[0:i]能否被拆分，检查所有wordDict中是否有单词匹配s[j:i]且dp[j]为True", "本质是分割问题：在每个位置尝试所有可能的分割点", "字典转集合O(1)查找，外层遍历字符串内层查词", "优化：只遍历到最长单词长度即可截断内层循环"], "templateCode": "def wordBreak(self, s, wordDict):\n    word_set = set(wordDict)\n    n = len(s)\n    dp = [False] * (n + 1)\n    dp[0] = True\n    for i in range(1, n + 1):\n        for j in range(i):\n            if dp[j] and s[j:i] in word_set:\n                dp[i] = True\n                break\n    return dp[n]", "optimizedCode": "def wordBreak(self, s, wordDict):\n    word_set = set(wordDict)\n    max_len = max(len(w) for w in word_set) if wordDict else 0\n    n = len(s)\n    dp = [False] * (n + 1)\n    dp[0] = True\n    for i in range(1, n + 1):\n        # 只需检查最长单词长度范围内的分割点\n        for j in range(max(0, i - max_len), i):\n            if dp[j] and s[j:i] in word_set:\n                dp[i] = True\n                break\n    return dp[n]"}, {"id": 152, "name": "乘积最大子数组", "difficulty": "Medium", "insights": ["乘法中负负得正：当前最小值乘负数可能变成最大值", "必须同时维护imax和imin，因为imin遇负数会翻转成imax", "遇到0时乘积归零，需要重新开始计算", "状态转移：imax=max(num, imax*num), imin=min(num, imin*num)"], "templateCode": "def maxProduct(self, nums):\n    n = len(nums)\n    dp_max = [0] * n\n    dp_min = [0] * n\n    dp_max[0] = dp_min[0] = nums[0]\n    res = nums[0]\n    for i in range(1, n):\n        dp_max[i] = max(nums[i], dp_max[i-1] * nums[i], dp_min[i-1] * nums[i])\n        dp_min[i] = min(nums[i], dp_max[i-1] * nums[i], dp_min[i-1] * nums[i])\n        res = max(res, dp_max[i])\n    return res", "optimizedCode": "def maxProduct(self, nums):\n    # 同时维护当前最大和最小，遇负数交换\n    imax = imin = res = nums[0]\n    for i in range(1, len(nums)):\n        if nums[i] < 0:\n            imax, imin = imin, imax\n        imax = max(nums[i], imax * nums[i])\n        imin = min(nums[i], imin * nums[i])\n        res = max(res, imax)\n    return res"}, {"id": 416, "name": "分割等和子集", "difficulty": "Medium", "insights": ["总和为奇数时无法均分为两个整数，直接返回False", "转化为01背包：能否从数组中选出若干数使和=total/2", "dp[j]=能否凑出和j，倒序遍历避免重复选取", "和0/1背包完全同构：每个数选或不选"], "templateCode": "def canPartition(self, nums):\n    total = sum(nums)\n    if total % 2 != 0:\n        return False\n    target = total // 2\n    n = len(nums)\n    dp = [[False] * (target + 1) for _ in range(n + 1)]\n    for i in range(n + 1):\n        dp[i][0] = True\n    for i in range(1, n + 1):\n        for j in range(1, target + 1):\n            if j >= nums[i-1]:\n                dp[i][j] = dp[i-1][j] or dp[i-1][j-nums[i-1]]\n            else:\n                dp[i][j] = dp[i-1][j]\n    return dp[n][target]", "optimizedCode": "def canPartition(self, nums):\n    total = sum(nums)\n    if total % 2 != 0:\n        return False\n    target = total // 2\n    dp = [False] * (target + 1)\n    dp[0] = True\n    # 01背包：倒序遍历避免重复选\n    for num in nums:\n        for j in range(target, num - 1, -1):\n            dp[j] = dp[j] or dp[j - num]\n    return dp[target]"}, {"id": 72, "name": "编辑距离", "difficulty": "Hard", "insights": ["dp[i][j]=word1前i个字符变成word2前j个字符的最少操作数", "三种操作对应三种转移：删dp[i-1][j]+1, 插dp[i][j-1]+1, 替dp[i-1][j-1]+1", "字符相同时无需操作：dp[i][j]=dp[i-1][j-1]", "本质是找两个序列的最短对齐路径，类似LCS的对角线移动"], "templateCode": "def minDistance(self, word1, word2):\n    m, n = len(word1), len(word2)\n    dp = [[0] * (n + 1) for _ in range(m + 1)]\n    for i in range(m + 1):\n        dp[i][0] = i\n    for j in range(n + 1):\n        dp[0][j] = j\n    for i in range(1, m + 1):\n        for j in range(1, n + 1):\n            if word1[i-1] == word2[j-1]:\n                dp[i][j] = dp[i-1][j-1]\n            else:\n                dp[i][j] = min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]) + 1\n    return dp[m][n]", "optimizedCode": "def minDistance(self, word1, word2):\n    m, n = len(word1), len(word2)\n    # 只保留两行，空间O(n)\n    prev = list(range(n + 1))\n    for i in range(1, m + 1):\n        curr = [i] + [0] * n\n        for j in range(1, n + 1):\n            if word1[i-1] == word2[j-1]:\n                curr[j] = prev[j-1]\n            else:\n                curr[j] = min(prev[j], curr[j-1], prev[j-1]) + 1\n        prev = curr\n    return prev[n]"}, {"id": 5, "name": "最长回文子串", "difficulty": "Medium", "insights": ["回文从中心向两边扩散，中心可以是单字符或双字符", "暴力O(n³)：枚举所有子串再检查；中心扩展O(n²)：只枚举2n-1个中心", "dp[i][j]=s[i:j+1]是否回文，依赖dp[i+1][j-1]", "中心扩展比DP更简洁：从每个中心向两边扩展直到不回文"], "templateCode": "def longestPalindrome(self, s):\n    n = len(s)\n    dp = [[False] * n for _ in range(n)]\n    start, max_len = 0, 1\n    for i in range(n):\n        dp[i][i] = True\n    for length in range(2, n + 1):\n        for i in range(n - length + 1):\n            j = i + length - 1\n            if s[i] == s[j]:\n                if length <= 2 or dp[i+1][j-1]:\n                    dp[i][j] = True\n                    if length > max_len:\n                        start = i\n                        max_len = length\n    return s[start:start+max_len]", "optimizedCode": "def longestPalindrome(self, s):\n    # 中心扩展法，无需额外空间\n    def expand(l, r):\n        while l >= 0 and r < len(s) and s[l] == s[r]:\n            l -= 1\n            r += 1\n        return l + 1, r - l - 1\n    start, max_len = 0, 1\n    for i in range(len(s)):\n        s1, l1 = expand(i, i)      # 奇数长度\n        s2, l2 = expand(i, i + 1)  # 偶数长度\n        if l1 > max_len:\n            start, max_len = s1, l1\n        if l2 > max_len:\n            start, max_len = s2, l2\n    return s[start:start+max_len]"}, {"id": 53, "name": "最大子数组和", "difficulty": "Medium", "insights": ["dp[i]=以nums[i]结尾的最大子数组和", "关键转移：dp[i]=max(nums[i], dp[i-1]+nums[i])，即要么接上前面的要么重新开始", "前面的和如果为负，接上只会更差，不如从当前重新开始", "Kadane算法本质：贪心地丢弃负前缀"], "templateCode": "def maxSubArray(self, nums):\n    n = len(nums)\n    dp = [0] * n\n    dp[0] = nums[0]\n    res = nums[0]\n    for i in range(1, n):\n        dp[i] = max(nums[i], dp[i-1] + nums[i])\n        res = max(res, dp[i])\n    return res", "optimizedCode": "def maxSubArray(self, nums):\n    # Kadane: 贪心丢弃负前缀\n    cur = res = nums[0]\n    for i in range(1, len(nums)):\n        cur = max(nums[i], cur + nums[i])\n        res = max(res, cur)\n    return res"}, {"id": 64, "name": "最小路径和", "difficulty": "Medium", "insights": ["只能向下或向右走，到达(i,j)只从(i-1,j)或(i,j-1)来", "dp[i][j]=grid[i][j]+min(dp[i-1][j], dp[i][j-1])", "第一行和第一列只有一种走法，需要单独初始化", "可以在原grid上原地修改，无需额外空间"], "templateCode": "def minPathSum(self, grid):\n    m, n = len(grid), len(grid[0])\n    dp = [[0] * n for _ in range(m)]\n    dp[0][0] = grid[0][0]\n    for i in range(1, m):\n        dp[i][0] = dp[i-1][0] + grid[i][0]\n    for j in range(1, n):\n        dp[0][j] = dp[0][j-1] + grid[0][j]\n    for i in range(1, m):\n        for j in range(1, n):\n            dp[i][j] = grid[i][j] + min(dp[i-1][j], dp[i][j-1])\n    return dp[m-1][n-1]", "optimizedCode": "def minPathSum(self, grid):\n    # 原地修改grid，O(1)额外空间\n    m, n = len(grid), len(grid[0])\n    for i in range(1, m):\n        grid[i][0] += grid[i-1][0]\n    for j in range(1, n):\n        grid[0][j] += grid[0][j-1]\n    for i in range(1, m):\n        for j in range(1, n):\n            grid[i][j] += min(grid[i-1][j], grid[i][j-1])\n    return grid[m-1][n-1]"}, {"id": 91, "name": "解码方法", "difficulty": "Medium", "insights": ["每个数字可以单独解码(1-9)或与前面组合解码(10-26)", "dp[i]=s[:i]的解码方法数，和爬楼梯类似但多了合法性约束", "单独解码要求s[i-1]!='0'，组合解码要求10<=两位数<=26", "前导零无法单独解码，必须和前一位组合"], "templateCode": "def numDecodings(self, s):\n    n = len(s)\n    dp = [0] * (n + 1)\n    dp[0] = 1\n    dp[1] = 1 if s[0] != '0' else 0\n    for i in range(2, n + 1):\n        if s[i-1] != '0':\n            dp[i] += dp[i-1]\n        two = int(s[i-2:i])\n        if 10 <= two <= 26:\n            dp[i] += dp[i-2]\n    return dp[n]", "optimizedCode": "def numDecodings(self, s):\n    # 只需前两个状态\n    prev2, prev1 = 1, (1 if s[0] != '0' else 0)\n    for i in range(2, len(s) + 1):\n        cur = 0\n        if s[i-1] != '0':\n            cur += prev1\n        if 10 <= int(s[i-2:i]) <= 26:\n            cur += prev2\n        prev2, prev1 = prev1, cur\n    return prev1"}, {"id": 221, "name": "最大正方形", "difficulty": "Medium", "insights": ["dp[i][j]=以(i,j)为右下角的最大正方形边长", "正方形要求四边等长，dp[i][j]受限于左、上、左上三者的最小值", "转移：dp[i][j]=min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1])+1", "木桶效应：正方形边长由最短的那个邻居决定"], "templateCode": "def maximalSquare(self, matrix):\n    if not matrix:\n        return 0\n    m, n = len(matrix), len(matrix[0])\n    dp = [[0] * (n + 1) for _ in range(m + 1)]\n    max_side = 0\n    for i in range(1, m + 1):\n        for j in range(1, n + 1):\n            if matrix[i-1][j-1] == '1':\n                dp[i][j] = min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]) + 1\n                max_side = max(max_side, dp[i][j])\n    return max_side * max_side", "optimizedCode": "def maximalSquare(self, matrix):\n    if not matrix:\n        return 0\n    n = len(matrix[0])\n    dp = [0] * (n + 1)\n    max_side = 0\n    prev = 0  # dp[i-1][j-1]\n    for i in range(len(matrix)):\n        for j in range(1, n + 1):\n            temp = dp[j]\n            if matrix[i][j-1] == '1':\n                dp[j] = min(dp[j], dp[j-1], prev) + 1\n                max_side = max(max_side, dp[j])\n            else:\n                dp[j] = 0\n            prev = temp\n        prev = 0\n    return max_side * max_side"}, {"id": 279, "name": "完全平方数", "difficulty": "Medium", "insights": ["dp[i]=凑出i的最少完全平方数个数，和零钱兑换同构", "完全平方数就是硬币，面值为1,4,9,16...", "四平方定理：任何自然数最多由4个完全平方数组成，可提前剪枝", "BFS也是好方法：从0开始逐层扩展，第一次到达n的层数即为答案"], "templateCode": "def numSquares(self, n):\n    dp = [float('inf')] * (n + 1)\n    dp[0] = 0\n    squares = [i*i for i in range(1, int(n**0.5) + 1)]\n    for i in range(1, n + 1):\n        for sq in squares:\n            if i >= sq:\n                dp[i] = min(dp[i], dp[i - sq] + 1)\n    return dp[n]", "optimizedCode": "def numSquares(self, n):\n    # BFS：第一次到达n的层数即为最少个数\n    from collections import deque\n    squares = [i*i for i in range(1, int(n**0.5) + 1)]\n    visited = set([0])\n    queue = deque([(0, 0)])\n    while queue:\n        cur, level = queue.popleft()\n        for sq in squares:\n            nxt = cur + sq\n            if nxt == n:\n                return level + 1\n            if nxt < n and nxt not in visited:\n                visited.add(nxt)\n                queue.append((nxt, level + 1))\n    return n"}, {"id": 10, "name": "正则表达式匹配", "difficulty": "Hard", "insights": ["'*'匹配零个或多个前一个字符，核心是处理'*'的零次和多次匹配", "dp[i][j]=s前i个字符是否匹配p前j个字符", "p[j-1]='*'时：零次匹配dp[i][j-2]，或多次匹配dp[i-1][j]且s[i-1]匹配p[j-2]", "'.'匹配任意单字符，' *'的零次匹配相当于消去前一个字符"], "templateCode": "def isMatch(self, s, p):\n    m, n = len(s), len(p)\n    dp = [[False] * (n + 1) for _ in range(m + 1)]\n    dp[0][0] = True\n    for j in range(2, n + 1):\n        if p[j-1] == '*':\n            dp[0][j] = dp[0][j-2]\n    for i in range(1, m + 1):\n        for j in range(1, n + 1):\n            if p[j-1] == '*':\n                dp[i][j] = dp[i][j-2]\n                if p[j-2] == '.' or p[j-2] == s[i-1]:\n                    dp[i][j] = dp[i][j] or dp[i-1][j]\n            elif p[j-1] == '.' or p[j-1] == s[i-1]:\n                dp[i][j] = dp[i-1][j-1]\n    return dp[m][n]", "optimizedCode": "def isMatch(self, s, p):\n    # 空间优化：两行滚动\n    m, n = len(s), len(p)\n    prev = [False] * (n + 1)\n    prev[0] = True\n    for j in range(2, n + 1):\n        if p[j-1] == '*':\n            prev[j] = prev[j-2]\n    for i in range(1, m + 1):\n        curr = [False] * (n + 1)\n        for j in range(1, n + 1):\n            if p[j-1] == '*':\n                curr[j] = curr[j-2]\n                if p[j-2] == '.' or p[j-2] == s[i-1]:\n                    curr[j] = curr[j] or prev[j]\n            elif p[j-1] == '.' or p[j-1] == s[i-1]:\n                curr[j] = prev[j-1]\n        prev = curr\n    return prev[n]"}, {"id": 32, "name": "最长有效括号", "difficulty": "Hard", "insights": ["dp[i]=以s[i]结尾的最长有效括号长度", "'()'直接匹配：dp[i]=dp[i-2]+2", "')'前是')'：如果s[i-dp[i-1]-1]='('则匹配，长度=dp[i-1]+2+dp[i-dp[i-1]-2]", "栈方法更直观：存下标，匹配时计算距离栈顶前一个位置的距离", "本质：有效括号必然以')'结尾，只需考虑')'的情况"], "templateCode": "def longestValidParentheses(self, s):\n    n = len(s)\n    dp = [0] * n\n    res = 0\n    for i in range(1, n):\n        if s[i] == ')':\n            if s[i-1] == '(':\n                dp[i] = (dp[i-2] if i >= 2 else 0) + 2\n            elif i - dp[i-1] - 1 >= 0 and s[i-dp[i-1]-1] == '(':\n                dp[i] = dp[i-1] + 2 + (dp[i-dp[i-1]-2] if i-dp[i-1]-2 >= 0 else 0)\n            res = max(res, dp[i])\n    return res", "optimizedCode": "def longestValidParentheses(self, s):\n    # 栈方法：存下标，匹配时算距离\n    stack = [-1]\n    res = 0\n    for i, ch in enumerate(s):\n        if ch == '(':\n            stack.append(i)\n        else:\n            stack.pop()\n            if not stack:\n                stack.append(i)\n            else:\n                res = max(res, i - stack[-1])\n    return res"}, {"id": 312, "name": "戳气球", "difficulty": "Hard", "insights": ["正难则反：戳破=最后剩下的，改为考虑最后戳哪个", "dp[i][j]=开区间(i,j)内戳破所有气球的最大硬币", "最后戳k：coins=nums[i]*nums[k]*nums[j]+dp[i][k]+dp[k][j]", "区间DP：按区间长度递增计算，保证子区间已算好"], "templateCode": "def maxCoins(self, nums):\n    n = len(nums)\n    arr = [1] + nums + [1]\n    dp = [[0] * (n + 2) for _ in range(n + 2)]\n    for length in range(1, n + 1):\n        for i in range(n + 2 - length - 1):\n            j = i + length + 1\n            for k in range(i + 1, j):\n                dp[i][j] = max(dp[i][j], dp[i][k] + dp[k][j] + arr[i] * arr[k] * arr[j])\n    return dp[0][n + 1]", "optimizedCode": "def maxCoins(self, nums):\n    # 区间DP，按长度递增\n    n = len(nums)\n    arr = [1] + nums + [1]\n    dp = [[0] * (n + 2) for _ in range(n + 2)]\n    for length in range(1, n + 1):\n        for i in range(n - length + 1):\n            j = i + length + 1\n            for k in range(i + 1, j):\n                val = arr[i] * arr[k] * arr[j] + dp[i][k] + dp[k][j]\n                if val > dp[i][j]:\n                    dp[i][j] = val\n    return dp[0][n + 1]"}, {"id": 62, "name": "不同路径", "difficulty": "Medium", "insights": ["到达(i,j)只能从上方或左方来，dp[i][j]=dp[i-1][j]+dp[i][j-1]", "本质是组合数学：从(m+n-2)步中选(m-1)步向下", "与爬楼梯问题同构：都是计数型DP，转移方程结构一致", "第一行和第一列只有一种走法，初始化为1"], "templateCode": "def uniquePaths(self, m, n):\n    dp = [[1] * n for _ in range(m)]\n    for i in range(1, m):\n        for j in range(1, n):\n            dp[i][j] = dp[i-1][j] + dp[i][j-1]\n    return dp[m-1][n-1]", "optimizedCode": "def uniquePaths(self, m, n):\n    # 组合数C(m+n-2, m-1)\n    from math import comb\n    return comb(m + n - 2, m - 1)"}]}, {"category": "区间的增量维护 (滑动窗口)", "categoryEssence": "维护一个满足约束的窗口[left, right)，right扩张探索，left收缩恢复约束。", "template": {"title": "滑动窗口统一框架", "explain": "<strong>四种变体</strong>：<br>• <strong>最小窗口</strong>：满足约束时收缩（while内更新），找最短<br>• <strong>最大窗口</strong>：违反约束时收缩（while后更新），找最长<br>• <strong>计数窗口</strong>：恰好K = atMost(K) - atMost(K-1)<br>• <strong>定长窗口</strong>：固定k滑动，单调队列维护最值<br><br><strong>优化路径</strong>：Counter→int/set；遍历比对→valid计数O(1)；定长最值→单调队列", "code": "def slidingWindow(s):\n    window = 用合适数据结构记录窗口\n    left = 0\n    for right in range(len(s)):\n        window.add(s[right])\n        while shrink_condition:\n            window.remove(s[left])\n            left += 1\n    return ans"}, "problems": [{"id": 3, "name": "无重复字符的最长子串", "difficulty": "Medium", "insights": ["滑动窗口维护无重复子串，右指针扩展遇到重复则左指针收缩", "用字典记录字符最新位置，直接跳过而非逐个移动左指针", "窗口内无重复=每个字符最多出现一次", "本质是寻找最长的无重复字符连续区间"], "templateCode": "def lengthOfLongestSubstring(self, s):\n    from collections import defaultdict\n    count = defaultdict(int)\n    left = 0\n    res = 0\n    for right, ch in enumerate(s):\n        count[ch] += 1\n        while count[ch] > 1:\n            count[s[left]] -= 1\n            left += 1\n        res = max(res, right - left + 1)\n    return res", "optimizedCode": "def lengthOfLongestSubstring(self, s):\n    # 字典存最新下标，左指针直接跳转\n    last = {}\n    left = 0\n    res = 0\n    for right, ch in enumerate(s):\n        if ch in last and last[ch] >= left:\n            left = last[ch] + 1\n        last[ch] = right\n        res = max(res, right - left + 1)\n    return res"}, {"id": 76, "name": "最小覆盖子串", "difficulty": "Hard", "insights": ["需要包含t所有字符，用Counter记录t的字符频率需求", "窗口扩展时减少需求，收缩时恢复需求，当需求全满足时记录答案", "用formed变量跟踪已满足的字符种类数，避免每次遍历Counter", "双指针滑动窗口：先右扩到满足再左缩到不满足，循环找最小"], "templateCode": "def minWindow(self, s, t):\n    from collections import Counter\n    need = Counter(t)\n    window = Counter()\n    left = 0\n    valid = 0\n    res_start, res_len = 0, float('inf')\n    for right, ch in enumerate(s):\n        window[ch] += 1\n        if window[ch] == need[ch]:\n            valid += 1\n        while valid == len(need):\n            if right - left + 1 < res_len:\n                res_start, res_len = left, right - left + 1\n            window[s[left]] -= 1\n            if window[s[left]] < need[s[left]]:\n                valid -= 1\n            left += 1\n    return s[res_start:res_start+res_len] if res_len != float('inf') else ''", "optimizedCode": "def minWindow(self, s, t):\n    from collections import Counter\n    need = Counter(t)\n    missing = len(t)\n    left = 0\n    res_start, res_len = 0, float('inf')\n    for right, ch in enumerate(s):\n        if need[ch] > 0:\n            missing -= 1\n        need[ch] -= 1\n        while missing == 0:\n            if right - left + 1 < res_len:\n                res_start, res_len = left, right - left + 1\n            need[s[left]] += 1\n            if need[s[left]] > 0:\n                missing += 1\n            left += 1\n    return s[res_start:res_start+res_len] if res_len != float('inf') else ''"}, {"id": 438, "name": "找到字符串中所有字母异位词", "difficulty": "Medium", "insights": ["异位词=字符频率完全相同，用Counter比较", "固定长度窗口=p的长度，滑动时移除左端加入右端", "维护一个diff计数器，当diff=0时窗口即为异位词", "优化：用数组代替Counter，用match_count代替全比较"], "templateCode": "def findAnagrams(self, s, p):\n    from collections import Counter\n    need = Counter(p)\n    window = Counter()\n    left = 0\n    res = []\n    for right, ch in enumerate(s):\n        window[ch] += 1\n        if right - left + 1 > len(p):\n            window[s[left]] -= 1\n            if window[s[left]] == 0:\n                del window[s[left]]\n            left += 1\n        if window == need:\n            res.append(left)\n    return res", "optimizedCode": "def findAnagrams(self, s, p):\n    # 数组计数+匹配计数，O(1)判断异位词\n    need = [0] * 26\n    for ch in p:\n        need[ord(ch) - 97] += 1\n    window = [0] * 26\n    left = 0\n    match = 0\n    res = []\n    for right, ch in enumerate(s):\n        idx = ord(ch) - 97\n        window[idx] += 1\n        if window[idx] == need[idx]:\n            match += 1\n        elif window[idx] == need[idx] + 1:\n            match -= 1\n        if right - left + 1 > len(p):\n            idx2 = ord(s[left]) - 97\n            if window[idx2] == need[idx2]:\n                match -= 1\n            elif window[idx2] == need[idx2] + 1:\n                match += 1\n            window[idx2] -= 1\n            left += 1\n        if match == 26:\n            res.append(left)\n    return res"}, {"id": 239, "name": "滑动窗口最大值", "difficulty": "Hard", "insights": ["需要O(1)获取窗口最大值，普通数据结构做不到", "单调双端队列：队列保持递减，队首始终是当前窗口最大值", "新元素入队时弹出所有比它小的，因为它们不可能成为后续窗口的最大值", "队首过期（下标超出窗口）时弹出"], "templateCode": "def maxSlidingWindow(self, nums, k):\n    from collections import deque\n    res = []\n    for i in range(len(nums)):\n        # 暴力：每个窗口遍历求最大\n        if i >= k - 1:\n            res.append(max(nums[i-k+1:i+1]))\n    return res", "optimizedCode": "def maxSlidingWindow(self, nums, k):\n    from collections import deque\n    # 单调递减双端队列，存下标\n    dq = deque()\n    res = []\n    for i, num in enumerate(nums):\n        # 弹出比当前小的，它们不可能成为最大值\n        while dq and nums[dq[-1]] < num:\n            dq.pop()\n        dq.append(i)\n        # 队首过期则弹出\n        if dq[0] <= i - k:\n            dq.popleft()\n        if i >= k - 1:\n            res.append(nums[dq[0]])\n    return res"}, {"id": 567, "name": "字符串的排列", "difficulty": "Medium", "insights": ["s2是否包含s1的排列=是否存在长度为len(s1)的窗口字符频率等于s1", "和438异位词问题完全同构，可用相同的滑动窗口方法", "固定窗口大小滑动，维护字符频率匹配状态", "优化：用计数器差值而非两个Counter比较"], "templateCode": "def checkInclusion(self, s1, s2):\n    from collections import Counter\n    need = Counter(s1)\n    window = Counter()\n    left = 0\n    for right, ch in enumerate(s2):\n        window[ch] += 1\n        if right - left + 1 > len(s1):\n            window[s[left]] -= 1\n            if window[s[left]] == 0:\n                del window[s[left]]\n            left += 1\n        if window == need:\n            return True\n    return False", "optimizedCode": "def checkInclusion(self, s1, s2):\n    # 数组差值法\n    diff = [0] * 26\n    for ch in s1:\n        diff[ord(ch) - 97] -= 1\n    left = 0\n    for right, ch in enumerate(s2):\n        diff[ord(ch) - 97] += 1\n        if right - left + 1 > len(s1):\n            diff[ord(s2[left]) - 97] -= 1\n            left += 1\n        if right - left + 1 == len(s1) and all(d == 0 for d in diff):\n            return True\n    return False"}]}, {"category": "对称与夹逼 (双指针)", "categoryEssence": "两个指针从不同方向/速度遍历，利用有序性或对称性每次排除一部分解空间。", "template": {"title": "双指针统一框架", "explain": "<strong>模式</strong>：<br>• <strong>对撞指针</strong>：两端向中间夹逼（有序数组两数之和、容器盛水）<br>• <strong>快慢指针</strong>：同向不同速（链表环、删除倒数第N个）<br>• <strong>滑动窗口</strong>：同向维护区间<br><br><strong>关键</strong>：每次移动指针时，确定哪一侧移动能严格缩小搜索空间", "code": "def two_pointer(arr):\n    left, right = 0, len(arr) - 1\n    while left < right:\n        if 满足条件(arr[left], arr[right]):\n            记录答案()\n        if 应该移动左指针:\n            left += 1\n        else:\n            right -= 1"}, "problems": [{"id": 11, "name": "盛最多水的容器", "difficulty": "Medium", "insights": ["面积=宽×min(左高,右高)，宽大时移动矮边可能增大面积", "移动高边一定不会更好：宽变小且高度受限于矮边", "贪心策略：双指针从两端向内，每次移动较矮的那个", "正确性：每次排除了不可能更优的解"], "templateCode": "def maxArea(self, height):\n    n = len(height)\n    res = 0\n    for i in range(n):\n        for j in range(i + 1, n):\n            res = max(res, (j - i) * min(height[i], height[j]))\n    return res", "optimizedCode": "def maxArea(self, height):\n    # 双指针：移动矮边\n    left, right = 0, len(height) - 1\n    res = 0\n    while left < right:\n        res = max(res, (right - left) * min(height[left], height[right]))\n        if height[left] < height[right]:\n            left += 1\n        else:\n            right -= 1\n    return res"}, {"id": 15, "name": "三数之和", "difficulty": "Medium", "insights": ["排序后可固定一个数，问题转化为两数之和=目标值", "双指针找两数之和：左小右大，和偏大则右移右指针", "去重关键：排序后跳过相同元素避免重复三元组", "为什么不用哈希：去重逻辑复杂且排序后双指针更高效"], "templateCode": "def threeSum(self, nums):\n    res = []\n    n = len(nums)\n    for i in range(n):\n        for j in range(i + 1, n):\n            for k in range(j + 1, n):\n                if nums[i] + nums[j] + nums[k] == 0:\n                    triplet = sorted([nums[i], nums[j], nums[k]])\n                    if triplet not in res:\n                        res.append(triplet)\n    return res", "optimizedCode": "def threeSum(self, nums):\n    nums.sort()\n    res = []\n    n = len(nums)\n    for i in range(n - 2):\n        if i > 0 and nums[i] == nums[i-1]:\n            continue\n        left, right = i + 1, n - 1\n        while left < right:\n            s = nums[i] + nums[left] + nums[right]\n            if s < 0:\n                left += 1\n            elif s > 0:\n                right -= 1\n            else:\n                res.append([nums[i], nums[left], nums[right]])\n                while left < right and nums[left] == nums[left+1]:\n                    left += 1\n                while left < right and nums[right] == nums[right-1]:\n                    right -= 1\n                left += 1\n                right -= 1\n    return res"}, {"id": 42, "name": "接雨水", "difficulty": "Hard", "insights": ["每列能接的雨水=min(左最高,右最高)-当前高度", "双指针：左右两侧向内，矮侧的左/右最高就是该侧的全局最高", "不需要同时知道左右最高：矮侧的最高值一定决定该位置的水位", "本质：木桶效应，水位由较矮的一侧决定"], "templateCode": "def trap(self, height):\n    n = len(height)\n    res = 0\n    for i in range(n):\n        left_max = max(height[:i+1])\n        right_max = max(height[i:])\n        res += min(left_max, right_max) - height[i]\n    return res", "optimizedCode": "def trap(self, height):\n    # 双指针O(n)O(1)\n    left, right = 0, len(height) - 1\n    left_max = right_max = 0\n    res = 0\n    while left < right:\n        if height[left] < height[right]:\n            left_max = max(left_max, height[left])\n            res += left_max - height[left]\n            left += 1\n        else:\n            right_max = max(right_max, height[right])\n            res += right_max - height[right]\n            right -= 1\n    return res"}, {"id": 283, "name": "移动零", "difficulty": "Easy", "insights": ["非零元素要保持相对顺序→快慢指针：快指针找非零，慢指针标记放置位置", "本质是两次遍历的合并：先移非零再补零", "交换而非覆盖：一次遍历同时完成移动和置零", "慢指针始终指向第一个零的位置（或已排好的末尾）"], "templateCode": "def moveZeroes(self, nums):\n    nonzero = [x for x in nums if x != 0]\n    zero_count = len(nums) - len(nonzero)\n    for i in range(len(nonzero)):\n        nums[i] = nonzero[i]\n    for i in range(len(nonzero), len(nums)):\n        nums[i] = 0", "optimizedCode": "def moveZeroes(self, nums):\n    # 快慢指针原地交换\n    slow = 0\n    for fast in range(len(nums)):\n        if nums[fast] != 0:\n            nums[slow], nums[fast] = nums[fast], nums[slow]\n            slow += 1"}, {"id": 26, "name": "删除有序数组中的重复项", "difficulty": "Easy", "insights": ["有序数组重复元素一定相邻，快慢指针天然适合", "慢指针指向已去重部分的末尾，快指针找下一个不同元素", "有序性是关键：无序的话不能只比较相邻", "快慢指针本质是保留需要的、跳过不需要的"], "templateCode": "def removeDuplicates(self, nums):\n    if not nums:\n        return 0\n    res = []\n    for num in nums:\n        if not res or num != res[-1]:\n            res.append(num)\n    for i in range(len(res)):\n        nums[i] = res[i]\n    return len(res)", "optimizedCode": "def removeDuplicates(self, nums):\n    if not nums:\n        return 0\n    slow = 0\n    for fast in range(1, len(nums)):\n        if nums[fast] != nums[slow]:\n            slow += 1\n            nums[slow] = nums[fast]\n    return slow + 1"}, {"id": 27, "name": "移除元素", "difficulty": "Easy", "insights": ["原地移除=把保留的元素前移覆盖", "快指针遍历，遇到不等于val的就放到慢指针位置", "和283移动零同构：val就是零，非val就是非零", "覆盖而非删除：数组大小不变，返回新长度即可"], "templateCode": "def removeElement(self, nums, val):\n    res = [x for x in nums if x != val]\n    for i in range(len(res)):\n        nums[i] = res[i]\n    return len(res)", "optimizedCode": "def removeElement(self, nums, val):\n    # 快慢指针覆盖\n    slow = 0\n    for fast in range(len(nums)):\n        if nums[fast] != val:\n            nums[slow] = nums[fast]\n            slow += 1\n    return slow"}, {"id": 167, "name": "两数之和II", "difficulty": "Medium", "insights": ["有序数组→双指针从两端向内收敛", "和偏大则右指针左移，和偏小则左指针右移", "有序性保证：每次移动能确定排除一部分不可能的解", "与无序版两数之和的区别：有序使得双指针可行"], "templateCode": "def twoSum(self, numbers, target):\n    n = len(numbers)\n    for i in range(n):\n        for j in range(i + 1, n):\n            if numbers[i] + numbers[j] == target:\n                return [i + 1, j + 1]\n    return []", "optimizedCode": "def twoSum(self, numbers, target):\n    # 有序数组双指针\n    left, right = 0, len(numbers) - 1\n    while left < right:\n        s = numbers[left] + numbers[right]\n        if s == target:\n            return [left + 1, right + 1]\n        elif s < target:\n            left += 1\n        else:\n            right -= 1\n    return []"}]}, {"category": "单调性 (单调栈/队列)", "categoryEssence": "维护单调序列——新元素来时弹出违反单调性的旧元素，弹出的瞬间就是答案的计算时刻。", "template": {"title": "单调栈/队列统一框架", "explain": "<strong>单调栈</strong>：找每个元素左右第一个比它大/小的元素<br>• 递减栈：找下一个更大元素<br>• 递增栈：找下一个更小元素<br><br><strong>单调队列</strong>：滑动窗口最值<br>• 递减队列：窗口最大值<br>• 递增队列：窗口最小值", "code": "def next_greater(nums):\n    stack = []\n    res = [-1] * len(nums)\n    for i, num in enumerate(nums):\n        while stack and nums[stack[-1]] < num:\n            res[stack.pop()] = num\n        stack.append(i)\n    return res"}, "problems": [{"id": 84, "name": "柱状图中最大的矩形", "difficulty": "Hard", "insights": ["矩形面积=高×宽，高由最矮柱子决定，宽是扩展范围", "对每根柱子找左右第一个比它矮的，之间就是它作为高的最大宽度", "单调递增栈：遇到更矮的柱子时，弹出栈中比它高的柱子并计算面积", "首尾补零：确保所有柱子都能被弹出计算"], "templateCode": "def largestRectangleArea(self, heights):\n    n = len(heights)\n    res = 0\n    for i in range(n):\n        left = i\n        while left > 0 and heights[left-1] >= heights[i]:\n            left -= 1\n        right = i\n        while right < n - 1 and heights[right+1] >= heights[i]:\n            right += 1\n        res = max(res, heights[i] * (right - left + 1))\n    return res", "optimizedCode": "def largestRectangleArea(self, heights):\n    # 单调递增栈，首尾补0\n    heights = [0] + heights + [0]\n    stack = [0]\n    res = 0\n    for i in range(1, len(heights)):\n        while heights[i] < heights[stack[-1]]:\n            h = heights[stack.pop()]\n            w = i - stack[-1] - 1\n            res = max(res, h * w)\n        stack.append(i)\n    return res"}, {"id": 85, "name": "最大矩形", "difficulty": "Hard", "insights": ["逐行转化为柱状图问题：每列的连续1的个数就是柱子高度", "转化后完全等价于LC84柱状图中最大矩形", "heights[j]=当前行是1则+1否则归零", "逐行处理，每行用单调栈O(n)求最大矩形"], "templateCode": "def maximalRectangle(self, matrix):\n    if not matrix:\n        return 0\n    m, n = len(matrix), len(matrix[0])\n    heights = [0] * n\n    res = 0\n    for i in range(m):\n        for j in range(n):\n            heights[j] = heights[j] + 1 if matrix[i][j] == '1' else 0\n        # 暴力求每行最大矩形\n        for j in range(n):\n            h = heights[j]\n            left = right = j\n            while left > 0 and heights[left-1] >= h:\n                left -= 1\n            while right < n - 1 and heights[right+1] >= h:\n                right += 1\n            res = max(res, h * (right - left + 1))\n    return res", "optimizedCode": "def maximalRectangle(self, matrix):\n    if not matrix:\n        return 0\n    n = len(matrix[0])\n    heights = [0] * n\n    res = 0\n    for row in matrix:\n        for j in range(n):\n            heights[j] = heights[j] + 1 if row[j] == '1' else 0\n        # LC84单调栈\n        heights2 = [0] + heights + [0]\n        stack = [0]\n        for i in range(1, len(heights2)):\n            while heights2[i] < heights2[stack[-1]]:\n                h = heights2[stack.pop()]\n                w = i - stack[-1] - 1\n                res = max(res, h * w)\n            stack.append(i)\n    return res"}, {"id": 155, "name": "最小栈", "difficulty": "中等", "insights": ["核心矛盾：栈只能访问栈顶，但getMin需要全局最小值", "辅助栈同步记录：每次push/pop时，辅助栈同步记录当前时刻的最小值", "为什么不能只记一个全局min：pop可能移除当前最小值，需要回退到前一个最小值", "空间换时间：辅助栈让getMin变成O(1)，代价是O(n)额外空间"], "templateCode": "class MinStack:\n    def __init__(self):\n        self.stack = []\n        self.min_stack = []\n\n    def push(self, val: int) -> None:\n        # 模板：辅助栈同步存当前最小值\n        self.stack.append(val)\n        if not self.min_stack or val <= self.min_stack[-1]:\n            self.min_stack.append(val)\n\n    def pop(self) -> None:\n        if self.stack.pop() == self.min_stack[-1]:\n            self.min_stack.pop()\n\n    def top(self) -> int:\n        return self.stack[-1]\n\n    def getMin(self) -> int:\n        return self.min_stack[-1]", "optimizedCode": "class MinStack:\n    def __init__(self):\n        self.stack = []\n\n    def push(self, val: int) -> None:\n        # 优化：单栈存元组(val, current_min)，省去辅助栈\n        if not self.stack:\n            self.stack.append((val, val))\n        else:\n            self.stack.append((val, min(val, self.stack[-1][1])))\n\n    def pop(self) -> None:\n        self.stack.pop()\n\n    def top(self) -> int:\n        return self.stack[-1][0]\n\n    def getMin(self) -> int:\n        return self.stack[-1][1]"}, {"id": 739, "name": "每日温度", "difficulty": "Medium", "insights": ["对每个位置找右边第一个更大的，单调递减栈天然适合", "栈中存下标，遇到更大温度时弹出栈中所有更小的并计算距离", "为什么是递减栈：栈顶是最小的，新元素比栈顶大则找到答案", "本质是维护一个等待升温的元素序列"], "templateCode": "def dailyTemperatures(self, temperatures):\n    n = len(temperatures)\n    res = [0] * n\n    for i in range(n):\n        for j in range(i + 1, n):\n            if temperatures[j] > temperatures[i]:\n                res[i] = j - i\n                break\n    return res", "optimizedCode": "def dailyTemperatures(self, temperatures):\n    # 单调递减栈\n    n = len(temperatures)\n    res = [0] * n\n    stack = []\n    for i, t in enumerate(temperatures):\n        while stack and t > temperatures[stack[-1]]:\n            prev = stack.pop()\n            res[prev] = i - prev\n        stack.append(i)\n    return res"}, {"id": 496, "name": "下一个更大元素I", "difficulty": "Easy", "insights": ["nums1是nums2的子集，只需对nums2预处理下一个更大元素", "单调栈处理nums2：和739每日温度同构", "用哈希表存储结果，对nums1查表即可", "子集查询的通用技巧：预处理全集，子集查表"], "templateCode": "def nextGreaterElement(self, nums1, nums2):\n    res = []\n    for num in nums1:\n        idx = nums2.index(num)\n        found = -1\n        for j in range(idx + 1, len(nums2)):\n            if nums2[j] > num:\n                found = nums2[j]\n                break\n        res.append(found)\n    return res", "optimizedCode": "def nextGreaterElement(self, nums1, nums2):\n    # 单调栈预处理nums2\n    next_greater = {}\n    stack = []\n    for num in nums2:\n        while stack and num > stack[-1]:\n            next_greater[stack.pop()] = num\n        stack.append(num)\n    return [next_greater.get(n, -1) for n in nums1]"}]}, {"category": "决策树的穷举 (回溯)", "categoryEssence": "在决策树上做DFS——每层做一个选择，走到底则回退（撤销选择），尝试下一个分支。", "template": {"title": "回溯统一框架", "explain": "<strong>三要素</strong>：<br>• <strong>路径</strong>：已做出的选择序列<br>• <strong>选择列表</strong>：当前位置可以做的选择<br>• <strong>结束条件</strong>：到达决策树底层，收集答案<br><br><strong>剪枝</strong>：排序+跳过重复（组合去重）、约束检查（N皇后、括号闭合）", "code": "def backtrack(路径, 选择列表):\n    if 满足结束条件:\n        结果.append(路径[:])\n        return\n    for 选择 in 选择列表:\n        if 剪枝条件(选择):\n            continue\n        路径.add(选择)\n        backtrack(路径, 新选择列表)\n        路径.remove(选择)"}, "problems": [{"id": 46, "name": "全排列", "difficulty": "Medium", "insights": ["排列要求每个元素用一次且考虑顺序，用used数组标记", "回溯框架：选一个元素→递归→撤销选择", "每次从头遍历，跳过已使用的元素", "排列数=n!，每个位置有n-k个选择"], "templateCode": "def permute(self, nums):\n    def backtrack(path, used, res):\n        if len(path) == len(nums):\n            res.append(path[:])\n            return\n        for i in range(len(nums)):\n            if used[i]:\n                continue\n            used[i] = True\n            path.append(nums[i])\n            backtrack(path, used, res)\n            path.pop()\n            used[i] = False\n    res = []\n    backtrack([], [False] * len(nums), res)\n    return res", "optimizedCode": "def permute(self, nums):\n    # 原地交换，无需used数组\n    def backtrack(start):\n        if start == len(nums):\n            res.append(nums[:])\n            return\n        for i in range(start, len(nums)):\n            nums[start], nums[i] = nums[i], nums[start]\n            backtrack(start + 1)\n            nums[start], nums[i] = nums[i], nums[start]\n    res = []\n    backtrack(0)\n    return res"}, {"id": 78, "name": "子集", "difficulty": "Medium", "insights": ["子集问题每个元素选或不选，共2^n个子集", "回溯框架：选当前元素→递归→不选→递归（或用start避免重复）", "每个节点都是合法答案，无需等到叶子才收集", "与排列区别：子集不关心顺序，用start保证不回头"], "templateCode": "def subsets(self, nums):\n    def backtrack(start, path):\n        res.append(path[:])\n        for i in range(start, len(nums)):\n            path.append(nums[i])\n            backtrack(i + 1, path)\n            path.pop()\n    res = []\n    backtrack(0, [])\n    return res", "optimizedCode": "def subsets(self, nums):\n    # 迭代位掩码法\n    res = []\n    n = len(nums)\n    for mask in range(1 << n):\n        subset = []\n        for i in range(n):\n            if mask & (1 << i):\n                subset.append(nums[i])\n        res.append(subset)\n    return res"}, {"id": 39, "name": "组合总和", "difficulty": "Medium", "insights": ["元素可重复使用，递归时start不+1而是仍从i开始", "target减到0时找到一组解，小于0时剪枝", "排序后可提前剪枝：当前数>剩余target则后续更大数也不可能", "与子集区别：有目标和约束，且可重复选"], "templateCode": "def combinationSum(self, candidates, target):\n    def backtrack(start, path, remain):\n        if remain == 0:\n            res.append(path[:])\n            return\n        if remain < 0:\n            return\n        for i in range(start, len(candidates)):\n            path.append(candidates[i])\n            backtrack(i, path, remain - candidates[i])\n            path.pop()\n    res = []\n    backtrack(0, [], target)\n    return res", "optimizedCode": "def combinationSum(self, candidates, target):\n    candidates.sort()\n    def backtrack(start, path, remain):\n        if remain == 0:\n            res.append(path[:])\n            return\n        for i in range(start, len(candidates)):\n            # 排序后提前剪枝\n            if candidates[i] > remain:\n                break\n            path.append(candidates[i])\n            backtrack(i, path, remain - candidates[i])\n            path.pop()\n    res = []\n    backtrack(0, [], target)\n    return res"}, {"id": 22, "name": "括号生成", "difficulty": "Medium", "insights": ["有效括号：左括号数<=n，右括号数<=左括号数", "回溯时两个选择：加左括号（还有剩余）或加右括号（不超过左括号数）", "不需要验证有效性，生成过程保证合法", "本质：受限的排列问题，约束是左右括号的数量关系"], "templateCode": "def generateParenthesis(self, n):\n    def backtrack(path, left, right):\n        if len(path) == 2 * n:\n            res.append(path)\n            return\n        if left < n:\n            backtrack(path + '(', left + 1, right)\n        if right < left:\n            backtrack(path + ')', left, right + 1)\n    res = []\n    backtrack('', 0, 0)\n    return res", "optimizedCode": "def generateParenthesis(self, n):\n    # 用列表代替字符串拼接减少拷贝\n    def backtrack(path, left, right):\n        if len(path) == 2 * n:\n            res.append(''.join(path))\n            return\n        if left < n:\n            path.append('(')\n            backtrack(path, left + 1, right)\n            path.pop()\n        if right < left:\n            path.append(')')\n            backtrack(path, left, right + 1)\n            path.pop()\n    res = []\n    backtrack([], 0, 0)\n    return res"}, {"id": 17, "name": "电话号码的字母组合", "difficulty": "Medium", "insights": ["每个数字对应多个字母，是多重集合的笛卡尔积", "回溯：对每一位数字，尝试其所有字母映射", "本质是多叉树DFS，树的深度=数字个数", "空输入应返回空列表而非含空字符串的列表"], "templateCode": "def letterCombinations(self, digits):\n    if not digits:\n        return []\n    mapping = {'2':'abc','3':'def','4':'ghi','5':'jkl',\n               '6':'mno','7':'pqrs','8':'tuv','9':'wxyz'}\n    def backtrack(idx, path):\n        if idx == len(digits):\n            res.append(path)\n            return\n        for ch in mapping[digits[idx]]:\n            backtrack(idx + 1, path + ch)\n    res = []\n    backtrack(0, '')\n    return res", "optimizedCode": "def letterCombinations(self, digits):\n    if not digits:\n        return []\n    mapping = {'2':'abc','3':'def','4':'ghi','5':'jkl',\n               '6':'mno','7':'pqrs','8':'tuv','9':'wxyz'}\n    # 迭代：逐位扩展结果\n    res = ['']\n    for d in digits:\n        res = [r + ch for r in res for ch in mapping[d]]\n    return res"}, {"id": 79, "name": "单词搜索", "difficulty": "Medium", "insights": ["网格DFS：四个方向搜索，visited标记已访问防回头", "找到即返回True，不需要找所有解", "剪枝优化：当前字符不匹配时立即返回避免无效递归", "回溯关键：DFS后恢复visited状态以便其他路径使用"], "templateCode": "def exist(self, board, word):\n    m, n = len(board), len(board[0])\n    visited = [[False]*n for _ in range(m)]\n    def dfs(i, j, k):\n        if k == len(word):\n            return True\n        if i<0 or i>=m or j<0 or j>=n:\n            return False\n        if visited[i][j] or board[i][j] != word[k]:\n            return False\n        visited[i][j] = True\n        res = dfs(i+1,j,k+1) or dfs(i-1,j,k+1) or dfs(i,j+1,k+1) or dfs(i,j-1,k+1)\n        visited[i][j] = False\n        return res\n    for i in range(m):\n        for j in range(n):\n            if dfs(i, j, 0):\n                return True\n    return False", "optimizedCode": "def exist(self, board, word):\n    m, n = len(board), len(board[0])\n    def dfs(i, j, k):\n        if k == len(word):\n            return True\n        if i<0 or i>=m or j<0 or j>=n or board[i][j] != word[k]:\n            return False\n        # 原地标记，省去visited数组\n        tmp, board[i][j] = board[i][j], '#'\n        res = dfs(i+1,j,k+1) or dfs(i-1,j,k+1) or dfs(i,j+1,k+1) or dfs(i,j-1,k+1)\n        board[i][j] = tmp\n        return res\n    for i in range(m):\n        for j in range(n):\n            if dfs(i, j, 0):\n                return True\n    return False"}, {"id": 51, "name": "N皇后", "difficulty": "Hard", "insights": ["每行放一个皇后，约束：同列、同对角线不能有皇后", "主对角线row-col相同，副对角线row+col相同，用集合O(1)检测", "按行递归，每行选一个合法列位置", "剪枝：列、两对角线三个集合快速判断冲突"], "templateCode": "def solveNQueens(self, n):\n    def backtrack(row, cols, diag1, diag2, board):\n        if row == n:\n            res.append([''.join(r) for r in board])\n            return\n        for col in range(n):\n            if col in cols or row-col in diag1 or row+col in diag2:\n                continue\n            board[row][col] = 'Q'\n            cols.add(col)\n            diag1.add(row-col)\n            diag2.add(row+col)\n            backtrack(row+1, cols, diag1, diag2, board)\n            board[row][col] = '.'\n            cols.remove(col)\n            diag1.remove(row-col)\n            diag2.remove(row+col)\n    res = []\n    backtrack(0, set(), set(), set(), [['.']*n for _ in range(n)])\n    return res", "optimizedCode": "def solveNQueens(self, n):\n    # 位运算优化：用整数位代替集合\n    def backtrack(row, cols, diag1, diag2):\n        if row == n:\n            res.append([''.join(r) for r in board])\n            return\n        # 可用位置：不在冲突列和对角线上\n        available = ((1 << n) - 1) & ~(cols | diag1 | diag2)\n        while available:\n            pos = available & -available  # 取最低位1\n            col = pos.bit_length() - 1\n            board[row][col] = 'Q'\n            backtrack(row+1, cols|pos, (diag1|pos)<<1, (diag2|pos)>>1)\n            board[row][col] = '.'\n            available &= available - 1  # 清除最低位1\n    res = []\n    board = [['.']*n for _ in range(n)]\n    backtrack(0, 0, 0, 0)\n    return res"}, {"id": 77, "name": "组合", "difficulty": "Medium", "insights": ["从1到n选k个数的组合，不重复不回头", "用start保证后面的数比前面大，自然避免重复", "剪枝优化：剩余数不够选时提前终止避免无效递归", "和子集问题同构：子集大小为k的特例"], "templateCode": "def combine(self, n, k):\n    def backtrack(start, path):\n        if len(path) == k:\n            res.append(path[:])\n            return\n        for i in range(start, n + 1):\n            path.append(i)\n            backtrack(i + 1, path)\n            path.pop()\n    res = []\n    backtrack(1, [])\n    return res", "optimizedCode": "def combine(self, n, k):\n    def backtrack(start, path):\n        if len(path) == k:\n            res.append(path[:])\n            return\n        # 剪枝：还需要need个，i最大为n-need+1\n        need = k - len(path)\n        for i in range(start, n - need + 2):\n            path.append(i)\n            backtrack(i + 1, path)\n            path.pop()\n    res = []\n    backtrack(1, [])\n    return res"}, {"id": 40, "name": "组合总和II", "difficulty": "Medium", "insights": ["每个数只能用一次且结果不能重复，与39的关键区别", "排序+跳过相同元素避免重复：同层相同值跳过", "递归时start+1而非i，保证每个数只用一次", "排序是去重的前提：相同元素相邻才能判断跳过"], "templateCode": "def combinationSum2(self, candidates, target):\n    candidates.sort()\n    def backtrack(start, path, remain):\n        if remain == 0:\n            res.append(path[:])\n            return\n        if remain < 0:\n            return\n        for i in range(start, len(candidates)):\n            if i > start and candidates[i] == candidates[i-1]:\n                continue\n            path.append(candidates[i])\n            backtrack(i + 1, path, remain - candidates[i])\n            path.pop()\n    res = []\n    backtrack(0, [], target)\n    return res", "optimizedCode": "def combinationSum2(self, candidates, target):\n    candidates.sort()\n    def backtrack(start, path, remain):\n        if remain == 0:\n            res.append(path[:])\n            return\n        for i in range(start, len(candidates)):\n            # 剪枝：排序后超出target可直接break\n            if candidates[i] > remain:\n                break\n            # 同层去重：相同值只在第一次选\n            if i > start and candidates[i] == candidates[i-1]:\n                continue\n            path.append(candidates[i])\n            backtrack(i + 1, path, remain - candidates[i])\n            path.pop()\n    res = []\n    backtrack(0, [], target)\n    return res"}, {"id": 47, "name": "全排列II", "difficulty": "Medium", "insights": ["有重复元素，需要去重：排序+used数组+跳过同层重复", "去重条件：!used[i-1]且nums[i]==nums[i-1]时跳过", "为什么看前一个未使用：前一个未用说明同一层已处理过相同值", "本质：相同元素在排列中是等价的，避免生成相同排列"], "templateCode": "def permuteUnique(self, nums):\n    nums.sort()\n    def backtrack(path, used):\n        if len(path) == len(nums):\n            res.append(path[:])\n            return\n        for i in range(len(nums)):\n            if used[i]:\n                continue\n            if i > 0 and nums[i] == nums[i-1] and not used[i-1]:\n                continue\n            used[i] = True\n            path.append(nums[i])\n            backtrack(path, used)\n            path.pop()\n            used[i] = False\n    res = []\n    backtrack([], [False] * len(nums))\n    return res", "optimizedCode": "def permuteUnique(self, nums):\n    nums.sort()\n    def backtrack(path, used):\n        if len(path) == len(nums):\n            res.append(path[:])\n            return\n        for i in range(len(nums)):\n            if used[i]:\n                continue\n            # 同层去重：前一个相同元素未使用说明是同层重复\n            if i > 0 and nums[i] == nums[i-1] and not used[i-1]:\n                continue\n            used[i] = True\n            path.append(nums[i])\n            backtrack(path, used)\n            path.pop()\n            used[i] = False\n    res = []\n    backtrack([], [False] * len(nums))\n    return res"}]}, {"category": "连通性的探索 (图遍历/并查集)", "categoryEssence": "图问题本质是探索连通分量——BFS按层扩展，DFS沿路径深入，并查集用路径压缩维护等价类。", "template": {"title": "BFS/DFS/并查集统一框架", "explain": "<strong>选型依据</strong>：<br>• <strong>BFS</strong>：最短路径（无权图）、层序遍历、拓扑排序<br>• <strong>DFS</strong>：连通分量计数、路径搜索、回溯、检测环<br>• <strong>并查集</strong>：动态连通性、合并集合、最小生成树<br><br><strong>并查集优化</strong>：路径压缩 + 按秩合并，均摊O(α(n))≈O(1)", "code": "from collections import deque\ndef bfs(grid, start):\n    q = deque([start])\n    visited = {start}\n    while q:\n        node = q.popleft()\n        for nb in neighbors(node):\n            if valid(nb) and nb not in visited:\n                visited.add(nb)\n                q.append(nb)"}, "problems": [{"id": 200, "name": "岛屿数量", "difficulty": "Medium", "insights": ["网格即图：每个格子是节点，相邻陆地是边，岛屿=连通分量", "DFS/BFS本质相同：访问过的陆地标记为水，避免重复计数", "并查集视角：每块陆地初始化独立集合，相邻则合并，最终集合数=岛屿数", "标记已访问是关键：不标记会死循环，原地改grid为'0'省O(mn)空间"], "templateCode": "def numIslands(self, grid):\n    if not grid: return 0\n    m, n = len(grid), len(grid[0])\n    visited = [[False]*n for _ in range(m)]\n    count = 0\n    from collections import deque\n    for i in range(m):\n        for j in range(n):\n            if grid[i][j] == '1' and not visited[i][j]:\n                count += 1\n                q = deque([(i,j)])\n                visited[i][j] = True\n                while q:\n                    x, y = q.popleft()\n                    for dx, dy in [(-1,0),(1,0),(0,-1),(0,1)]:\n                        nx, ny = x+dx, y+dy\n                        if 0<=nx<m and 0<=ny<n and grid[nx][ny]=='1' and not visited[nx][ny]:\n                            visited[nx][ny] = True\n                            q.append((nx,ny))\n    return count", "optimizedCode": "def numIslands(self, grid):\n    # 原地修改省去visited数组，DFS栈替代BFS队列\n    if not grid: return 0\n    m, n = len(grid), len(grid[0])\n    def dfs(i, j):\n        if i<0 or i>=m or j<0 or j>=n or grid[i][j]!='1':\n            return\n        grid[i][j] = '0'\n        dfs(i+1,j); dfs(i-1,j); dfs(i,j+1); dfs(i,j-1)\n    count = 0\n    for i in range(m):\n        for j in range(n):\n            if grid[i][j] == '1':\n                count += 1\n                dfs(i, j)\n    return count"}, {"id": 994, "name": "腐烂的橘子", "difficulty": "Medium", "insights": ["多源BFS：所有腐烂橘子同时扩散，每轮=1分钟", "层级BFS定时刻：队列按层处理，每处理完一层时间+1", "终态判定：BFS结束后仍有新鲜橘子则不可能全腐烂", "初始把所有腐烂橘子入队：多起点同时扩展保证最短时间"], "templateCode": "def orangesRotting(self, grid):\n    m, n = len(grid), len(grid[0])\n    from collections import deque\n    q = deque()\n    fresh = 0\n    for i in range(m):\n        for j in range(n):\n            if grid[i][j] == 2: q.append((i,j))\n            elif grid[i][j] == 1: fresh += 1\n    minutes = 0\n    while q and fresh > 0:\n        for _ in range(len(q)):\n            x, y = q.popleft()\n            for dx, dy in [(-1,0),(1,0),(0,-1),(0,1)]:\n                nx, ny = x+dx, y+dy\n                if 0<=nx<m and 0<=ny<n and grid[nx][ny]==1:\n                    grid[nx][ny] = 2\n                    fresh -= 1\n                    q.append((nx,ny))\n        minutes += 1\n    return minutes if fresh == 0 else -1", "optimizedCode": "def orangesRotting(self, grid):\n    # 多源BFS+层级计数，原地修改标记已腐烂\n    m, n = len(grid), len(grid[0])\n    from collections import deque\n    q = deque()\n    fresh = 0\n    for i in range(m):\n        for j in range(n):\n            if grid[i][j] == 2: q.append((i,j,0))\n            elif grid[i][j] == 1: fresh += 1\n    ans = 0\n    while q:\n        x, y, t = q.popleft()\n        ans = max(ans, t)\n        for dx, dy in [(-1,0),(1,0),(0,-1),(0,1)]:\n            nx, ny = x+dx, y+dy\n            if 0<=nx<m and 0<=ny<n and grid[nx][ny]==1:\n                grid[nx][ny] = 2\n                fresh -= 1\n                q.append((nx,ny,t+1))\n    return ans if fresh==0 else -1"}, {"id": 207, "name": "课程表", "difficulty": "Medium", "insights": ["课程=节点，先修=有向边，能修完=有向图无环", "拓扑排序判环：入度0的节点不断移除，若最终访问数<总节点数则有环", "DFS三色标记：0未访问/1访问中/2已完成，遇1=回边=有环", "BFS Kahn算法：队列放所有入度0节点，逐个移除并减邻居入度"], "templateCode": "def canFinish(self, numCourses, prerequisites):\n    from collections import defaultdict, deque\n    graph = defaultdict(list)\n    indeg = [0]*numCourses\n    for c, p in prerequisites:\n        graph[p].append(c)\n        indeg[c] += 1\n    q = deque([i for i in range(numCourses) if indeg[i]==0])\n    count = 0\n    while q:\n        node = q.popleft()\n        count += 1\n        for nb in graph[node]:\n            indeg[nb] -= 1\n            if indeg[nb] == 0:\n                q.append(nb)\n    return count == numCourses", "optimizedCode": "def canFinish(self, numCourses, prerequisites):\n    # DFS三色标记，检测回边即环，无需计算入度\n    graph = [[] for _ in range(numCourses)]\n    for c, p in prerequisites:\n        graph[p].append(c)\n    state = [0]*numCourses\n    def dfs(node):\n        if state[node]==1: return False\n        if state[node]==2: return True\n        state[node] = 1\n        for nb in graph[node]:\n            if not dfs(nb): return False\n        state[node] = 2\n        return True\n    return all(dfs(i) for i in range(numCourses))"}, {"id": 210, "name": "课程表II", "difficulty": "Medium", "insights": ["与207同理：拓扑排序判环+输出顺序", "BFS拓扑序即课程修读顺序：入度0先修，修完解锁后继", "DFS后序逆序=拓扑序：最先完成的课最后修，逆序输出", "有环返回空数组：无法完成全部课程"], "templateCode": "def findOrder(self, numCourses, prerequisites):\n    from collections import defaultdict, deque\n    graph = defaultdict(list)\n    indeg = [0]*numCourses\n    for c, p in prerequisites:\n        graph[p].append(c)\n        indeg[c] += 1\n    q = deque([i for i in range(numCourses) if indeg[i]==0])\n    order = []\n    while q:\n        node = q.popleft()\n        order.append(node)\n        for nb in graph[node]:\n            indeg[nb] -= 1\n            if indeg[nb]==0:\n                q.append(nb)\n    return order if len(order)==numCourses else []", "optimizedCode": "def findOrder(self, numCourses, prerequisites):\n    # DFS后序逆序=拓扑序，一次遍历同时判环+收集顺序\n    graph = [[] for _ in range(numCourses)]\n    for c, p in prerequisites:\n        graph[p].append(c)\n    state = [0]*numCourses\n    order = []\n    def dfs(node):\n        if state[node]==1: return False\n        if state[node]==2: return True\n        state[node] = 1\n        for nb in graph[node]:\n            if not dfs(nb): return False\n        state[node] = 2\n        order.append(node)\n        return True\n    for i in range(numCourses):\n        if not dfs(i): return []\n    return order[::-1]"}, {"id": 133, "name": "克隆图", "difficulty": "Medium", "insights": ["深拷贝=每个节点创建新对象，不能共享引用", "哈希表映射旧→新：防止重复创建同一节点", "BFS/DFS遍历原图：每访问一个邻居就建立边关系", "递归天然DFS：clone一个节点时递归clone其所有邻居"], "templateCode": "def cloneGraph(self, node):\n    if not node: return None\n    from collections import deque\n    visited = {node: Node(node.val)}\n    q = deque([node])\n    while q:\n        cur = q.popleft()\n        for nb in cur.neighbors:\n            if nb not in visited:\n                visited[nb] = Node(nb.val)\n                q.append(nb)\n            visited[cur].neighbors.append(visited[nb])\n    return visited[node]", "optimizedCode": "def cloneGraph(self, node):\n    # DFS递归+字典映射，代码最简洁\n    if not node: return None\n    memo = {}\n    def dfs(n):\n        if n in memo: return memo[n]\n        clone = Node(n.val)\n        memo[n] = clone\n        for nb in n.neighbors:\n            clone.neighbors.append(dfs(nb))\n        return clone\n    return dfs(node)"}, {"id": 130, "name": "被围绕的区域", "difficulty": "Medium", "insights": ["边界'O'及其连通区域不会被围绕：围绕=四周被X包围", "反向思维：从边界O出发标记所有不被包围的O", "标记后遍历：未标记的O→被包围→改X，标记的O保持不变", "并查集做法：边界O统一连虚拟节点，与之同集合的O不被包围"], "templateCode": "def solve(self, board):\n    if not board: return\n    m, n = len(board), len(board[0])\n    from collections import deque\n    q = deque()\n    for i in range(m):\n        for j in [0, n-1]:\n            if board[i][j]=='O': q.append((i,j)); board[i][j]='E'\n    for j in range(n):\n        for i in [0, m-1]:\n            if board[i][j]=='O': q.append((i,j)); board[i][j]='E'\n    while q:\n        x, y = q.popleft()\n        for dx, dy in [(-1,0),(1,0),(0,-1),(0,1)]:\n            nx, ny = x+dx, y+dy\n            if 0<=nx<m and 0<=ny<n and board[nx][ny]=='O':\n                board[nx][ny]='E'\n                q.append((nx,ny))\n    for i in range(m):\n        for j in range(n):\n            if board[i][j]=='O': board[i][j]='X'\n            elif board[i][j]=='E': board[i][j]='O'", "optimizedCode": "def solve(self, board):\n    # 从边界DFS标记不被包围的O为临时符号，最后统一替换\n    if not board: return\n    m, n = len(board), len(board[0])\n    def dfs(i, j):\n        if i<0 or i>=m or j<0 or j>=n or board[i][j]!='O': return\n        board[i][j] = 'T'\n        dfs(i+1,j); dfs(i-1,j); dfs(i,j+1); dfs(i,j-1)\n    for i in range(m):\n        dfs(i,0); dfs(i,n-1)\n    for j in range(n):\n        dfs(0,j); dfs(m-1,j)\n    for i in range(m):\n        for j in range(n):\n            if board[i][j]=='O': board[i][j]='X'\n            elif board[i][j]=='T': board[i][j]='O'"}, {"id": 399, "name": "除法求值", "difficulty": "Medium", "insights": ["除法即带权有向边：a/b=2 → a→b权2，b→a权0.5", "查询=求路径积：从起点到终点的路径上权重相乘", "并查集带权：合并时维护权重关系，find时路径压缩更新权", "无路径=不可达：图中不存在从分子到分母的路径则返回-1"], "templateCode": "def calcEquation(self, equations, values, queries):\n    from collections import defaultdict, deque\n    graph = defaultdict(dict)\n    for (a,b), v in zip(equations, values):\n        graph[a][b] = v\n        graph[b][a] = 1/v\n    def bfs(s, e):\n        if s not in graph or e not in graph: return -1.0\n        if s==e: return 1.0\n        visited = {s}\n        q = deque([(s, 1.0)])\n        while q:\n            node, prod = q.popleft()\n            for nb, w in graph[node].items():\n                if nb in visited: continue\n                if nb==e: return prod*w\n                visited.add(nb)\n                q.append((nb, prod*w))\n        return -1.0\n    return [bfs(s,e) for s,e in queries]", "optimizedCode": "def calcEquation(self, equations, values, queries):\n    # 并查集带权，find时路径压缩同时更新权值\n    parent = {}\n    weight = {}\n    def find(x):\n        if x not in parent:\n            parent[x] = x\n            weight[x] = 1.0\n            return x, 1.0\n        if parent[x]==x: return x, 1.0\n        root, w = find(parent[x])\n        weight[x] *= w\n        parent[x] = root\n        return parent[x], weight[x]\n    def union(a, b, v):\n        ra, wa = find(a); rb, wb = find(b)\n        if ra!=rb:\n            parent[ra] = rb\n            weight[ra] = v * wb / wa\n    for (a,b), v in zip(equations, values):\n        union(a, b, v)\n    res = []\n    for s, e in queries:\n        if s not in parent or e not in parent:\n            res.append(-1.0)\n        else:\n            rs, ws = find(s); re_, we = find(e)\n            res.append(ws/we if rs==re_ else -1.0)\n    return res"}, {"id": 785, "name": "判断二分图", "difficulty": "Medium", "insights": ["二分图=图可二着色：相邻节点必须不同色", "BFS/DFS交替染色：每走一条边换一种颜色，冲突则非二分图", "图不一定连通：每个连通分量都要检查", "无向图双向边：邻接关系是双向的，但染色逻辑不变"], "templateCode": "def isBipartite(self, graph):\n    n = len(graph)\n    color = [0]*n\n    from collections import deque\n    for i in range(n):\n        if color[i]!=0: continue\n        color[i] = 1\n        q = deque([i])\n        while q:\n            node = q.popleft()\n            for nb in graph[node]:\n                if color[nb]==color[node]: return False\n                if color[nb]==0:\n                    color[nb] = -color[node]\n                    q.append(nb)\n    return True", "optimizedCode": "def isBipartite(self, graph):\n    # DFS交替染色，遇到同色邻居立即返回\n    color = [0]*len(graph)\n    def dfs(node, c):\n        if color[node]!=0:\n            return color[node]==c\n        color[node] = c\n        return all(dfs(nb, -c) for nb in graph[node])\n    return all(color[i]!=0 or dfs(i,1) for i in range(len(graph)))"}, {"id": 208, "name": "实现Trie前缀树", "difficulty": "Medium", "insights": ["多叉树每个节点=一个字符状态：26个子节点对应26字母", "从根到某节点的路径=一个字符串前缀", "is_end标记区分前缀与完整单词：插入完成时标记", "查找前缀只需沿路径走，不需要is_end；查找单词必须到end节点"], "templateCode": "class Trie:\n    def __init__(self):\n        self.children = [None]*26\n        self.is_end = False\n    def insert(self, word):\n        node = self\n        for ch in word:\n            idx = ord(ch)-ord('a')\n            if not node.children[idx]:\n                node.children[idx] = Trie()\n            node = node.children[idx]\n        node.is_end = True\n    def search(self, word):\n        node = self._find(word)\n        return node is not None and node.is_end\n    def startsWith(self, prefix):\n        return self._find(prefix) is not None\n    def _find(self, prefix):\n        node = self\n        for ch in prefix:\n            idx = ord(ch)-ord('a')\n            if not node.children[idx]: return None\n            node = node.children[idx]\n        return node", "optimizedCode": "class Trie:\n    # 用字典替代数组子节点，支持任意字符集且空间更优\n    def __init__(self):\n        self.ch = {}\n        self.end = False\n    def insert(self, word):\n        node = self\n        for c in word:\n            if c not in node.ch:\n                node.ch[c] = Trie()\n            node = node.ch[c]\n        node.end = True\n    def search(self, word):\n        node = self\n        for c in word:\n            if c not in node.ch: return False\n            node = node.ch[c]\n        return node.end\n    def startsWith(self, prefix):\n        node = self\n        for c in prefix:\n            if c not in node.ch: return False\n            node = node.ch[c]\n        return True"}, {"id": 128, "name": "最长连续序列", "difficulty": "Medium", "insights": ["连续序列=等差1的数列，只关心序列起止不关心顺序", "哈希集合O(1)查找：判断num+1是否存在", "只从序列起点开始计数：若num-1存在则num不是起点，跳过避免重复", "整体O(n)：每个数最多被访问两次（一次查前驱，一次在序列内遍历）"], "templateCode": "def longestConsecutive(self, nums):\n    if not nums: return 0\n    nums.sort()\n    longest = 1\n    cur = 1\n    for i in range(1, len(nums)):\n        if nums[i]==nums[i-1]: continue\n        if nums[i]==nums[i-1]+1:\n            cur += 1\n        else:\n            longest = max(longest, cur)\n            cur = 1\n    return max(longest, cur)", "optimizedCode": "def longestConsecutive(self, nums):\n    # 哈希集合+只从序列起点向右扩展，O(n)\n    s = set(nums)\n    best = 0\n    for num in s:\n        if num-1 not in s:  # num是序列起点\n            cur = num\n            while cur+1 in s:\n                cur += 1\n            best = max(best, cur-num+1)\n    return best"}]}, {"category": "树结构的递归分解 (二叉树)", "categoryEssence": "二叉树问题 = 子问题分解——左右子树的返回值组合成当前节点的答案。", "template": {"title": "二叉树递归统一框架", "explain": "<strong>递归三要素</strong>：<br>• <strong>终止条件</strong>：空节点返回什么<br>• <strong>递归调用</strong>：对左右子树分别求解<br>• <strong>后处理</strong>：用子树结果组合当前节点的答案<br><br><strong>遍历模式</strong>：前序（根左右）、中序（左根右，BST有序性）、后序（左右根，自底向上）、层序（BFS按层）", "code": "def tree_framework(root):\n    if not root:\n        return base_value\n    left = tree_framework(root.left)\n    right = tree_framework(root.right)\n    return combine(left, right, root.val)"}, "problems": [{"id": 104, "name": "二叉树的最大深度", "difficulty": "Easy", "insights": ["深度=根到最远叶节点的边数，递归定义=max(左深,右深)+1", "空树深度0：递归的base case", "后序遍历天然递推：先算子树深度再算当前", "BFS层序计数也行：多少层=多深"], "templateCode": "def maxDepth(self, root):\n    if not root: return 0\n    from collections import deque\n    q = deque([root])\n    depth = 0\n    while q:\n        depth += 1\n        for _ in range(len(q)):\n            node = q.popleft()\n            if node.left: q.append(node.left)\n            if node.right: q.append(node.right)\n    return depth", "optimizedCode": "def maxDepth(self, root):\n    # 后序递归，max(左,右)+1，代码最简\n    if not root: return 0\n    return 1 + max(self.maxDepth(root.left), self.maxDepth(root.right))"}, {"id": 226, "name": "翻转二叉树", "difficulty": "Easy", "insights": ["翻转=每个节点的左右子树互换，递归结构自然匹配", "先序/后序都行：先翻子树再换孩子，或先换再翻", "不需要新建节点：原地交换左右指针即可", "前序遍历视角：处理当前节点（交换），再递归左右"], "templateCode": "def invertTree(self, root):\n    if not root: return None\n    from collections import deque\n    q = deque([root])\n    while q:\n        node = q.popleft()\n        node.left, node.right = node.right, node.left\n        if node.left: q.append(node.left)\n        if node.right: q.append(node.right)\n    return root", "optimizedCode": "def invertTree(self, root):\n    # 前序递归：先交换当前节点左右，再递归翻转子树\n    if not root: return None\n    root.left, root.right = root.right, root.left\n    self.invertTree(root.left)\n    self.invertTree(root.right)\n    return root"}, {"id": 101, "name": "对称二叉树", "difficulty": "Easy", "insights": ["对称=左子树镜像右子树：左左对右右，左右对右左", "同时递归两棵子树：一个往左走一个往右走", "迭代用双端队列：成对取出比较，成对放入子节点", "不是判断两棵树相同，而是判断镜像关系"], "templateCode": "def isSymmetric(self, root):\n    if not root: return True\n    from collections import deque\n    q = deque([(root.left, root.right)])\n    while q:\n        l, r = q.popleft()\n        if not l and not r: continue\n        if not l or not r: return False\n        if l.val != r.val: return False\n        q.append((l.left, r.right))\n        q.append((l.right, r.left))\n    return True", "optimizedCode": "def isSymmetric(self, root):\n    # 双指针递归：左左vs右右，左右vs右左\n    def check(l, r):\n        if not l and not r: return True\n        if not l or not r: return False\n        return l.val==r.val and check(l.left,r.right) and check(l.right,r.left)\n    return check(root, root)"}, {"id": 543, "name": "二叉树的直径", "difficulty": "Easy", "insights": ["直径=树中最长路径的边数，不一定过根", "路径经过某节点时=左深度+右深度，取全局最大", "后序遍历计算深度时顺便更新直径：每个节点都可能是拐点", "返回深度给父节点用，直径在递归过程中全局维护"], "templateCode": "def diameterOfBinaryTree(self, root):\n    self.ans = 1\n    def depth(node):\n        if not node: return 0\n        L = depth(node.left)\n        R = depth(node.right)\n        self.ans = max(self.ans, L+R+1)\n        return max(L,R)+1\n    depth(root)\n    return self.ans-1", "optimizedCode": "def diameterOfBinaryTree(self, root):\n    # 后序遍历返回深度，同时用非局部变量更新直径\n    ans = 0\n    def depth(n):\n        nonlocal ans\n        if not n: return 0\n        l, r = depth(n.left), depth(n.right)\n        ans = max(ans, l+r)  # 以n为拐点的路径长度\n        return max(l,r)+1\n    depth(root)\n    return ans"}, {"id": 98, "name": "验证二叉搜索树", "difficulty": "Medium", "insights": ["BST中序遍历严格递增：利用这个性质只需检查相邻", "递归需传有效范围：左子树值<根值，右子树值>根值，范围逐层收紧", "不能只比较父子：右子树的所有值都应大于祖先，不仅是父节点", "中序遍历迭代版：维护prev指针，出现prev>=cur即非法"], "templateCode": "def isValidBST(self, root):\n    def validate(node, lo, hi):\n        if not node: return True\n        if node.val <= lo or node.val >= hi: return False\n        return validate(node.left, lo, node.val) and validate(node.right, node.val, hi)\n    return validate(root, float('-inf'), float('inf'))", "optimizedCode": "def isValidBST(self, root):\n    # 中序遍历，prev>=cur则非法，无需递归参数传递\n    prev = None\n    stack = []\n    while stack or root:\n        while root:\n            stack.append(root)\n            root = root.left\n        root = stack.pop()\n        if prev is not None and prev.val >= root.val:\n            return False\n        prev = root\n        root = root.right\n    return True"}, {"id": 102, "name": "二叉树的层序遍历", "difficulty": "Medium", "insights": ["BFS天然按层：队列先进先出，同层节点同时处理", "队列长度=本层节点数：入队前记录len(q)控制层级", "结果按层分组：每层一个列表，不是扁平的遍历序列", "DFS也可做：传level参数，按层索引填入结果"], "templateCode": "def levelOrder(self, root):\n    if not root: return []\n    from collections import deque\n    q = deque([root])\n    res = []\n    while q:\n        level = []\n        for _ in range(len(q)):\n            node = q.popleft()\n            level.append(node.val)\n            if node.left: q.append(node.left)\n            if node.right: q.append(node.right)\n        res.append(level)\n    return res", "optimizedCode": "def levelOrder(self, root):\n    # DFS递归+level参数，避免队列开销\n    res = []\n    def dfs(node, level):\n        if not node: return\n        if len(res)==level: res.append([])\n        res[level].append(node.val)\n        dfs(node.left, level+1)\n        dfs(node.right, level+1)\n    dfs(root, 0)\n    return res"}, {"id": 124, "name": "二叉树中的最大路径和", "difficulty": "Hard", "insights": ["路径可从任意节点出发到任意节点，不限于根到叶", "经过某节点的最大路径=左贡献+节点值+右贡献，贡献=max(0,子树路径和)", "子树贡献为负则不取：max(0, gain)保证不拖累总和", "递归返回单侧最大贡献给父节点，全局更新双侧之和"], "templateCode": "def maxPathSum(self, root):\n    self.ans = float('-inf')\n    def gain(node):\n        if not node: return 0\n        l = max(gain(node.left), 0)\n        r = max(gain(node.right), 0)\n        self.ans = max(self.ans, l+node.val+r)\n        return max(l, r)+node.val\n    gain(root)\n    return self.ans", "optimizedCode": "def maxPathSum(self, root):\n    # 后序递归返回单侧贡献，nonlocal更新全局最大\n    ans = float('-inf')\n    def max_gain(n):\n        nonlocal ans\n        if not n: return 0\n        l = max(max_gain(n.left), 0)  # 左侧贡献，负数不取\n        r = max(max_gain(n.right), 0) # 右侧贡献，负数不取\n        ans = max(ans, l+n.val+r)     # 以n为拐点的完整路径\n        return max(l,r)+n.val          # 返回单侧最大给父节点\n    max_gain(root)\n    return ans"}, {"id": 236, "name": "二叉树的最近公共祖先", "difficulty": "Medium", "insights": ["LCA=最低的节点，p和q都是其后代（含自身）", "递归含义：在子树中找到p或q就返回该节点", "左右都非空=当前节点就是LCA：p和q分居两侧", "一侧为空=LCA在另一侧：p和q在同一子树中"], "templateCode": "def lowestCommonAncestor(self, root, p, q):\n    if not root or root==p or root==q: return root\n    left = self.lowestCommonAncestor(root.left, p, q)\n    right = self.lowestCommonAncestor(root.right, p, q)\n    if left and right: return root\n    return left if left else right", "optimizedCode": "def lowestCommonAncestor(self, root, p, q):\n    # 后序遍历：左右都找到=当前即LCA，只找到一侧=继续上传\n    if not root or root is p or root is q:\n        return root\n    l = self.lowestCommonAncestor(root.left, p, q)\n    r = self.lowestCommonAncestor(root.right, p, q)\n    if l and r: return root\n    return l or r"}, {"id": 105, "name": "从前序与中序遍历序列构造二叉树", "difficulty": "Medium", "insights": ["前序首元素=根节点：前序第一个数永远是当前子树的根", "中序定位根：根左边=左子树中序，右边=右子树中序", "左子树大小确定前序分割：中序左半长度=前序中左子树部分长度", "哈希加速查找：预处理中序值→索引的映射，O(1)定位根位置"], "templateCode": "def buildTree(self, preorder, inorder):\n    if not preorder: return None\n    root_val = preorder[0]\n    root = TreeNode(root_val)\n    idx = inorder.index(root_val)\n    root.left = self.buildTree(preorder[1:1+idx], inorder[:idx])\n    root.right = self.buildTree(preorder[1+idx:], inorder[idx+1:])\n    return root", "optimizedCode": "def buildTree(self, preorder, inorder):\n    # 哈希表O(1)定位根+索引边界避免数组切片\n    idx_map = {v:i for i,v in enumerate(inorder)}\n    def build(pre_l, pre_r, in_l, in_r):\n        if pre_l > pre_r: return None\n        root_val = preorder[pre_l]\n        root = TreeNode(root_val)\n        idx = idx_map[root_val]\n        left_size = idx - in_l\n        root.left = build(pre_l+1, pre_l+left_size, in_l, idx-1)\n        root.right = build(pre_l+left_size+1, pre_r, idx+1, in_r)\n        return root\n    return build(0, len(preorder)-1, 0, len(inorder)-1)"}, {"id": 114, "name": "二叉树展开为链表", "difficulty": "Medium", "insights": ["展开=前序遍历顺序的右偏链表，left全置None", "原地操作：不能新建链表，要复用原节点指针", "递归后序法：先展平左右子树，再拼接右-左-根", "寻找前驱法：类似Morris遍历，找左子树最右节点接上右子树"], "templateCode": "def flatten(self, root):\n    if not root: return\n    nodes = []\n    def preorder(n):\n        if n: nodes.append(n); preorder(n.left); preorder(n.right)\n    preorder(root)\n    for i in range(len(nodes)-1):\n        nodes[i].left = None\n        nodes[i].right = nodes[i+1]", "optimizedCode": "def flatten(self, root):\n    # Morris风格：找左子树最右节点，把右子树接到它后面\n    cur = root\n    while cur:\n        if cur.left:\n            prev = cur.left\n            while prev.right:\n                prev = prev.right\n            prev.right = cur.right\n            cur.right = cur.left\n            cur.left = None\n        cur = cur.right"}, {"id": 199, "name": "二叉树的右视图", "difficulty": "Medium", "insights": ["右视图=每层最后一个节点：BFS每层的末尾元素", "DFS先右后左：每层第一次访问的即最右侧节点", "层序遍历取每层最后一个：经典BFS思路", "递归+depth：同一深度第一次遇到的（先右递归）即右视图节点"], "templateCode": "def rightSideView(self, root):\n    if not root: return []\n    from collections import deque\n    q = deque([root])\n    res = []\n    while q:\n        size = len(q)\n        for i in range(size):\n            node = q.popleft()\n            if i==size-1: res.append(node.val)\n            if node.left: q.append(node.left)\n            if node.right: q.append(node.right)\n    return res", "optimizedCode": "def rightSideView(self, root):\n    # DFS先右后左，每层首次访问即右视图节点\n    res = []\n    def dfs(node, depth):\n        if not node: return\n        if depth == len(res):\n            res.append(node.val)\n        dfs(node.right, depth+1)\n        dfs(node.left, depth+1)\n    dfs(root, 0)\n    return res"}, {"id": 297, "name": "二叉树的序列化与反序列化", "difficulty": "Hard", "insights": ["序列化=树→字符串，反序列化=字符串→树，必须可逆", "前序遍历+空标记：用特殊符号(如#)标记None保证唯一性", "反序列化按前序重建：遇到#返回None，否则递归建左右子树", "BFS也可：层序序列化，但前序递归更直观"], "templateCode": "class Codec:\n    def serialize(self, root):\n        if not root: return '#'\n        return str(root.val)+','+self.serialize(root.left)+','+self.serialize(root.right)\n    def deserialize(self, data):\n        vals = iter(data.split(','))\n        def build():\n            v = next(vals)\n            if v=='#': return None\n            node = TreeNode(int(v))\n            node.left = build()\n            node.right = build()\n            return node\n        return build()", "optimizedCode": "class Codec:\n    # 前序+空标记，迭代器消费避免全局索引\n    def serialize(self, root):\n        res = []\n        def dfs(n):\n            if not n:\n                res.append('#')\n                return\n            res.append(str(n.val))\n            dfs(n.left)\n            dfs(n.right)\n        dfs(root)\n        return ','.join(res)\n    def deserialize(self, data):\n        vals = iter(data.split(','))\n        def build():\n            v = next(vals)\n            if v=='#': return None\n            node = TreeNode(int(v))\n            node.left = build()\n            node.right = build()\n            return node\n        return build()"}, {"id": 617, "name": "合并二叉树", "difficulty": "Easy", "insights": ["同位置节点值相加：两棵树重叠则val求和", "一方为空返回另一方：无需创建新节点，直接复用", "递归结构天然匹配：同时遍历两棵树的对应节点", "可原地修改也可新建：修改t1省空间，新建保持原树不变"], "templateCode": "def mergeTrees(self, root1, root2):\n    if not root1: return root2\n    if not root2: return root1\n    from collections import deque\n    q = deque([(root1, root2)])\n    while q:\n        n1, n2 = q.popleft()\n        n1.val += n2.val\n        if n1.left and n2.left: q.append((n1.left, n2.left))\n        elif not n1.left: n1.left = n2.left\n        if n1.right and n2.right: q.append((n1.right, n2.right))\n        elif not n1.right: n1.right = n2.right\n    return root1", "optimizedCode": "def mergeTrees(self, root1, root2):\n    # 递归同时遍历，空则返回另一棵，原地修改root1\n    if not root1: return root2\n    if not root2: return root1\n    root1.val += root2.val\n    root1.left = self.mergeTrees(root1.left, root2.left)\n    root1.right = self.mergeTrees(root1.right, root2.right)\n    return root1"}, {"id": 437, "name": "路径总和III", "difficulty": "Medium", "insights": ["路径不需从根出发也无需到叶：任意起始和结束的向下路径", "前缀和+哈希：从根到当前的和-之前某个前缀和=target", "同560思路：树上版和为K的子数组", "回溯时删除前缀和：左右子树共享map，递归返回前需撤销当前节点的影响"], "templateCode": "def pathSum(self, root, targetSum):\n    self.count = 0\n    def dfs(node, cur_sum):\n        if not node: return\n        cur_sum += no
