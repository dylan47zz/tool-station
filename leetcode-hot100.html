<script>

const data_hot100_part1 = [
  {
    category: "信息的前向流动 (动态规划)",
    categoryEssence: "所有动态规划的本质：将大问题分解为有序的子问题，利用信息从前到后的单向流动，避免重复计算——状态定义即信息压缩，状态转移即信息传递。",
    problems: [
      {
        id: 70,
        name: "爬楼梯",
        difficulty: "Easy",
        desc: "每次可以爬1或2级台阶，求爬到第n级台阶有多少种不同方法。n为正整数。",
        essence: "到达第n阶只能从第n-1阶或第n-2阶来，这是一个斐波那契式的信息前向传播。",
        analysis: "经典动态规划入门题。从第一性原理出发：到达第n级台阶，最后一步只能从第n-1级跨1步，或从第n-2级跨2步，因此f(n)=f(n-1)+f(n-2)，即斐波那契数列。初始条件：f(1)=1, f(2)=2。空间可优化为O(1)，只需保留前两个状态。也可用矩阵快速幂做到O(logn)时间。",
        code: "def climbStairs(self, n):\n    if n <= 2:\n        return n\n    a, b = 1, 2  # f(1), f(2)\n    for _ in range(3, n + 1):\n        a, b = b, a + b  # 信息前向滚动\n    return b"
      },
      {
        id: 198,
        name: "打家劫舍",
        difficulty: "Medium",
        desc: "给定一个非负整数数组表示每个房屋的金额，相邻房屋不能同时偷，求能偷到的最高金额。",
        essence: "每个位置只有两个决策：偷或不偷，信息在相邻位置间传递约束。",
        analysis: "线性DP。对每个房屋有两种选择：偷或不偷。若偷第i间，则第i-1间不能偷，金额为dp[i-2]+nums[i]；若不偷第i间，金额为dp[i-1]。转移方程：dp[i]=max(dp[i-1], dp[i-2]+nums[i])。初始条件：dp[0]=nums[0], dp[1]=max(nums[0], nums[1])。空间优化为O(1)只需两个变量滚动。核心思想是不相邻约束使问题具有最优子结构。",
        code: "def rob(self, nums):\n    if not nums:\n        return 0\n    prev_no, prev_yes = 0, 0  # 不偷/偷前一家时的最大收益\n    for num in nums:\n        # 当前不偷：前一家偷不偷都行，取最大\n        # 当前偷：前一家必须不偷\n        prev_no, prev_yes = max(prev_no, prev_yes), prev_no + num\n    return max(prev_no, prev_yes)"
      },
      {
        id: 213,
        name: "打家劫舍II",
        difficulty: "Medium",
        desc: "房屋围成一圈，相邻房屋不能同时偷，首尾也算相邻，求最高金额。",
        essence: "环形约束将问题拆分为两个线性子问题——信息在首尾处发生冲突，需分别处理。",
        analysis: "在#198基础上增加环形约束。关键洞察：首尾不能同时偷，因此分两种情况：(1)偷第一间，不偷最后一间，即考虑nums[0:n-1]；(2)不偷第一间，可偷最后一间，即考虑nums[1:n]。两种情况分别用#198的线性DP求解，取最大值。特殊情况n=1时直接返回nums[0]。环形问题通过拆分为两个线性子问题来消除环。",
        code: "def rob(self, nums):\n    if len(nums) <= 3:\n        return max(nums) if nums else 0\n    def linear_rob(arr):\n        prev_no, prev_yes = 0, 0\n        for num in arr:\n            prev_no, prev_yes = max(prev_no, prev_yes), prev_no + num\n        return max(prev_no, prev_yes)\n    # 环形拆为两个线性：不含尾 vs 不含首\n    return max(linear_rob(nums[:-1]), linear_rob(nums[1:]))"
      },
      {
        id: 337,
        name: "打家劫舍III",
        difficulty: "Medium",
        desc: "二叉树结构的房屋，相邻节点（父子）不能同时偷，求最高金额。",
        essence: "树形结构上的信息流动——父子之间传递约束，信息沿树边双向传播需后序遍历汇总。",
        analysis: "树形DP。每个节点有两种状态：偷或不偷。定义后序遍历返回值为[不偷当前节点的最大金额, 偷当前节点的最大金额]。若不偷当前节点，左右子树可偷可不偷，取各自最大值：not_rob = max(left[0],left[1]) + max(right[0],right[1])；若偷当前节点，左右子节点都不能偷：rob = left[0] + right[0] + node.val。后序遍历自底向上计算，时间O(n)，空间O(h)为递归栈深度。",
        code: "def rob(self, root):\n    def dfs(node):\n        if not node:\n            return (0, 0)  # (不偷当前, 偷当前)\n        left = dfs(node.left)\n        right = dfs(node.right)\n        # 不偷当前：子节点偷不偷都行\n        not_rob = max(left) + max(right)\n        # 偷当前：子节点必须不偷\n        rob = node.val + left[0] + right[0]\n        return (not_rob, rob)\n    return max(dfs(root))"
      },
      {
        id: 322,
        name: "零钱兑换",
        difficulty: "Medium",
        desc: "给定不同面额的硬币coins和总金额amount，求凑成总金额所需的最少硬币数，每种硬币可无限使用。无法凑出返回-1。",
        essence: "每一步选择一个硬币，金额从大到小流动，求最少步骤——这是无权图上的最短路径。",
        analysis: "完全背包求最小值问题。定义dp[i]为凑出金额i所需最少硬币数。对每个金额i，尝试每种硬币c：若c<=i，则dp[i]=min(dp[i], dp[i-c]+1)。初始dp[0]=0，其余dp[i]=∞。最终若dp[amount]仍为∞则返回-1。外层遍历金额1到amount，内层遍历所有硬币面额。时间O(amount*len(coins))，空间O(amount)。注意这不是01背包，硬币可重复使用，所以金额在外层循环。",
        code: "def coinChange(self, coins, amount):\n    dp = [float('inf')] * (amount + 1)\n    dp[0] = 0  # 金额0需要0个硬币\n    for i in range(1, amount + 1):\n        for c in coins:\n            if i >= c:\n                dp[i] = min(dp[i], dp[i - c] + 1)\n    return dp[amount] if dp[amount] != float('inf') else -1"
      },
      {
        id: 300,
        name: "最长递增子序列",
        difficulty: "Medium",
        desc: "给定整数数组nums，找到最长严格递增子序列的长度。子序列不要求连续。",
        essence: "每个位置记录以该元素结尾的LIS长度，信息沿\"小于关系\"的边向前向传播。",
        analysis: "方法一：DP，dp[i]表示以nums[i]结尾的LIS长度，对每个i枚举j<i，若nums[j]<nums[i]则dp[i]=max(dp[i],dp[j]+1)，时间O(n²)。方法二：贪心+二分，维护数组tails，tails[k]表示长度为k+1的LIS的最小末尾元素。遍历nums时，用二分查找tails中第一个>=nums[i]的位置并替换，若nums[i]更大则追加。tails长度即为答案。贪心的直觉：末尾越小，后续能接上的元素越多，越有利于增长。二分保证O(nlogn)。",
        code: "# O(n²) DP —— 信息逐位扫描，可还原具体子序列\ndef lengthOfLIS(self, nums):\n    n = len(nums)\n    dp = [1] * n  # dp[i] = 以nums[i]结尾的LIS长度，至少为1\n    for i in range(n):\n        for j in range(i):\n            if nums[j] < nums[i]:  # 严格递增约束\n                dp[i] = max(dp[i], dp[j] + 1)\n    return max(dp)\n\n# O(nlogn) 贪心+二分 —— 利用tails严格递增跳过扫描\ndef lengthOfLIS(self, nums):\n    import bisect\n    tails = []  # tails[i] = 长度为i+1的LIS的最小末尾\n    for num in nums:\n        idx = bisect.bisect_left(tails, num)\n        if idx == len(tails):\n            tails.append(num)  # 可以扩展更长的LIS\n        else:\n            tails[idx] = num  # 更小末尾，更大潜力\n    return len(tails)"
      },
      {
        id: 139,
        name: "单词拆分",
        difficulty: "Medium",
        desc: "给定字符串s和字典wordDict，判断s是否可以由字典中的单词（可重复使用）拼接而成。",
        essence: "前缀匹配后的信息传递——已匹配部分将问题缩小为后缀子问题。",
        analysis: "DP问题。定义dp[i]表示s[0:i]能否被拆分。对每个位置i，枚举j从0到i-1，若dp[j]为True且s[j:i]在字典中，则dp[i]=True。初始dp[0]=True表示空串可拆分。优化：j只需枚举到max_word_len范围内即可剪枝。时间O(n²)最坏，空间O(n)。也可将外层遍历每个位置i，内层尝试字典中每个单词word，若s[i:i+len(word)]==word且dp[i]为True则dp[i+len(word)]=True。",
        code: "def wordBreak(self, s, wordDict):\n    word_set = set(wordDict)\n    n = len(s)\n    dp = [False] * (n + 1)\n    dp[0] = True  # 空串可以被拆分\n    for i in range(1, n + 1):\n        for j in range(i):\n            if dp[j] and s[j:i] in word_set:\n                dp[i] = True\n                break  # 找到一个可行切分即可\n    return dp[n]"
      },
      {
        id: 152,
        name: "乘积最大子数组",
        difficulty: "Medium",

    code: "# 旋转90度\ndef rotate(matrix):\n    n = len(matrix)\n    # 转置\n    for i in range(n):\n        for j in range(i+1, n):\n            matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]\n    # 水平翻转\n    for i in range(n):\n        matrix[i].reverse()\n\n# 螺旋遍历\ndef spiral(matrix):\n    t,b,l,r = 0, len(matrix)-1, 0, len(matrix[0])-1\n    res = []\n    while t <= b and l <= r:\n        for j in range(l,r+1): res.append(matrix[t][j]); t+=1\n        for i in range(t,b+1): res.append(matrix[i][r]); r-=1\n        if t<=b:\n            for j in range(r,l-1,-1): res.append(matrix[b][j]); b-=1\n        if l<=r:\n            for i in range(b,t-1,-1): res.append(matrix[i][l]); l+=1\n    return res"
  },
  "堆：动态有序集（优先队列/分治）": {
    title: "堆/优先队列统一框架",
    explain: "<strong>核心不变量</strong>：堆动态维护集合的最值——插入和取最值都是O(log n)。<br><br><strong>选型</strong>：<br>• <strong>TopK</strong>：最小堆维护前K大，堆顶即第K大<br>• <strong>K路归并</strong>：最小堆每次取K个候选中的最小值<br>• <strong>滑动窗口中位数</strong>：双堆（大顶堆+小顶堆）<br>• <strong>调度问题</strong>：堆维护可用资源",
    code: "import heapq\n\n# TopK：最小堆维护前K大\ndef top_k(nums, k):\n    heap = []\n    for num in nums:\n        heapq.heappush(heap, num)\n        if len(heap) > k:\n            heapq.heappop(heap)  # 弹出最小的\n    return heap\n\n# K路归并\ndef merge_k_lists(lists):\n    heap = []\n    for i, node in enumerate(lists):\n        if node:\n            heapq.heappush(heap, (node.val, i, node))\n    dummy = cur = ListNode(0)\n    while heap:\n        val, i, node = heapq.heappop(heap)\n        cur.next = node\n        cur = cur.next\n        if node.next:\n            heapq.heappush(heap, (node.next.val, i, node.next))\n    return dummy.next"
  }
};

// Merge all data
const allCategories = [
  ...(data_hot100_part1 || []),
  ...(hot100_part2 || []),
  ...(data_part3 || [])
];

// Deduplicate by category name
const seen = new Set();
const categories = allCategories.filter(c => {
  if (seen.has(c.category)) return false;
  seen.add(c.category);
  return true;
});

// Deduplicate problems by id within each category
categories.forEach(cat => {
  const pidSet = new Set();
  cat.problems = cat.problems.filter(p => {
    if (pidSet.has(p.id)) return false;
    pidSet.add(p.id);
    return true;
  });
});

const emojis = ['📈','🕸️','🌳','💰','🧮','🔗','📚','🔍','💡','🔲','⛰️','🌊','🪟'];

// Stats
let totalProblems = 0, easyC = 0, medC = 0, hardC = 0;
categories.forEach(c => {
  c.problems.forEach(p => {
    totalProblems++;
    if (p.difficulty === 'Easy') easyC++;
    else if (p.difficulty === 'Medium') medC++;
    else hardC++;
  });
});
document.getElementById('totalCount').textContent = totalProblems;
document.getElementById('catCount').textContent = categories.length;
document.getElementById('easyCount').textContent = easyC;
document.getElementById('medCount').textContent = medC;
document.getElementById('hardCount').textContent = hardC;

// Sidebar nav
const navEl = document.getElementById('sidebarNav');
categories.forEach((cat, i) => {
  const div = document.createElement('div');
  div.className = 'cat-item';
  div.innerHTML = '<span class="ce">'+(emojis[i]||'📌')+'</span><span class="cn">'+cat.category+'</span><span class="cc">'+cat.problems.length+'</span>';
  div.onclick = () => {
    document.getElementById('cat-' + i)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    closeMobile();
  };
  navEl.appendChild(div);
});

// Escape HTML
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Copy code
function copyCode(btn) {
  const code = btn.closest('.code-section').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

// Render content
const contentEl = document.getElementById('content');
categories.forEach((cat, ci) => {
  const section = document.createElement('div');
  section.className = 'cat-section';
  section.id = 'cat-' + ci;

  // Category header
  let html = '<div class="cat-header"><h2>'+(emojis[ci]||'📌')+' '+cat.category+'</h2><div class="cat-essence">'+cat.categoryEssence+'</div></div>';

  // Template box (if available)
  const tmpl = categoryTemplates[cat.category];
  if (tmpl) {
    html += '<div class="template-box"><div class="template-header"><span class="title">📐 '+tmpl.title+'</span><span class="tag">统一框架</span></div><div class="template-explain">'+tmpl.explain+'</div><div class="template-code"><pre><code class="language-python">'+escapeHtml(tmpl.code)+'</code></pre></div></div>';
  }

  // Problem cards
  cat.problems.forEach((p, pi) => {
    const diffClass = p.difficulty === 'Easy' ? 'easy' : p.difficulty === 'Hard' ? 'hard' : 'medium';

    // Parse insights from essence
    let insightHtml = '';
    if (p.essence) {
      const points = p.essence.split(/[；;]/).map(s => s.trim()).filter(s => s.length > 0);
      if (points.length > 0) {
        insightHtml = '<div class="insight-box"><div class="label">🎯 关键洞察</div><ul>'+points.map(pt => '<li>'+escapeHtml(pt)+'</li>').join('')+'</ul></div>';
      }
    }

    // Description box
    let descHtml = '';
    if (p.desc) {
      descHtml = '<div class="desc-box"><div class="label">📝 题目</div><div class="text">'+escapeHtml(p.desc)+'</div></div>';
    }

    // Code section
    let codeHtml = '';
    if (p.code) {
      codeHtml = '<div class="code-section"><div class="code-header"><span class="code-label optimized-label">⚡ 解法</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre><code class="language-python">'+escapeHtml(p.code)+'</code></pre></div>';
    }

    html += '<div class="problem-card" data-id="'+p.id+'" data-name="'+escapeHtml(p.name)+'" data-essence="'+escapeHtml(p.essence||'')+'" data-analysis="'+escapeHtml(p.analysis||'')+'"><div class="problem-header"><span class="problem-id">#'+p.id+'</span><span class="problem-name">'+p.name+'</span><span class="difficulty '+diffClass+'">'+p.difficulty+'</span><span class="toggle-icon">▶</span></div><div class="problem-body"><div class="problem-content">'+insightHtml+descHtml+'<div class="analysis">'+escapeHtml(p.analysis)+'</div>'+codeHtml+'</div></div></div>';
  });

  section.innerHTML = html;

  // Highlight template code immediately
  section.querySelectorAll('.template-code pre code').forEach(block => {
    hljs.highlightElement(block);
  });

  // Add click handlers for problem cards
  section.querySelectorAll('.problem-header').forEach(header => {
    header.onclick = () => {
      const card = header.parentElement;
      card.classList.toggle('open');
      if (card.classList.contains('open') && !card.dataset.highlighted) {
        card.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        card.dataset.highlighted = '1';
      }
    };
  });

  contentEl.appendChild(section);
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.problem-card').forEach(card => {
    const match = !q ||
      card.dataset.id.toString().includes(q) ||
      card.dataset.name.toLowerCase().includes(q) ||
      card.dataset.essence.toLowerCase().includes(q) ||
      card.dataset.analysis.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.cat-section').forEach(sec => {
    const visible = sec.querySelectorAll('.problem-card:not([style*="display: none"])');
    sec.style.display = visible.length ? '' : 'none';
  });
});

// Sidebar active state
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const idx = e.target.id.replace('cat-','');
      document.querySelectorAll('.cat-item').forEach((item,i) => {
        item.classList.toggle('active', i == idx);
      });
    }
  });
}, { threshold: 0.1 });
categories.forEach((_, i) => {
  const el = document.getElementById('cat-' + i);
  if (el) observer.observe(el);
});

// Progress bar + back to top
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('backTop').classList.toggle('visible', h.scrollTop > 400);
});
document.getElementById('backTop').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// Mobile menu
function closeMobile() {
  document.getElementById('sidebar').classList.remove('open');
}
document.getElementById('menuToggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};
document.getElementById('sidebarOverlay').onclick = closeMobile;

// Touch swipe
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
  if (dy > 60) return;
  if (touchStartX < 30 && dx > 60) {
    document.getElementById('sidebar').classList.add('open');
  } else if (dx < -60 && document.getElementById('sidebar').classList.contains('open')) {
    closeMobile();
  }
}, { passive: true });
</script>

</body>
