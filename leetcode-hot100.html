<script>
const data_hot100_part1 = [
  {
    category: "信息的前向流动 (动态规划)",
    categoryEssence: "所有动态规划的本质：将大问题分解为有序的子问题，利用信息从前到后的单向流动，避免重复计算——状态定义即信息压缩，状态转移即信息传递。",
    problems: [
      {
        id: 70,
        name: "爬楼梯",
        difficulty: "Easy",
        essence: "到达第n阶只能从第n-1阶或第n-2阶来，这是一个斐波那契式的信息前向传播。",
        analysis: "从基本事实出发：你站在第n阶，上一步要么跨了1阶，要么跨了2阶，没有其他可能。因此f(n)=f(n-1)+f(n-2)，这是最纯粹的线性信息流。每个状态只依赖前两个状态，信息沿位置轴单向流动。空间可以压缩到O(1)，因为更早的信息已经不再需要——信息具有有限记忆性。",
        code: "def climbStairs(self, n):\n    if n <= 2:\n        return n\n    a, b = 1, 2  # f(1), f(2)\n    for _ in range(3, n + 1):\n        a, b = b, a + b  # 信息前向滚动\n    return b"
      },
      {
        id: 198,
        name: "打家劫舍",
        difficulty: "Medium",
        essence: "每个位置只有两个决策：偷或不偷，信息在相邻位置间传递约束。",
        analysis: "核心矛盾：相邻房屋不能同时偷。对第i间房，要么偷（则第i-1间不能偷），要么不偷（则第i-1间可以偷也可以不偷，取最优）。这自然产生两个状态：dp[i][0]表示不偷第i间的最大收益，dp[i][1]表示偷第i间的最大收益。信息从左到右流动，每个位置的最优解完全由前一个位置的两个状态决定。可压缩为一维，因为只依赖前一步。",
        code: "def rob(self, nums):\n    if not nums:\n        return 0\n    prev_no, prev_yes = 0, 0  # 不偷/偷前一家时的最大收益\n    for num in nums:\n        # 当前不偷：前一家偷不偷都行，取最大\n        # 当前偷：前一家必须不偷\n        prev_no, prev_yes = max(prev_no, prev_yes), prev_no + num\n    return max(prev_no, prev_yes)"
      },
      {
        id: 213,
        name: "打家劫舍II",
        difficulty: "Medium",
        essence: "环形约束将问题拆分为两个线性子问题——信息在首尾处发生冲突，需分别处理。",
        analysis: "环形意味着首尾相连，首尾不能同时偷。从第一性原理：任何最优解要么不偷第一家，要么不偷最后一家（或者都不偷，被包含在前两种情况中）。因此将环形拆为两个线性问题：偷[0,n-2]或不偷第一家即偷[1,n-1]，分别求198题的线性解再取最大。这体现了处理环形问题的基本方法论：在冲突点切一刀，化为线性。",
        code: "def rob(self, nums):\n    if len(nums) <= 3:\n        return max(nums) if nums else 0\n    def linear_rob(arr):\n        prev_no, prev_yes = 0, 0\n        for num in arr:\n            prev_no, prev_yes = max(prev_no, prev_yes), prev_no + num\n        return max(prev_no, prev_yes)\n    # 环形拆为两个线性：不含尾 vs 不含首\n    return max(linear_rob(nums[:-1]), linear_rob(nums[1:]))"
      },
      {
        id: 337,
        name: "打家劫舍III",
        difficulty: "Medium",
        essence: "树形结构上的信息流动——父子之间传递约束，信息沿树边双向传播需后序遍历汇总。",
        analysis: "树上的约束：父子不能同时偷。与线性版本不同，信息不是单向流动而是从叶子向根汇总。对每个节点定义两个状态：偷当前节点的最大收益，不偷当前节点的最大收益。关键洞察：不偷当前节点时，子节点偷不偷都可以（取子节点两种状态的最大值）；偷当前节点时，子节点必须不偷。用后序遍历自底向上汇总信息，因为根的决策依赖子树的结果。",
        code: "def rob(self, root):\n    def dfs(node):\n        if not node:\n            return (0, 0)  # (不偷当前, 偷当前)\n        left = dfs(node.left)\n        right = dfs(node.right)\n        # 不偷当前：子节点偷不偷都行\n        not_rob = max(left) + max(right)\n        # 偷当前：子节点必须不偷\n        rob = node.val + left[0] + right[0]\n        return (not_rob, rob)\n    return max(dfs(root))"
      },
      {
        id: 322,
        name: "零钱兑换",
        difficulty: "Medium",
        essence: "每一步选择一个硬币，金额从大到小流动，求最少步骤——这是无权图上的最短路径。",
        analysis: "从目标金额amount出发，选一个硬币c后就变成子问题amount-c。本质是在一个图上求从amount到0的最短路径，边权都是1（每个硬币消耗一步）。dp[i]表示凑出金额i的最少硬币数，dp[i]=min(dp[i-c]+1)对所有硬币c。初始dp[0]=0（起点），其余为无穷大。信息从小金额向大金额流动，每个状态由比它小的状态转移而来。",
        code: "def coinChange(self, coins, amount):\n    dp = [float('inf')] * (amount + 1)\n    dp[0] = 0  # 金额0需要0个硬币\n    for i in range(1, amount + 1):\n        for c in coins:\n            if i >= c:\n                dp[i] = min(dp[i], dp[i - c] + 1)\n    return dp[amount] if dp[amount] != float('inf') else -1"
      },
      {
        id: 300,
        name: "最长递增子序列",
        difficulty: "Medium",
        essence: "每个位置记录以该元素结尾的LIS长度，信息沿\"小于关系\"的边向前向传播。",
        analysis: "定义dp[i]为以nums[i]结尾的最长递增子序列长度。对每个i，找所有j<i使得nums[j]<nums[i]，dp[i]=max(dp[j])+1。信息沿\"值的大小关系\"流动：只有比当前值小的位置才能向当前传递信息。O(n²)做法是遍历所有前置位置；O(nlogn)做法用贪心+二分维护一个tails数组，本质是维护不同长度LIS的最小末尾——更小的末尾意味着更大的扩展潜力。",
        code: "def lengthOfLIS(self, nums):\n    tails = []  # tails[i] = 长度为i+1的LIS的最小末尾\n    for num in nums:\n        idx = bisect.bisect_left(tails, num)\n        if idx == len(tails):\n            tails.append(num)  # 可以扩展更长的LIS\n        else:\n            tails[idx] = num  # 更小末尾，更大潜力\n    return len(tails)"
      },
      {
        id: 139,
        name: "单词拆分",
        difficulty: "Medium",
        essence: "前缀匹配后的信息传递——已匹配部分将问题缩小为后缀子问题。",
        analysis: "s能否被拆分，等价于：如果某个字典词匹配了s的前缀，那么剩余后缀也必须能被拆分。定义dp[i]表示s[0:i]能否被拆分，dp[i]=True当且仅当存在j<i使得dp[j]=True且s[j:i]在字典中。信息从前向后流动，每个位置接收之前所有可行切分点的信息。本质是一个可达性问题：在字符串的位置图上，从0跳到n。",
        code: "def wordBreak(self, s, wordDict):\n    word_set = set(wordDict)\n    n = len(s)\n    dp = [False] * (n + 1)\n    dp[0] = True  # 空串可以被拆分\n    for i in range(1, n + 1):\n        for j in range(i):\n            if dp[j] and s[j:i] in word_set:\n                dp[i] = True\n                break  # 找到一个可行切分即可\n    return dp[n]"
      },
      {
        id: 152,
        name: "乘积最大子数组",
        difficulty: "Medium",
        essence: "乘法的符号翻转效应要求同时维护最大和最小——负数让最小变最大。",
        analysis: "乘法与加法的本质区别：乘以负数会让最大值变最小值、最小值变最大值。因此每个位置必须同时记录以该位置结尾的最大乘积和最小乘积。当遇到负数时，最大最小发生交换。状态转移：cur_max=max(num, cur_max*num, cur_min*num)，cur_min=min(num, cur_max*num, cur_min*num)。核心洞察：不确定未来符号，就同时保留两种极端信息。",
        code: "def maxProduct(self, nums):\n    res = max(nums)\n    cur_max, cur_min = 1, 1\n    for num in nums:\n        # 负数会让最大变最小，先暂存\n        tmp = cur_max\n        cur_max = max(num, cur_max * num, cur_min * num)\n        cur_min = min(num, tmp * num, cur_min * num)\n        res = max(res, cur_max)\n    return res"
      },
      {
        id: 416,
        name: "分割等和子集",
        difficulty: "Medium",

        analysis: "找第K大元素，排序需要O(n log n)，但第一性原理告诉我们：我们不需要完全排序，只需要知道第K大。维护一个大小为K的小顶堆，堆顶是当前K个元素中最小的——也就是第K大的候选。遍历数组时，如果当前元素>堆顶，说明它应该进入前K，弹出堆顶并插入新元素。最终堆顶就是第K大。时间O(n log K)，空间O(K)。当K远小于n时，远优于排序。核心洞察：不需要全局有序，只需局部K个元素的有序。",
        code: "import heapq\n\ndef findKthLargest(self, nums: List[int], k: int) -> int:\n    # 小顶堆维护前K大的元素，堆顶=第K大\n    heap = []\n    for num in nums:\n        heapq.heappush(heap, num)\n        if len(heap) > k:\n            heapq.heappop(heap)  # 弹出最小的，保留大的\n    return heap[0]  # 堆顶即第K大"
      },
      {
        id: 23,
        name: "合并K个升序链表",
        difficulty: "Hard",
        essence: "K路归并的核心是「每次取K个候选中的最小值」——堆天然维护这个动态最小值查询。",
        analysis: "合并K个有序链表，每次需要从K个链表的当前头节点中选出最小的一个。第一性原理：这是一个K路选择问题——每一步从K个候选中取最小值，取完后该链表的下一个节点加入候选集。如果每次扫描K个候选找最小值，复杂度O(K) per step，总O(nK)。用最小堆维护K个候选，每次取堆顶O(log K)，插入O(log K)，总O(n log K)。核心洞察：堆将「动态集合上的重复最值查询」从O(K)降到O(log K)。",
        code: "import heapq\n\ndef mergeKLists(self, lists: List[Optional[ListNode]]) -> Optional[ListNode]:\n    # 最小堆：(节点值, 链表索引, 节点)\n    heap = []\n    for i, node in enumerate(lists):\n        if node:\n            heapq.heappush(heap, (node.val, i, node))\n    dummy = cur = ListNode(0)\n    while heap:\n        val, i, node = heapq.heappop(heap)  # 取当前最小\n        cur.next = node\n        cur = cur.next\n        if node.next:  # 该链表的下一个节点入堆\n            heapq.heappush(heap, (node.next.val, i, node.next))\n    return dummy.next"
      },
      {
        id: 169,
        name: "多数元素",
        difficulty: "Easy",
        essence: "多数元素出现超过半数——用抵消法，不同元素成对消灭，最后剩下的一定是多数。",
        analysis: "多数元素定义为出现次数>⌊n/2⌋的元素。第一性原理：如果把每个多数元素和一个非多数元素配对消去，多数元素一定会剩下，因为它的数量严格大于其他所有元素之和。Boyer-Moore投票法正是这个思路：维护一个候选者和计数器，遇到相同则计数+1，遇到不同则计数-1（抵消），计数归零时换候选者。最终剩下的候选者就是多数元素。O(n)时间，O(1)空间。核心洞察：多数的「超过半数」性质保证了它在全局抵消中不可能被完全消灭。",
        code: "def majorityElement(self, nums: List[int]) -> int:\n    candidate = None\n    count = 0\n    for num in nums:\n        if count == 0:\n            candidate = num  # 重置候选者\n            count = 1\n        elif num == candidate:\n            count += 1  # 同阵营+1\n        else:\n            count -= 1  # 异阵营抵消\n    return candidate  # 多数元素必然存活"
      },
      {
        id: 287,
        name: "寻找重复数",
        difficulty: "Medium",
        essence: "数组值域[1,n]且含重复——值可以视为指针，数组变成链表，重复值造成环，Floyd找环入口即重复数。",
        analysis: "n+1个数的值域为[1,n]，由鸽巢原理必存在重复。第一性原理：把每个位置的值看成指向下一个位置的指针，数组就变成了一个链表。因为有重复值，意味着至少两个位置指向同一个下一位置，即链表有环。环的入口节点就是那个被多个位置指向的重复值。用Floyd快慢指针找环入口：快指针走两步、慢指针走一步，相遇后重置一个指针到起点，两者同步走，再次相遇即为环入口。O(n)时间，O(1)空间。核心洞察：值域限制使数组可以被解读为图结构，重复值等价于图中的入度>1的节点，即环入口。",
        code: "def findDuplicate(self, nums: List[int]) -> int:\n    # Floyd判圈：快慢指针找相遇点\n    slow = fast = 0\n    while True:\n        slow = nums[slow]       # 慢指针走一步\n        fast = nums[nums[fast]] # 快指针走两步\n        if slow == fast:\n            break\n    # 找环入口=重复数\n    slow = 0\n    while slow != fast:\n        slow = nums[slow]\n        fast = nums[fast]\n    return slow"
      }
    ]
  }
];

</script>

<script>
// Merge all data
const allCategories = [
  ...(data_hot100_part1 || []),
  ...(hot100_part2 || []),
  ...(data_part3 || [])
];

// Deduplicate by category name (keep first occurrence)
const seen = new Set();
const categories = allCategories.filter(c => {
  if (seen.has(c.category)) return false;
  seen.add(c.category);
  return true;
});

// Deduplicate problems by id within each category
categories.forEach(cat => {
  const pidSet = new Set();
  cat.problems = cat.problems.filter(p => {
    if (pidSet.has(p.id)) return false;
    pidSet.add(p.id);
    return true;
  });
});

const emojis = ['🌊','🪟','🤝','📈','🌳','🕸️','🌲','💰','🧮','🔗','📚','🔍','💡','🔲','⛰️'];

// Stats
let totalProblems = 0, easyC = 0, medC = 0, hardC = 0;
categories.forEach(c => {
  c.problems.forEach(p => {
    totalProblems++;
    if (p.difficulty === 'Easy') easyC++;
    else if (p.difficulty === 'Medium') medC++;
    else hardC++;
  });
});
document.getElementById('totalCount').textContent = totalProblems;
document.getElementById('catCount').textContent = categories.length;
document.getElementById('easyCount').textContent = easyC;
document.getElementById('medCount').textContent = medC;
document.getElementById('hardCount').textContent = hardC;

// Sidebar nav
const navEl = document.getElementById('sidebarNav');
categories.forEach((cat, i) => {
  const div = document.createElement('div');
  div.className = 'cat-item';
  div.innerHTML = `<span class="cat-emoji">${emojis[i] || '📌'}</span>${cat.category}<span class="cat-count">${cat.problems.length}</span>`;
  div.onclick = () => {
    document.getElementById('cat-' + i)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    closeMobile();
  };
  navEl.appendChild(div);
});

// Render content
const contentEl = document.getElementById('content');
categories.forEach((cat, ci) => {
  const section = document.createElement('div');
  section.className = 'cat-section';
  section.id = 'cat-' + ci;
  section.innerHTML = `
    <div class="cat-header">
      <h2>${emojis[ci] || '📌'} ${cat.category}</h2>
      <div class="cat-essence">${cat.categoryEssence}</div>
    </div>
  `;
  cat.problems.forEach((p, pi) => {
    const card = document.createElement('div');
    card.className = 'problem-card';
    card.dataset.id = p.id;
    card.dataset.name = p.name;
    card.dataset.essence = p.essence || '';
    card.dataset.analysis = p.analysis || '';

    const diffClass = p.difficulty === 'Easy' ? 'easy' : p.difficulty === 'Hard' ? 'hard' : 'medium';

    card.innerHTML = `
      <div class="problem-header">
        <span class="problem-id">#${p.id}</span>
        <span class="problem-name">${p.name}</span>
        <span class="difficulty ${diffClass}">${p.difficulty}</span>
        <span class="toggle-icon">▶</span>
      </div>
      <div class="problem-body">
        <div class="problem-content">
          <div class="essence-box">
            <div class="label">🎯 第一性原理</div>
            <div class="text">${escapeHtml(p.essence)}</div>
          </div>
          <div class="analysis">${escapeHtml(p.analysis)}</div>
          <div class="code-section">
            <div class="code-header">
              <span class="code-label">Python</span>
              <button class="copy-btn" onclick="copyCode(this)">复制</button>
            </div>
            <pre><code class="language-python">${escapeHtml(p.code)}</code></pre>
          </div>
        </div>
      </div>
    `;

    card.querySelector('.problem-header').onclick = () => {
      card.classList.toggle('open');
      if (card.classList.contains('open') && !card.dataset.highlighted) {
        card.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        card.dataset.highlighted = '1';
      }
    };

    section.appendChild(card);
  });
  contentEl.appendChild(section);
});

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(btn) {
  const code = btn.closest('.code-section').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.problem-card').forEach(card => {
    const match = !q ||
      card.dataset.id.toString().includes(q) ||
      card.dataset.name.toLowerCase().includes(q) ||
      card.dataset.essence.toLowerCase().includes(q) ||
      card.dataset.analysis.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
  });
  // Hide empty category sections
  document.querySelectorAll('.cat-section').forEach(sec => {
    const visible = sec.querySelectorAll('.problem-card:not([style*="display: none"])');
    sec.style.display = visible.length ? '' : 'none';
  });
});

// Sidebar active state
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const idx = e.target.id.replace('cat-','');
      document.querySelectorAll('.cat-item').forEach((item,i) => {
        item.classList.toggle('active', i == idx);
      });
    }
  });
}, { threshold: 0.1 });
categories.forEach((_, i) => {
  const el = document.getElementById('cat-' + i);
  if (el) observer.observe(el);
});

// Progress bar
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('backTop').classList.toggle('visible', h.scrollTop > 400);
});
document.getElementById('backTop').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// Mobile menu
function closeMobile() {
  document.getElementById('sidebar').classList.remove('open');
}
document.getElementById('menuToggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};
</script>
</body>
</html>
