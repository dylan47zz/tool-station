de.val\n        if cur_sum == targetSum:\n            self.count += 1\n        self.count += check(node.left, targetSum - cur_sum)\n        self.count += check(node.right, targetSum - cur_sum)\n        dfs(node.left, cur_sum)\n        dfs(node.right, cur_sum)\n    def check(node, target):\n        if not node: return 0\n        res = 1 if node.val==target else 0\n        res += check(node.left, target-node.val)\n        res += check(node.right, target-node.val)\n        return res\n    dfs(root, 0)\n    return self.count", "optimizedCode": "def pathSum(self, root, targetSum):\n    # 前缀和+哈希，树上版两数之和，回溯时删map\n    from collections import defaultdict\n    prefix = defaultdict(int)\n    prefix[0] = 1\n    ans = 0\n    def dfs(node, cur):\n        nonlocal ans\n        if not node: return\n        cur += node.val\n        ans += prefix[cur - targetSum]\n        prefix[cur] += 1\n        dfs(node.left, cur)\n        dfs(node.right, cur)\n        prefix[cur] -= 1  # 回溯：左右子树不共享路径\n    dfs(root, 0)\n    return ans"}]}, {"category": "局部最优的累积 (贪心)", "categoryEssence": "如果全局最优解在每个局部决策点都必然选择某个选项，那么局部最优的累积就是全局最优。", "template": {"title": "贪心统一框架", "explain": "<strong>关键</strong>：证明局部选择的<strong>不可替代性</strong>——任何不选该选项的方案都不是最优解。<br><br><strong>常见模式</strong>：<br>• <strong>区间贪心</strong>：按端点排序，贪心选择不冲突的最优区间<br>• <strong>分配贪心</strong>：按某种顺序处理，每步取当前最优<br>• <strong>跳跃贪心</strong>：维护最远可达位置，贪心扩展", "code": "def greedy_framework(items):\n    items.sort(key=排序依据)\n    res = 初始值\n    for item in items:\n        if 满足贪心条件(item):\n            res = 更新(res, item)\n    return res"}, "problems": [{"id": 55, "name": "跳跃游戏", "difficulty": "Medium", "insights": ["只需判断能否到达末尾，不需要具体路径", "维护最远可达位置：每步更新能跳到的最远处", "当前位置超过最远可达=无法继续=返回False", "贪心正确性：能到更远一定不比到更近差"], "templateCode": "def canJump(self, nums):\n    n = len(nums)\n    dp = [False]*n\n    dp[0] = True\n    for i in range(n):\n        if not dp[i]: continue\n        for j in range(1, nums[i]+1):\n            if i+j < n:\n                dp[i+j] = True\n    return dp[-1]", "optimizedCode": "def canJump(self, nums):\n    # 贪心维护最远可达，超过最远则不可达\n    max_reach = 0\n    for i, jump in enumerate(nums):\n        if i > max_reach: return False\n        max_reach = max(max_reach, i+jump)\n    return True"}, {"id": 45, "name": "跳跃游戏II", "difficulty": "Medium", "insights": ["求最少步数到达末尾：同BFS层级思想，每步跳到最远", "BFS层级思想：同一次跳跃可达范围=同一层", "维护当前跳跃边界和下一步最远：越过边界时步数+1", "到达边界前更新下一步最远，到边界时切换到下一跳范围"], "templateCode": "def jump(self, nums):\n    n = len(nums)\n    steps = [float('inf')]*n\n    steps[0] = 0\n    for i in range(n):\n        for j in range(1, nums[i]+1):\n            if i+j < n:\n                steps[i+j] = min(steps[i+j], steps[i]+1)\n    return steps[-1]", "optimizedCode": "def jump(self, nums):\n    # 贪心BFS层级：维护当前跳跃边界和下一跳最远\n    jumps = cur_end = farthest = 0\n    for i in range(len(nums)-1):\n        farthest = max(farthest, i+nums[i])\n        if i == cur_end:\n            jumps += 1\n            cur_end = farthest\n    return jumps"}, {"id": 121, "name": "买卖股票的最佳时机", "difficulty": "Easy", "insights": ["只交易一次：最低点买入、最高点卖出，但最低必须在最高之前", "遍历维护历史最低价：当前价-历史最低=当前可获利润", "每一步更新最低价和最大利润：O(n)一遍扫描", "不能先卖后买：时序约束使双指针不适用"], "templateCode": "def maxProfit(self, prices):\n    max_profit = 0\n    for i in range(len(prices)):\n        for j in range(i+1, len(prices)):\n            max_profit = max(max_profit, prices[j]-prices[i])\n    return max_profit", "optimizedCode": "def maxProfit(self, prices):\n    # 维护历史最低价，当前价-最低=潜在利润\n    min_price = float('inf')\n    profit = 0\n    for p in prices:\n        min_price = min(min_price, p)\n        profit = max(profit, p-min_price)\n    return profit"}, {"id": 122, "name": "买卖股票的最佳时机II", "difficulty": "Medium", "insights": ["可无限次交易：每次上涨都吃掉，贪心最优", "相邻两天有涨幅就交易：累加所有正差价=最大利润", "不必真的模拟买卖：数学上等价于求所有上升段的长度之和", "贪心正确性：拆开交易不亏（无手续费）且能捕获每次上涨"], "templateCode": "def maxProfit(self, prices):\n    n = len(prices)\n    dp = [[0]*2 for _ in range(n)]\n    dp[0][1] = -prices[0]\n    for i in range(1, n):\n        dp[i][0] = max(dp[i-1][0], dp[i-1][1]+prices[i])\n        dp[i][1] = max(dp[i-1][1], dp[i-1][0]-prices[i])\n    return dp[-1][0]", "optimizedCode": "def maxProfit(self, prices):\n    # 贪心：累加所有上涨差价，等价于无限次最优交易\n    profit = 0\n    for i in range(1, len(prices)):\n        if prices[i] > prices[i-1]:\n            profit += prices[i] - prices[i-1]\n    return profit"}, {"id": 763, "name": "划分字母区间", "difficulty": "Medium", "insights": ["同一字母只能在同一片段：片段必须包含该字母所有出现位置", "先记录每个字母最后出现位置：决定片段至少延伸到哪里", "遍历中维护当前片段的最远边界：到边界即可切割", "贪心：到最远边界前不能切，到边界时切最短片段最优"], "templateCode": "def partitionLabels(self, s):\n    last = {c: i for i, c in enumerate(s)}\n    res = []\n    start = 0\n    end = 0\n    for i, c in enumerate(s):\n        end = max(end, last[c])\n        if i == end:\n            res.append(i-start+1)\n            start = i+1\n    return res", "optimizedCode": "def partitionLabels(self, s):\n    # 记录每个字母最远位置，遍历中维护当前片段边界\n    last = {}\n    for i, c in enumerate(s):\n        last[c] = i\n    res = []\n    start = end = 0\n    for i, c in enumerate(s):\n        end = max(end, last[c])\n        if i == end:\n            res.append(end-start+1)\n            start = i+1\n    return res"}, {"id": 135, "name": "分发糖果", "difficulty": "Hard", "insights": ["每个孩子至少1颗，相邻评分高的更多糖果", "左右各遍历一次：左→右保证右比左大时右更多，右→左同理", "取两次遍历的最大值：同时满足两个方向的约束", "不能一次遍历：单向遍历无法预知右侧信息对左侧的影响"], "templateCode": "def candy(self, ratings):\n    n = len(ratings)\n    candies = [1]*n\n    for i in range(1, n):\n        if ratings[i] > ratings[i-1]:\n            candies[i] = candies[i-1]+1\n    for i in range(n-2, -1, -1):\n        if ratings[i] > ratings[i+1]:\n            candies[i] = max(candies[i], candies[i+1]+1)\n    return sum(candies)", "optimizedCode": "def candy(self, ratings):\n    # 两遍扫描：左→右处理升序，右→左处理降序，取max\n    n = len(ratings)\n    left = [1]*n\n    for i in range(1, n):\n        if ratings[i] > ratings[i-1]:\n            left[i] = left[i-1]+1\n    right = ret = 1\n    ans = left[-1]\n    for i in range(n-2, -1, -1):\n        if ratings[i] > ratings[i+1]:\n            right += 1\n        else:\n            right = 1\n        ans += max(left[i], right)\n    return ans"}, {"id": 406, "name": "根据身高重建队列", "difficulty": "Medium", "insights": ["每个人(h,k)：k是前面比他高或等高的人数", "高的人先插入：矮的人不影响高的人的k值", "按身高降序、k升序排列后依次插入k位置：保证正确性", "插入位置=k：前面恰好有k个更高或等高的人"], "templateCode": "def reconstructQueue(self, people):\n    people.sort(key=lambda x: (-x[0], x[1]))\n    res = []\n    for p in people:\n        res.insert(p[1], p)\n    return res", "optimizedCode": "def reconstructQueue(self, people):\n    # 高的先插入确定骨架，矮的插入不影响高的k值\n    people.sort(key=lambda x: (-x[0], x[1]))\n    res = []\n    for h, k in people:\n        res.insert(k, [h, k])\n    return res"}, {"id": 56, "name": "合并区间", "difficulty": "Medium", "insights": ["按左端点排序：重叠区间一定相邻", "当前区间与结果末尾重叠则合并：扩展右端点", "不重叠则新开区间：加入结果列表", "排序是关键：不排序无法保证重叠区间相邻"], "templateCode": "def merge(self, intervals):\n    intervals.sort()\n    res = [intervals[0]]\n    for s, e in intervals[1:]:\n        if s <= res[-1][1]:\n            res[-1][1] = max(res[-1][1], e)\n        else:\n            res.append([s, e])\n    return res", "optimizedCode": "def merge(self, intervals):\n    # 排序后一遍扫描，维护当前合并区间的右端点\n    if not intervals: return []\n    intervals.sort(key=lambda x: x[0])\n    merged = [intervals[0]]\n    for s, e in intervals[1:]:\n        if s <= merged[-1][1]:\n            merged[-1][1] = max(merged[-1][1], e)\n        else:\n            merged.append([s, e])\n    return merged"}]}, {"category": "区间的代数化 (前缀和/哈希)", "categoryEssence": "前缀和将区间求和转化为端点运算O(1)，哈希表将查找从O(n)降到O(1)。", "template": {"title": "前缀和+哈希统一框架", "explain": "<strong>前缀和</strong>：sum[i..j] = prefix[j+1] - prefix[i]，一次预处理O(n)，每次查询O(1)<br><strong>哈希</strong>：将'查找是否存在某个值'从遍历降维为查表<br><br><strong>组合模式</strong>：前缀和+哈希表 → 将'和为K的子数组'从O(n²)降到O(n)", "code": "def subarray_sum_k(arr, k):\n    from collections import defaultdict\n    count = defaultdict(int)\n    count[0] = 1\n    curr = 0\n    res = 0\n    for num in arr:\n        curr += num\n        res += count[curr - k]\n        count[curr] += 1\n    return res"}, "problems": [{"id": 1, "name": "两数之和", "difficulty": "Easy", "insights": ["暴力O(n²)可过但哈希表O(n)更优", "哈希表存已见数值→索引：对每个数查互补值是否出现过", "一遍扫描：边遍历边查表边插入，避免自己匹配自己", "不能先全部入表：同值元素可能需要先查询再入表保证索引不同"], "templateCode": "def twoSum(self, nums, target):\n    for i in range(len(nums)):\n        for j in range(i+1, len(nums)):\n            if nums[i]+nums[j]==target:\n                return [i, j]", "optimizedCode": "def twoSum(self, nums, target):\n    # 哈希表一遍扫描：查互补值是否已存在\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i"}, {"id": 560, "name": "和为K的子数组", "difficulty": "Medium", "insights": ["子数组和=两个前缀和之差：pre[j]-pre[i]=K", "转化：遍历时找之前有多少前缀和=当前前缀和-K", "哈希表计数：key=前缀和，value=出现次数", "初始化{0:1}：前缀和本身等于K的情况需要被计入"], "templateCode": "def subarraySum(self, nums, k):\n    n = len(nums)\n    count = 0\n    for i in range(n):\n        s = 0\n        for j in range(i, n):\n            s += nums[j]\n            if s == k:\n                count += 1\n    return count", "optimizedCode": "def subarraySum(self, nums, k):\n    # 前缀和+哈希计数，找pre[j]-pre[i]=K等价于找pre[i]=pre[j]-K\n    from collections import defaultdict\n    prefix_count = defaultdict(int)\n    prefix_count[0] = 1\n    cur_sum = ans = 0\n    for num in nums:\n        cur_sum += num\n        ans += prefix_count[cur_sum - k]\n        prefix_count[cur_sum] += 1\n    return ans"}, {"id": 49, "name": "字母异位词分组", "difficulty": "Medium", "insights": ["异位词=字母组成相同排列不同，排序后字符串相同", "排序后字符串做key：所有异位词映射到同一key下", "计数法也可：26字母频率做key，避免排序O(klogk)", "哈希表value是列表：同一key下收集所有异位词"], "templateCode": "def groupAnagrams(self, strs):\n    from collections import defaultdict\n    groups = defaultdict(list)\n    for s in strs:\n        key = ''.join(sorted(s))\n        groups[key].append(s)\n    return list(groups.values())", "optimizedCode": "def groupAnagrams(self, strs):\n    # 计数法做key，避免每个串排序的O(klogk)开销\n    from collections import defaultdict\n    groups = defaultdict(list)\n    for s in strs:\n        count = [0]*26\n        for c in s:\n            count[ord(c)-ord('a')] += 1\n        groups[tuple(count)].append(s)\n    return list(groups.values())"}, {"id": 238, "name": "除自身以外数组的乘积", "difficulty": "Medium", "insights": ["结果[i]=左半乘积×右半乘积，不含nums[i]自身", "两遍扫描：左→右累乘左侧积，右→左累乘右侧积", "不可用除法：0元素导致除零，且题目要求O(1)额外空间", "输出数组不算额外空间：先用输出数组存左侧积，再从右累乘"], "templateCode": "def productExceptSelf(self, nums):\n    n = len(nums)\n    left = [1]*n\n    right = [1]*n\n    for i in range(1, n):\n        left[i] = left[i-1]*nums[i-1]\n    for i in range(n-2, -1, -1):\n        right[i] = right[i+1]*nums[i+1]\n    return [left[i]*right[i] for i in range(n)]", "optimizedCode": "def productExceptSelf(self, nums):\n    # 输出数组存左积，变量从右累乘右积，O(1)额外空间\n    n = len(nums)\n    ans = [1]*n\n    for i in range(1, n):\n        ans[i] = ans[i-1]*nums[i-1]\n    right = 1\n    for i in range(n-1, -1, -1):\n        ans[i] *= right\n        right *= nums[i]\n    return ans"}, {"id": 146, "name": "LRU缓存", "difficulty": "Medium", "insights": ["LRU=最近最少使用：容量满时淘汰最久未访问的", "哈希表+双向链表：O(1)查找+O(1)移动到头部/删除尾部", "访问=移到头部：每次get/put都更新位置", "伪头尾节点：避免处理边界条件（空链表/只有一个节点）"], "templateCode": "class LRUCache:\n    def __init__(self, capacity):\n        self.cap = capacity\n        self.cache = {}\n        self.order = []\n    def get(self, key):\n        if key not in self.cache: return -1\n        self.order.remove(key)\n        self.order.append(key)\n        return self.cache[key]\n    def put(self, key, value):\n        if key in self.cache:\n            self.order.remove(key)\n        elif len(self.cache)>=self.cap:\n            old = self.order.pop(0)\n            del self.cache[old]\n        self.cache[key] = value\n        self.order.append(key)", "optimizedCode": "class LRUCache:\n    # 哈希+双向链表，O(1)的get/put\n    class Node:\n        def __init__(self, k=0, v=0):\n            self.key, self.val, self.prev, self.next = k, v, None, None\n    def __init__(self, capacity):\n        self.cap = capacity\n        self.cache = {}\n        self.head, self.tail = self.Node(), self.Node()\n        self.head.next = self.tail\n        self.tail.prev = self.head\n    def _remove(self, node):\n        node.prev.next = node.next\n        node.next.prev = node.prev\n    def _add(self, node):\n        node.prev = self.head\n        node.next = self.head.next\n        self.head.next.prev = node\n        self.head.next = node\n    def get(self, key):\n        if key not in self.cache: return -1\n        node = self.cache[key]\n        self._remove(node); self._add(node)\n        return node.val\n    def put(self, key, value):\n        if key in self.cache:\n            self._remove(self.cache[key])\n        node = self.Node(key, value)\n        self._add(node)\n        self.cache[key] = node\n        if len(self.cache) > self.cap:\n            lru = self.tail.prev\n            self._remove(lru)\n            del self.cache[lru.key]"}, {"id": 347, "name": "前K个高频元素", "difficulty": "Medium", "insights": ["先计数再选前K：哈希表统计频率，再按频率取TopK", "堆选TopK：小根堆维持K个最大，O(nlogk)优于排序O(nlogn)", "桶排序O(n)：频率范围[1,n]，按频率建桶再从高到低取", "注意返回顺序任意：题目不要求按频率排序返回"], "templateCode": "def topKFrequent(self, nums, k):\n    from collections import Counter\n    count = Counter(nums)\n    sorted_items = sorted(count.items(), key=lambda x: -x[1])\n    return [item[0] for item in sorted_items[:k]]", "optimizedCode": "def topKFrequent(self, nums, k):\n    # 桶排序：频率作为索引，O(n)时间\n    from collections import Counter\n    count = Counter(nums)\n    buckets = [[] for _ in range(len(nums)+1)]\n    for num, freq in count.items():\n        buckets[freq].append(num)\n    res = []\n    for i in range(len(buckets)-1, -1, -1):\n        for num in buckets[i]:\n            res.append(num)\n            if len(res)==k: return res\n    return res"}]}, {"category": "指针的操控 (链表)", "categoryEssence": "链表只能单向逐节点访问，所有操作的本质都是指针的重定向。", "template": {"title": "链表双指针统一框架", "explain": "<strong>双指针模式</strong>：<br>• <strong>快慢指针</strong>：找中点、判环、找环入口<br>• <strong>前后指针</strong>：删除倒数第N个、反转链表<br>• <strong>双链表指针</strong>：合并有序链表、相交链表<br><br><strong>哨兵节点</strong>：dummy节点统一处理头节点特殊情况", "code": "def find_middle(head):\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    return slow\n\ndef reverse(head):\n    prev = None\n    curr = head\n    while curr:\n        nxt = curr.next\n        curr.next = prev\n        prev = curr\n        curr = nxt\n    return prev"}, "problems": [{"id": 206, "name": "反转链表", "difficulty": "Easy", "insights": ["反转=每个节点的next指向前驱而非后继", "三指针法：prev/cur/nxt，逐个反转指向", "递归本质：反转后半段，head.next.next=head", "头插法：遍历逐个插入新链表头部"], "templateCode": "def reverseList(self, head):\n    prev = None\n    cur = head\n    while cur:\n        nxt = cur.next\n        cur.next = prev\n        prev = cur\n        cur = nxt\n    return prev", "optimizedCode": "def reverseList(self, head):\n    # 递归：反转head之后的部分，再把head接到末尾\n    if not head or not head.next:\n        return head\n    new_head = self.reverseList(head.next)\n    head.next.next = head\n    head.next = None\n    return new_head"}, {"id": 141, "name": "环形链表", "difficulty": "Easy", "insights": ["快慢指针：快指针每次走2步，慢指针走1步", "有环必相遇：环内快指针每轮追慢指针1步，终将相遇", "无环则快指针先到末尾：快指针走到None即无环", "哈希表也可：遍历记录已访问节点，重复访问即有环"], "templateCode": "def hasCycle(self, head):\n    seen = set()\n    cur = head\n    while cur:\n        if cur in seen: return True\n        seen.add(cur)\n        cur = cur.next\n    return False", "optimizedCode": "def hasCycle(self, head):\n    # Floyd快慢指针，O(1)空间\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow is fast:\n            return True\n    return False"}, {"id": 21, "name": "合并两个有序链表", "difficulty": "Easy", "insights": ["双指针分别遍历两链表：谁小取谁后移", "递归天然合并：l1小则l1.next=merge(l1.next,l2)", "哑节点简化头节点处理：不需要单独处理第一个节点", "一方用完直接接另一方：剩余部分已有序无需再处理"], "templateCode": "def mergeTwoLists(self, l1, l2):\n    dummy = ListNode(0)\n    cur = dummy\n    while l1 and l2:\n        if l1.val <= l2.val:\n            cur.next = l1\n            l1 = l1.next\n        else:\n            cur.next = l2\n            l2 = l2.next\n        cur = cur.next\n    cur.next = l1 if l1 else l2\n    return dummy.next", "optimizedCode": "def mergeTwoLists(self, l1, l2):\n    # 递归：小者.next指向剩余合并结果\n    if not l1: return l2\n    if not l2: return l1\n    if l1.val <= l2.val:\n        l1.next = self.mergeTwoLists(l1.next, l2)\n        return l1\n    else:\n        l2.next = self.mergeTwoLists(l1, l2.next)\n        return l2"}, {"id": 2, "name": "两数相加", "difficulty": "Medium", "insights": ["链表逆序存储：个位在头，天然对齐从低位开始加", "逐位相加+进位：carry=sum//10，当前位=sum%10", "最高位进位：循环结束后carry>0需额外节点", "两链表长度不同：短链高位补0继续加"], "templateCode": "def addTwoNumbers(self, l1, l2):\n    dummy = ListNode(0)\n    cur = dummy\n    carry = 0\n    while l1 or l2 or carry:\n        v1 = l1.val if l1 else 0\n        v2 = l2.val if l2 else 0\n        s = v1+v2+carry\n        carry = s//10\n        cur.next = ListNode(s%10)\n        cur = cur.next\n        l1 = l1.next if l1 else None\n        l2 = l2.next if l2 else None\n    return dummy.next", "optimizedCode": "def addTwoNumbers(self, l1, l2):\n    # 逐位相加+进位，短链自动补0\n    carry = 0\n    dummy = cur = ListNode(0)\n    while l1 or l2 or carry:\n        if l1: carry += l1.val; l1 = l1.next\n        if l2: carry += l2.val; l2 = l2.next\n        cur.next = ListNode(carry % 10)\n        cur = cur.next\n        carry //= 10\n    return dummy.next"}, {"id": 19, "name": "删除链表的倒数第N个结点", "difficulty": "Medium", "insights": ["倒数第N=正数len-N+1，但不知道长度", "快慢指针：快指针先走N步，然后同步走，快到尾时慢在目标前一个", "哑节点：处理删除头节点的边界情况", "fast先走n+1步：slow停在待删节点的前驱，方便删除"], "templateCode": "def removeNthFromEnd(self, head, n):\n    nodes = []\n    cur = head\n    while cur:\n        nodes.append(cur)\n        cur = cur.next\n    idx = len(nodes)-n\n    if idx==0: return head.next\n    nodes[idx-1].next = nodes[idx].next\n    return head", "optimizedCode": "def removeNthFromEnd(self, head, n):\n    # 快慢指针+哑节点，一遍扫描O(n)O(1)\n    dummy = ListNode(0, head)\n    fast = slow = dummy\n    for _ in range(n+1):\n        fast = fast.next\n    while fast:\n        fast = fast.next\n        slow = slow.next\n    slow.next = slow.next.next\n    return dummy.next"}, {"id": 160, "name": "相交链表", "difficulty": "Easy", "insights": ["相交=两链表在某节点后完全重合，不是交叉而是合并", "长度的差异是关键：长链表先走差值步再同步走", "指针互换走两遍：pA走完A走B，pB走完B走A，必在交点相遇或同时到None", "互换走两遍等距：a独有+c+b独有 = b独有+c+a独有"], "templateCode": "def getIntersectionNode(self, headA, headB):\n    curA = headA\n    while curA:\n        curB = headB\n        while curB:\n            if curA is curB: return curA\n            curB = curB.next\n        curA = curA.next\n    return None", "optimizedCode": "def getIntersectionNode(self, headA, headB):\n    # 指针互换走两遍，等距必在交点相遇\n    a, b = headA, headB\n    while a is not b:\n        a = a.next if a else headB\n        b = b.next if b else headA\n    return a"}, {"id": 148, "name": "排序链表", "difficulty": "Medium", "insights": ["要求O(nlogn)+O(1)空间：归并排序最适合链表", "找中点用快慢指针：快到尾慢在中点，断开成两半", "递归归并：分到单个节点再两两合并", "自底向上迭代归并：O(1)空间，步长从1倍增"], "templateCode": "def sortList(self, head):\n    if not head or not head.next: return head\n    # find mid\n    slow, fast = head, head.next\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    mid = slow.next\n    slow.next = None\n    left = self.sortList(head)\n    right = self.sortList(mid)\n    # merge\n    dummy = ListNode(0)\n    cur = dummy\n    while left and right:\n        if left.val <= right.val:\n            cur.next = left; left = left.next\n        else:\n            cur.next = right; right = right.next\n        cur = cur.next\n    cur.next = left or right\n    return dummy.next", "optimizedCode": "def sortList(self, head):\n    # 自底向上归并，O(1)空间\n    if not head or not head.next: return head\n    n = 0; cur = head\n    while cur: n += 1; cur = cur.next\n    dummy = ListNode(0, head)\n    step = 1\n    while step < n:\n        prev = dummy; cur = dummy.next\n        while cur:\n            left = cur\n            right = self._split(left, step)\n            cur = self._split(right, step)\n            prev = self._merge(prev, left, right)\n        step *= 2\n    return dummy.next\ndef _split(self, head, step):\n    for _ in range(step-1):\n        if head: head = head.next\n    if not head: return None\n    nxt = head.next; head.next = None; return nxt\ndef _merge(self, prev, l1, l2):\n    cur = prev\n    while l1 and l2:\n        if l1.val<=l2.val: cur.next=l1; l1=l1.next\n        else: cur.next=l2; l2=l2.next\n        cur = cur.next\n    cur.next = l1 or l2\n    while cur.next: cur = cur.next\n    return cur"}, {"id": 234, "name": "回文链表", "difficulty": "Easy", "insights": ["回文=正反读相同，链表无法从后向前读", "找中点+反转后半+比较：快慢指针找中点，反转后半段逐个比较", "恢复链表：比较完后可再反转回来保持原结构", "转数组双指针：简单但O(n)空间，不满足进阶要求"], "templateCode": "def isPalindrome(self, head):\n    vals = []\n    cur = head\n    while cur:\n        vals.append(cur.val)\n        cur = cur.next\n    return vals == vals[::-1]", "optimizedCode": "def isPalindrome(self, head):\n    # 快慢找中点+反转后半+比较，O(1)空间\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n    # 反转后半段\n    prev = None\n    while slow:\n        nxt = slow.next\n        slow.next = prev\n        prev = slow\n        slow = nxt\n    # 比较前后半段\n    while prev:\n        if head.val != prev.val: return False\n        head = head.next\n        prev = prev.next\n    return True"}, {"id": 142, "name": "环形链表II", "difficulty": "Medium", "insights": ["141的延伸：不仅要判环还要找环入口", "相遇点到入口的距离=头到入口的距离（数学推导）", "快指针走2步慢指针1步：第一次相遇后，一指针回起点同步走必在入口相遇", "设a=头到入口,b=入口到相遇：2(a+b)=a+b+kb → a=kb-b"], "templateCode": "def detectCycle(self, head):\n    seen = set()\n    cur = head\n    while cur:\n        if cur in seen: return cur\n        seen.add(cur)\n        cur = cur.next\n    return None", "optimizedCode": "def detectCycle(self, head):\n    # Floyd：快慢相遇后，一指针回起点同步走，再遇即入口\n    slow = fast = head\n    while fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n        if slow is fast:\n            slow = head\n            while slow is not fast:\n                slow = slow.next\n                fast = fast.next\n            return slow\n    return None"}, {"id": 92, "name": "反转链表II", "difficulty": "Medium", "insights": ["反转[left,right]区间：先定位left前驱和right后继", "切断→反转→重连：left前驱接反转后头，反转后尾接right后继", "哑节点简化left=1：不需特殊处理头节点", "头插法也可：逐个把节点插到left前驱后面"], "templateCode": "def reverseBetween(self, head, left, right):\n    dummy = ListNode(0, head)\n    prev = dummy\n    for _ in range(left-1):\n        prev = prev.next\n    # collect nodes to reverse\n    nodes = []\n    cur = prev.next\n    for _ in range(right-left+1):\n        nodes.append(cur)\n        cur = cur.next\n    # reverse and reconnect\n    for node in reversed(nodes):\n        prev.next = node\n        prev = prev.next\n    prev.next = cur\n    return dummy.next", "optimizedCode": "def reverseBetween(self, head, left, right):\n    # 头插法：逐个把right范围内的节点插到prev后面\n    dummy = ListNode(0, head)\n    prev = dummy\n    for _ in range(left-1):\n        prev = prev.next\n    cur = prev.next\n    for _ in range(right-left):\n        nxt = cur.next\n        cur.next = nxt.next\n        nxt.next = prev.next\n        prev.next = nxt\n    return dummy.next"}, {"id": 25, "name": "K个一组翻转链表", "difficulty": "Hard", "insights": ["每K个节点一组反转，不足K个保持原序", "递归：先数K个，反转后head.next接递归结果，返回新头", "迭代：外层循环按组遍历，内层头插法反转K个节点", "组间连接：上一组尾接本组新头，本组旧头(新尾)接下一组"], "templateCode": "def reverseKGroup(self, head, k):\n    def reverse(head, k):\n        prev = None\n        cur = head\n        for _ in range(k):\n            nxt = cur.next\n            cur.next = prev\n            prev = cur\n            cur = nxt\n        return prev, head, cur\n    def get_kth(node, k):\n        while node and k > 1:\n            node = node.next\n            k -= 1\n        return node\n    dummy = ListNode(0, head)\n    prev_group = dummy\n    while True:\n        kth = get_kth(prev_group.next, k)\n        if not kth: break\n        next_group = kth.next\n        new_head, new_tail, _ = reverse(prev_group.next, k)\n        prev_group.next = new_head\n        new_tail.next = next_group\n        prev_group = new_tail\n    return dummy.next", "optimizedCode": "def reverseKGroup(self, head, k):\n    # 递归：先走到第K个节点，反转K个后接递归结果\n    cur = head\n    count = 0\n    while cur and count < k:\n        cur = cur.next\n        count += 1\n    if count < k: return head  # 不足K个不反转\n    prev, cur = None, head\n    for _ in range(k):\n        nxt = cur.next\n        cur.next = prev\n        prev = cur\n        cur = nxt\n    head.next = self.reverseKGroup(cur, k)  # 旧头接下一组\n    return prev  # 新头"}, {"id": 138, "name": "随机链表的复制", "difficulty": "Medium", "insights": ["random指针使普通深拷贝复杂：目标节点的random可能尚未创建", "哈希映射旧→新：第二次遍历设置random时通过映射查找", "交织法：在每个原节点后插入副本，random指向原random.next", "交织法O(1)空间：不需要额外哈希表，拆分后恢复原链表"], "templateCode": "def copyRandomList(self, head):\n    if not head: return None\n    memo = {}\n    cur = head\n    while cur:\n        memo[cur] = Node(cur.val)\n        cur = cur.next\n    cur = head\n    while cur:\n        memo[cur].next = memo.get(cur.next)\n        memo[cur].random = memo.get(cur.random)\n        cur = cur.next\n    return memo[head]", "optimizedCode": "def copyRandomList(self, head):\n    # 交织法：原节点后插副本，random=原.random.next，O(1)空间\n    if not head: return None\n    # 插入副本\n    cur = head\n    while cur:\n        nxt = cur.next\n        cur.next = Node(cur.val, nxt, None)\n        cur = nxt\n    # 设置random\n    cur = head\n    while cur:\n        if cur.random:\n            cur.next.random = cur.random.next\n        cur = cur.next.next\n    # 拆分\n    cur = head\n    copy = head.next\n    while cur:\n        nxt = cur.next\n        cur.next = nxt.next\n        nxt.next = cur.next.next if cur.next else None\n        cur = cur.next\n    return copy"}, {"id": 143, "name": "重排链表", "difficulty": "Medium", "insights": ["重排=L0→Ln→L1→Ln-1→...：前半正序后半逆序交替", "三步走：找中点→反转后半→合并两链表", "快慢找中点：偶数节点时前半多一个", "合并时交替取节点：两个指针分别从两头走"], "templateCode": "def reorderList(self, head):\n    if not head: return\n    nodes = []\n    cur = head\n    while cur:\n        nodes.append(cur)\n        cur = cur.next\n    i, j = 0, len(nodes)-1\n    while i < j:\n        nodes[i].next = nodes[j]\n        i += 1\n        if i == j: break\n        nodes[j].next = nodes[i]\n        j -= 1\n    nodes[i].next = None", "optimizedCode": "def reorderList(self, head):\n    # 找中点+反转后半+交替合并，O(1)空间\n    if not head or not head.next: return\n    # 找中点\n    slow = fast = head\n    while fast.next and fast.next.next:\n        slow = slow.next; fast = fast.next.next\n    # 反转后半\n    prev, cur = None, slow.next\n    slow.next = None\n    while cur:\n        nxt = cur.next\n        cur.next = prev\n        prev = cur\n        cur = nxt\n    # 交替合并\n    l1, l2 = head, prev\n    while l2:\n        n1, n2 = l1.next, l2.next\n        l1.next = l2\n        l2.next = n1\n        l1, l2 = n1, n2"}]}, {"category": "顺序约束（栈）", "categoryEssence": "栈维护'最近未处理的约束'——后进先出，保证嵌套结构中内层优先被处理。", "template": {"title": "栈统一框架", "explain": "<strong>模式</strong>：<br>• <strong>括号匹配</strong>：左括号压栈，右括号弹栈比对<br>• <strong>单调栈</strong>：维护单调序列，不满足时弹栈处理<br>• <strong>表达式求值</strong>：运算符栈+操作数栈<br>• <strong>嵌套解码</strong>：遇到'['压栈保存外层状态，遇到']'弹栈合并", "code": "def stack_framework(s):\n    stack = []\n    for ch in s:\n        if 需要压栈(ch):\n            stack.append(ch)\n        elif 需要弹栈(ch):\n            while stack and 弹栈条件(stack[-1], ch):\n                top = stack.pop()\n                处理(top, ch)\n            stack.append(ch)\n    return 结果"}, "problems": [{"id": 20, "name": "有效的括号", "difficulty": "简单", "insights": ["括号匹配的本质：右括号必须与最近的未匹配左括号配对，后进先出=栈", "为什么不能用计数器：同类型括号计数可以通过，但不同类型交叉如([)]会误判", "栈中只存左括号：遇到右括号时栈顶必须是对应左括号，否则不匹配", "最终栈必须为空：所有左括号都必须被匹配，多余左括号=栈非空"], "templateCode": "class Solution:\n    def isValid(self, s: str) -> bool:\n        # 模板：栈匹配，遇到右括号逐个检查栈顶\n        pairs = {'(': ')', '[': ']', '{': '}'}\n        stack = []\n        for ch in s:\n            if ch in pairs:\n                stack.append(ch)\n            else:\n                if not stack or pairs[stack.pop()] != ch:\n                    return False\n        return len(stack) == 0", "optimizedCode": "class Solution:\n    def isValid(self, s: str) -> bool:\n        # 优化：提前判断奇数长度必然不匹配，用栈存右括号直接比较\n        if len(s) % 2 == 1:\n            return False\n        pairs = {'(': ')', '[': ']', '{': '}'}\n        stack = []\n        for ch in s:\n            if ch in pairs:\n                # 存对应的右括号，弹出时直接比\n                stack.append(pairs[ch])\n            elif not stack or stack.pop() != ch:\n                return False\n        return not stack"}, {"id": 394, "name": "字符串解码", "difficulty": "中等", "insights": ["嵌套结构天然递归：k[encoded]中的encoded本身又是同结构问题", "用栈模拟递归：遇到[压栈保存当前状态，遇到]弹栈合并结果", "需要保存两个状态：倍数和前缀字符串，分别用两个栈或一个栈存元组", "数字可能多位：从左到右累积解析数字，不能只取单个字符"], "templateCode": "class Solution:\n    def decodeString(self, s: str) -> str:\n        # 模板：递归解法，遇到[递归进入，遇到]返回\n        def dfs(i):\n            res = ''\n            num = 0\n            while i < len(s):\n                if s[i].isdigit():\n                    num = num * 10 + int(s[i])\n                elif s[i] == '[':\n                    inner, i = dfs(i + 1)\n                    res += inner * num\n                    num = 0\n                elif s[i] == ']':\n                    return res, i\n                else:\n                    res += s[i]\n                i += 1\n            return res, i\n        return dfs(0)[0]", "optimizedCode": "class Solution:\n    def decodeString(self, s: str) -> str:\n        # 优化：迭代+栈，避免递归栈开销，一次遍历完成\n        num_stack = []\n        str_stack = []\n        cur_num = 0\n        cur_str = ''\n        for ch in s:\n            if ch.isdigit():\n                cur_num = cur_num * 10 + int(ch)\n            elif ch == '[':\n                # 压栈保存外层状态\n                num_stack.append(cur_num)\n                str_stack.append(cur_str)\n                cur_num = 0\n                cur_str = ''\n            elif ch == ']':\n                # 弹栈合并：前缀 + 当前串重复n次\n                cur_str = str_stack.pop() + cur_str * num_stack.pop()\n            else:\n                cur_str += ch\n        return cur_str"}, {"id": 94, "name": "二叉树的中序遍历", "difficulty": "简单", "insights": ["中序=左→根→右：递归自然表达这个顺序，迭代需要手动模拟调用栈", "迭代的核心：一直往左走到底入栈，弹出访问，然后转向右子树", "为什么莫里斯遍历能O(1)空间：利用空闲的右指针建立线索，遍历完拆除", "三种遍历统一框架：前/中/后序只是访问节点的时机不同，栈结构相同"], "templateCode": "class Solution:\n    def inorderTraversal(self, root: Optional[TreeNode]) -> List[int]:\n        # 模板：递归中序遍历\n        res = []\n        def dfs(node):\n            if not node:\n                return\n            dfs(node.left)\n            res.append(node.val)\n            dfs(node.right)\n        dfs(root)\n        return res", "optimizedCode": "class Solution:\n    def inorderTraversal(self, root: Optional[TreeNode]) -> List[int]:\n        # 优化：莫里斯遍历，O(1)空间，利用前驱节点的右指针做线索\n        res = []\n        cur = root\n        while cur:\n            if not cur.left:\n                # 无左子树，直接访问\n                res.append(cur.val)\n                cur = cur.right\n            else:\n                # 找前驱：左子树最右节点\n                prev = cur.left\n                while prev.right and prev.right != cur:\n                    prev = prev.right\n                if not prev.right:\n                    # 建立线索：前驱右指针指向当前\n                    prev.right = cur\n                    cur = cur.left\n                else:\n                    # 线索已存在=左子树遍历完，拆除线索并访问\n                    prev.right = None\n                    res.append(cur.val)\n                    cur = cur.right\n        return res"}]}, {"category": "单调空间的搜索（二分）", "categoryEssence": "在有序空间上每步淘汰一半——将线性搜索降维为对数搜索。", "template": {"title": "二分搜索统一框架", "explain": "<strong>三种模板</strong>：<br>• <strong>精确匹配</strong>：找到即返回<br>• <strong>左边界(lower_bound)</strong>：第一个≥target，找到后right=mid-1继续收缩<br>• <strong>右边界(upper_bound)</strong>：最后一个≤target，找到后left=mid+1继续收缩<br><br><strong>二分答案</strong>：将'求最优解'转化为'验证某个值是否可行'——值域上二分+单调判断函数", "code": "def lower_bound(nums, target):\n    left, right = 0, len(nums) - 1\n    while left <= right:\n        mid = left + (right - left) // 2\n        if nums[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return left"}, "problems": [{"id": 33, "name": "搜索旋转排序数组", "difficulty": "中等", "insights": ["旋转的本质：一刀把有序数组切成两段，每段内部仍有序", "二分仍然有效：mid一定能将数组分成一有序一无序两半", "关键判断：通过nums[mid]和nums[left]的大小判断哪半有序", "有序的那半可以精确判断target是否在其中，从而缩小范围"], "templateCode": "class Solution:\n    def search(self, nums: List[int], target: int) -> int:\n        # 模板：暴力遍历\n        for i, num in enumerate(nums):\n            if num == target:\n                return i\n        return -1", "optimizedCode": "class Solution:\n    def search(self, nums: List[int], target: int) -> int:\n        # 优化：二分，判断哪半有序来缩小范围\n        left, right = 0, len(nums) - 1\n        while left <= right:\n            mid = (left + right) // 2\n            if nums[mid] == target:\n                return mid\n            # 左半有序\n            if nums[left] <= nums[mid]:\n                if nums[left] <= target < nums[mid]:\n                    right = mid - 1\n                else:\n                    left = mid + 1\n            # 右半有序\n            else:\n                if nums[mid] < target <= nums[right]:\n                    left = mid + 1\n                else:\n                    right = mid - 1\n        return -1"}, {"id": 34, "name": "在排序数组中查找元素的第一个和最后一个位置", "difficulty": "中等", "insights": ["本质是两次二分：找左边界和找右边界的逻辑不对称", "找左边界：nums[mid]>=target时收缩右边界，最终left就是第一个出现位置", "找右边界：nums[mid]<=target时收缩左边界，最终right就是最后出现位置", "统一的lower_bound/upper_bound框架：熟练掌握一个模板，两次调用即可"], "templateCode": "class Solution:\n    def searchRange(self, nums: List[int], target: int) -> List[int]:\n        # 模板：线性扫描找左右边界\n        left, right = -1, -1\n        for i, num in enumerate(nums):\n            if num == target:\n                if left == -1:\n                    left = i\n                right = i\n        return [left, right]", "optimizedCode": "class Solution:\n    def searchRange(self, nums: List[int], target: int) -> List[int]:\n        # 优化：二分找左边界+二分找右边界\n        def find_left():\n            lo, hi = 0, len(nums) - 1\n            res = -1\n            while lo <= hi:\n                mid = (lo + hi) // 2\n                if nums[mid] >= target:\n                    hi = mid - 1\n                else:\n                    lo = mid + 1\n                if nums[mid] == target:\n                    res = mid\n            return res\n\n        def find_right():\n            lo, hi = 0, len(nums) - 1\n            res = -1\n            while lo <= hi:\n                mid = (lo + hi) // 2\n                if nums[mid] <= target:\n                    lo = mid + 1\n                else:\n                    hi = mid - 1\n                if nums[mid] == target:\n                    res = mid\n            return res\n\n        if not nums:\n            return [-1, -1]\n        return [find_left(), find_right()]"}, {"id": 153, "name": "寻找旋转排序数组中的最小值", "difficulty": "中等", "insights": ["最小值在旋转点：旋转后最小值右侧的所有值都小于最左端的值", "与nums[right]比较：若nums[mid]>nums[right]，最小值在右半；否则在左半含mid", "为什么不和nums[left]比：当数组未旋转时，nums[mid]>nums[left]无法判断方向", "right收缩策略：nums[mid]<nums[right]时right=mid而非mid-1，因为mid可能就是答案"], "templateCode": "class Solution:\n    def findMin(self, nums: List[int]) -> int:\n        # 模板：线性扫描找最小值\n        return min(nums)", "optimizedCode": "class Solution:\n    def findMin(self, nums: List[int]) -> int:\n        # 优化：二分，与右端点比较来决定收缩方向\n        left, right = 0, len(nums) - 1\n        while left < right:\n            mid = (left + right) // 2\n            # mid大于right，最小值在右半\n            if nums[mid] > nums[right]:\n                left = mid + 1\n            else:\n                # mid小于等于right，最小值在左半含mid\n                right = mid\n        return nums[left]"}, {"id": 4, "name": "寻找两个正序数组的中位数", "difficulty": "困难", "insights": ["中位数=第k小的扩展：奇数找第(n+1)/2小，偶数找第n/2和n/2+1小的平均", "归并到第k个即可：不需要完整归并，每次排除k/2个元素", "双数组第k小的递归：比较两数组第k/2个元素，小的那半不可能包含答案", "每次排除一半：从O(m+n)降到O(log(m+n))，本质是对k做二分"], "templateCode": "class Solution:\n    def findMedianSortedArrays(self, nums1: List[int], nums2: List[int]) -> float:\n        # 模板：归并后取中位数\n        merged = []\n        i = j = 0\n        while i < len(nums1) and j < len(nums2):\n            if nums1[i] <= nums2[j]:\n                merged.append(nums1[i])\n                i += 1\n            else:\n                merged.append(nums2[j])\n                j += 1\n        merged.extend(nums1[i:])\n        merged.extend(nums2[j:])\n        n = len(merged)\n        if n % 2:\n            return merged[n // 2]\n        return (merged[n // 2 - 1] + merged[n // 2]) / 2", "optimizedCode": "class Solution:\n    def findMedianSortedArrays(self, nums1: List[int], nums2: List[int]) -> float:\n        # 优化：二分找第k小，每次排除k/2个元素\n        def find_kth(a, b, k):\n            if not a:\n                return b[k - 1]\n            if not b:\n                return a[k - 1]\n            if k == 1:\n                return min(a[0], b[0])\n            i = min(len(a), k // 2) - 1\n            j = min(len(b), k // 2) - 1\n            if a[i] <= b[j]:\n                return find_kth(a[i + 1:], b, k - (i + 1))\n            else:\n                return find_kth(a, b[j + 1:], k - (j + 1))\n\n        total = len(nums1) + len(nums2)\n        if total % 2:\n            return find_kth(nums1, nums2, total // 2 + 1)\n        return (find_kth(nums1, nums2, total // 2) +\n                find_kth(nums1, nums2, total // 2 + 1)) / 2"}, {"id": 69, "name": "x的平方根", "difficulty": "简单", "insights": ["本质：找最大的k使得k²≤x，这是下界二分", "为什么不是精确查找：完全平方数只是特例，一般情况取整后就是答案", "乘法溢出风险：mid*mid可能超过int范围，用mid<=x//mid代替", "牛顿迭代更快：x²=a→f(x)=x²-a=0，迭代x=(x+a/x)/2二次收敛"], "templateCode": "class Solution:\n    def mySqrt(self, x: int) -> int:\n        # 模板：从0遍历到x找最大的i使得i*i<=x\n        ans = 0\n        for i in range(x + 1):\n            if i * i <= x:\n                ans = i\n            else:\n                break\n        return ans", "optimizedCode": "class Solution:\n    def mySqrt(self, x: int) -> int:\n        # 优化：二分查找，找最大的mid使得mid*mid<=x\n        if x <= 1:\n            return x\n        left, right = 1, x\n        while left <= right:\n            mid = (left + right) // 2\n            # 用除法避免乘法溢出\n            if mid <= x // mid:\n                left = mid + 1\n            else:\n                right = mid - 1\n        return right"}, {"id": 162, "name": "寻找峰值", "difficulty": "中等", "insights": ["峰值存在性：nums[-1]=nums[n]=-∞，保证至少一个峰值，无需担心边界", "爬坡法：只要往梯度上升方向走，一定能到达某个峰值", "二分依据：mid与mid+1的大小关系决定哪侧必有峰值", "不需要全局最大：任何局部峰值都满足条件，所以二分可行"], "templateCode": "class Solution:\n    def findPeakElement(self, nums: List[int]) -> int:\n        # 模板：线性扫描找第一个峰值\n        for i in range(len(nums) - 1):\n            if nums[i] > nums[i + 1]:\n                return i\n        return len(nums) - 1", "optimizedCode": "class Solution:\n    def findPeakElement(self, nums: List[int]) -> int:\n        # 优化：二分爬坡，O(log n)\n        left, right = 0, len(nums) - 1\n        while left < right:\n            mid = (left + right) // 2\n            # mid比右边小，右侧必有峰值（爬坡）\n            if nums[mid] < nums[mid + 1]:\n                left = mid + 1\n            else:\n                # mid比右边大，mid或左侧有峰值\n                right = mid\n        return left"}, {"id": 35, "name": "搜索插入位置", "difficulty": "简单", "insights": ["本质是lower_bound：找第一个≥target的位置", "二分终止时left就是答案：无论target存在与否，left都指向正确插入位置", "为什么left是答案：循环不变量保证[left,right]外左侧全<target，右侧全>target", "最简二分模板：此题是二分入门，掌握left/right收缩逻辑是关键"], "templateCode": "class Solution:\n    def searchInsert(self, nums: List[int], target: int) -> int:\n        # 模板：线性扫描找第一个>=target的位置\n        for i, num in enumerate(nums):\n            if num >= target:\n                return i\n        return len(nums)", "optimizedCode": "class Solution:\n    def searchInsert(self, nums: List[int], target: int) -> int:\n        # 优化：二分找lower_bound\n        left, right = 0, len(nums) - 1\n        while left <= right:\n            mid = (left + right) // 2\n            if nums[mid] < target:\n                left = mid + 1\n            else:\n                right = mid - 1\n        return left"}, {"id": 367, "name": "有效的完全平方数", "difficulty": "简单", "insights": ["等价于判断sqrt(num)是否为整数，即二分找k使得k²=num", "利用完全平方数的数学性质：1+3+5+...+(2n-1)=n²", "与LC69的区别：LC69取整即可，此题必须精确等于", "牛顿迭代判断：收敛后检查结果是否自洽"], "templateCode": "class Solution:\n    def isPerfectSquare(self, num: int) -> bool:\n        # 模板：从1遍历到num检查i*i==num\n        i = 1\n        while i * i <= num:\n            if i * i == num:\n                return True\n            i += 1\n        return False", "optimizedCode": "class Solution:\n    def isPerfectSquare(self, num: int) -> bool:\n        # 优化：二分查找精确匹配\n        left, right = 1, num\n        while left <= right:\n            mid = (left + right) // 2\n            sq = mid * mid\n            if sq == num:\n                return True\n            elif sq < num:\n                left = mid + 1\n            else:\n                right = mid - 1\n        return False"}]}, {"category": "二值信息的并行处理（位运算）", "categoryEssence": "将整数视为独立二值通道的并行集合——每一位同时处理一个布尔判断。", "template": {"title": "位运算统一框架", "explain": "<strong>核心操作</strong>：<br>• n & (n-1)：消除最低位1（Brian Kernighan）<br>• n & (-n)：取出最低位1<br>• n ^ n = 0, n ^ 0 = n：异或消去成对项<br>• n >> 1：右移一位 = 除2<br><br><strong>DP+位运算</strong>：ans[i] = ans[i&(i-1)] + 1，利用已计算的小值推导大值", "code": "def count_bits(n):\n    count = 0\n    while n:\n        n &= n - 1\n        count += 1\n    return count\n\ndef single_number(nums):\n    res = 0\n    for num in nums:\n        res ^= num\n    return res"}, "problems": [{"id": 136, "name": "只出现一次的数字", "difficulty": "简单", "insights": ["约束的设计意图：O(n)时间O(1)空间排除了哈希和排序", "异或的自反性：a⊕a=0，成对出现的数字异或后全归零", "异或的结合律：顺序无关，所有数异或后剩下的就是只出现一次的", "0是恒等元：0⊕a=a，初始化result=0即可"], "templateCode": "class Solution:\n    def singleNumber(self, nums: List[int]) -> int:\n        # 模板：哈希计数找出现1次的\n        from collections import Counter\n        count = Counter(nums)\n        for num, cnt in count.items():\n            if cnt == 1:\n                return num\n        return -1", "optimizedCode": "class Solution:\n    def singleNumber(self, nums: List[int]) -> int:\n        # 优化：异或，成对消除，O(1)空间\n        result = 0\n        for num in nums:\n            result ^= num\n        return result"}, {"id": 191, "name": "位1的个数", "difficulty": "简单", "insights": ["朴素：逐位与1检查，但固定循环32次不管有几个1", "n&(n-1)的妙用：每次消去最低位的1，循环次数=1的个数", "Brian Kernighan算法：本质是利用减法借位特性让最低位1变0", "与n>>1逐位检查的区别：前者只遍历1的个数次，后者遍历所有位"], "templateCode": "class Solution:\n    def hammingWeight(self, n: int) -> int:\n        # 模板：逐位检查\n        count = 0\n        for i in range(32):\n            if n & (1 << i):\n                count += 1\n        return count", "optimizedCode": "class Solution:\n    def hammingWeight(self, n: int) -> int:\n        # 优化：Brian Kernighan，每次消去最低位1\n        count = 0\n        while n:\n            n &= n - 1  # 消去最低位的1\n            count += 1\n        return count"}, {"id": 338, "name": "比特位计数", "difficulty": "简单", "insights": ["对每个数单独计算是O(nlogn)，可以利用前面已算的结果", "dp[i]=dp[i>>1]+(i&1)：去掉最低位后1的个数加上最低位是否为1", "dp[i]=dp[i&(i-1)]+1：i&(i-1)比i少一个1，就是去掉最低位1后的数", "动态规划的本质：大问题的答案由小问题推出，1的个数满足这个递推"], "templateCode": "class Solution:\n    def countBits(self, n: int) -> List[int]:\n        # 模板：对每个数单独计算1的个数\n        def popcount(x):\n            count = 0\n            while x:\n                x &= x - 1\n                count += 1\n            return count\n        return [popcount(i) for i in range(n + 1)]", "optimizedCode": "class Solution:\n    def countBits(self, n: int) -> List[int]:\n        # 优化：DP，dp[i] = dp[i >> 1] + (i & 1)\n        dp = [0] * (n + 1)\n        for i in range(1, n + 1):\n            # i右移1位后的1的个数 + 最低位是否为1\n            dp[i] = dp[i >> 1] + (i & 1)\n        return dp"}, {"id": 461, "name": "汉明距离", "difficulty": "简单", "insights": ["汉明距离=两数异或后1的个数，不同位异或为1", "先异或再数1：问题转化为popcount(x^y)", "异或是度量差异的基本操作：相同为0不同为1，恰好数出差异位数", "Brian Kernighan加速：同LC191，只循环差异位数次"], "templateCode": "class Solution:\n    def hammingDistance(self, x: int, y: int) -> int:\n        # 模板：逐位比较\n        count = 0\n        for i in range(32):\n            if (x >> i & 1) != (y >> i & 1):\n                count += 1\n        return count", "optimizedCode": "class Solution:\n    def hammingDistance(self, x: int, y: int) -> int:\n        # 优化：异或+Brian Kernighan\n        xor = x ^ y\n        count = 0\n        while xor:\n            xor &= xor - 1\n            count += 1\n        return count"}]}, {"category": "空间变换（矩阵）", "categoryEssence": "矩阵问题是坐标变换——发现变换的代数规律和不变量。", "template": {"title": "矩阵操作统一框架", "explain": "<strong>常见模式</strong>：<br>• <strong>旋转</strong>：90°=转置+水平翻转<br>• <strong>螺旋遍历</strong>：四边界收缩<br>• <strong>搜索</strong>：从角落出发确定性排除行/列<br>• <strong>标记</strong>：复用矩阵自身行列作标记空间", "code": "def rotate(matrix):\n    n = len(matrix)\n    for i in range(n):\n        for j in range(i+1, n):\n            matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]\n    for i in range(n):\n        matrix[i].reverse()"}, "problems": [{"id": 48, "name": "旋转图像", "difficulty": "中等", "insights": ["90度旋转=转置+水平翻转：数学上等价于先交换i,j再翻转列", "四元素一轮转：(i,j)→(j,n-1-i)→(n-1-i,n-1-j)→(n-1-j,i)→(i,j)", "原地操作只需处理1/4：对角线把矩阵分成四块，每块对应一个旋转方向", "不能逐个替换：一次只动一个位置会覆盖后续需要的值，必须同时交换四个"], "templateCode": "class Solution:\n    def rotate(self, matrix: List[List[int]]) -> None:\n        # 模板：使用额外数组\n        n = len(matrix)\n        new_matrix = [[0] * n for _ in range(n)]\n        for i in range(n):\n            for j in range(n):\n                new_matrix[j][n - 1 - i] = matrix[i][j]\n        for i in range(n):\n            matrix[i] = new_matrix[i]", "optimizedCode": "class Solution:\n    def rotate(self, matrix: List[List[int]]) -> None:\n        # 优化：原地旋转，转置+水平翻转\n        n = len(matrix)\n        # 第一步：转置（沿主对角线交换）\n        for i in range(n):\n            for j in range(i + 1, n):\n                matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]\n        # 第二步：水平翻转每行\n        for i in range(n):\n            matrix[i].reverse()"}, {"id": 54, "name": "螺旋矩阵", "difficulty": "中等", "insights": ["模拟走法：右→下→左→上循环，每走完一条边收缩对应边界", "边界收缩模拟剥壳：top++、right--、bottom--、left++逐层剥去外圈", "终止条件：top>bottom或left>right，注意单行/单列的特殊情况", "方向数组可统一处理：用dirs=[(0,1),(1,0),(0,-1),(-1,0)]+碰壁转向"], "templateCode": "class Solution:\n    def spiralOrder(self, matrix: List[List[int]]) -> List[int]:\n        # 模板：方向数组+碰壁转向\n        if not matrix:\n            return []\n        m, n = len(matrix), len(matrix[0])\n        visited = [[False] * n for _ in range(m)]\n        dirs = [(0, 1), (1, 0), (0, -1), (-1, 0)]\n        res = []\n        r = c = d = 0\n        for _ in range(m * n):\n            res.append(matrix[r][c])\n            visited[r][c] = True\n            nr, nc = r + dirs[d][0], c + dirs[d][1]\n            if nr < 0 or nr >= m or nc < 0 or nc >= n or visited[nr][nc]:\n                d = (d + 1) % 4\n                nr, nc = r + dirs[d][0], c + dirs[d][1]\n            r, c = nr, nc\n        return res", "optimizedCode": "class Solution:\n    def spiralOrder(self, matrix: List[List[int]]) -> List[int]:\n        # 优化：边界收缩法，O(1)额外空间（不含输出）\n        if not matrix:\n            return []\n        top, bottom = 0, len(matrix) - 1\n        left, right = 0, len(matrix[0]) - 1\n        res = []\n        while top <= bottom and left <= right:\n            # 向右\n            for j in range(left, right + 1):\n                res.append(matrix[top][j])\n            top += 1\n            # 向下\n            for i in range(top, bottom + 1):\n                res.append(matrix[i][right])\n            right -= 1\n            # 向左（需检查是否还有行）\n            if top <= bottom:\n                for j in range(right, left - 1, -1):\n                    res.append(matrix[bottom][j])\n                bottom -= 1\n            # 向上（需检查是否还有列）\n            if left <= right:\n                for i in range(bottom, top - 1, -1):\n                    res.append(matrix[i][left])\n                left += 1\n        return res"}, {"id": 73, "name": "矩阵置零", "difficulty": "中等", "insights": ["朴素用额外O(m+n)数组记录哪些行列为零", "O(1)空间的关键：用矩阵第一行和第一列作为标记数组", "先记录第一行第一列原始状态：它们本身可能含零，需要额外两个变量", "两遍扫描：先标记后置零，不能边扫描边置零会污染标记"], "templateCode": "class Solution:\n    def setZeroes(self, matrix: List[List[int]]) -> None:\n        # 模板：额外数组记录零行零列\n        m, n = len(matrix), len(matrix[0])\n        rows, cols = set(), set()\n        for i in range(m):\n            for j in range(n):\n                if matrix[i][j] == 0:\n                    rows.add(i)\n                    cols.add(j)\n        for i in rows:\n            for j in range(n):\n                matrix[i][j] = 0\n        for j in cols:\n            for i in range(m):\n                matrix[i][j] = 0", "optimizedCode": "class Solution:\n    def setZeroes(self, matrix: List[List[int]]) -> None:\n        # 优化：用第一行第一列做标记，O(1)额外空间\n        m, n = len(matrix), len(matrix[0])\n        first_row_zero = any(matrix[0][j] == 0 for j in range(n))\n        first_col_zero = any(matrix[i][0] == 0 for i in range(m))\n        # 用第一行第一列记录标记\n        for i in range(1, m):\n            for j in range(1, n):\n                if matrix[i][j] == 0:\n                    matrix[i][0] = 0\n                    matrix[0][j] = 0\n        # 根据标记置零\n        for i in range(1, m):\n            for j in range(1, n):\n                if matrix[i][0] == 0 or matrix[0][j] == 0:\n                    matrix[i][j] = 0\n        # 处理第一行第一列\n        if first_row_zero:\n            for j in range(n):\n                matrix[0][j] = 0\n        if first_col_zero:\n            for i in range(m):\n                matrix[i][0] = 0"}, {"id": 240, "name": "搜索二维矩阵II", "difficulty": "中等", "insights": ["从左上角出发无法排除：往右往下都增大，两个方向都可能", "从右上角出发可以排除：往左减小往下增大，每次排除一行或一列", "为什么右上角是起点：它是一行最大一列最小，target大小唯一确定方向", "本质是BST：矩阵从右上角看就是一棵BST，左子树小右子树大"], "templateCode": "class Solution:\n    def searchMatrix(self, matrix: List[List[int]], target: int) -> bool:\n        # 模板：暴力遍历\n        for row in matrix:\n            for val in row:\n                if val == target:\n                    return True\n        return False", "optimizedCode": "class Solution:\n    def searchMatrix(self, matrix: List[List[int]], target: int) -> bool:\n        # 优化：从右上角出发，类似BST搜索\n        if not matrix or not matrix[0]:\n            return False\n        m, n = len(matrix), len(matrix[0])\n        i, j = 0, n - 1  # 右上角\n        while i < m and j >= 0:\n            if matrix[i][j] == target:\n                return True\n            elif matrix[i][j] > target:\n                j -= 1  # 往左，排除当前列\n            else:\n                i += 1  # 往下，排除当前行\n        return False"}, {"id": 75, "name": "颜色分类", "difficulty": "中等", "insights": ["只有三种值0/1/2：不需要通用排序，可以利用值域有限的特性", "荷兰国旗问题：三指针分区，将数组分成<1、=1、>1三段", "一次遍历的关键：p0指向0的右边界，p2指向2的左边界，curr扫描", "交换2时curr不前进：因为从p2换回来的可能是0或1，需要再检查"], "templateCode": "class Solution:\n    def sortColors(self, nums: List[int]) -> None:\n        # 模板：计数排序，两遍扫描\n        count = [0, 0, 0]\n        for num in nums:\n            count[num] += 1\n        idx = 0\n        for i in range(3):\n            for _ in range(count[i]):\n                nums[idx] = i\n                idx += 1", "optimizedCode": "class Solution:\n    def sortColors(self, nums: List[int]) -> None:\n        # 优化：荷兰国旗三指针，一次遍历\n        p0, curr, p2 = 0, 0, len(nums) - 1\n        while curr <= p2:\n            if nums[curr] == 0:\n                nums[p0], nums[curr] = nums[curr], nums[p0]\n                p0 += 1\n                curr += 1\n            elif nums[curr] == 2:\n                nums[curr], nums[p2] = nums[p2], nums[curr]\n                p2 -= 1\n                # curr不前进，换回来的数需要再检查\n            else:\n                curr += 1"}]}, {"category": "堆：动态有序集（优先队列/分治）", "categoryEssence": "堆动态维护集合的最值——插入和取最值都是O(log n)。", "template": {"title": "堆/优先队列统一框架", "explain": "<strong>选型</strong>：<br>• <strong>TopK</strong>：最小堆维护前K大，堆顶即第K大<br>• <strong>K路归并</strong>：最小堆每次取K个候选中的最小值<br>• <strong>滑动窗口中位数</strong>：双堆（大顶堆+小顶堆）<br>• <strong>调度问题</strong>：堆维护可用资源", "code": "import heapq\ndef top_k(nums, k):\n    heap = []\n    for num in nums:\n        heapq.heappush(heap, num)\n        if len(heap) > k:\n            heapq.heappop(heap)\n    return heap"}, "problems": [{"id": 215, "name": "数组中的第K个最大元素", "difficulty": "中等", "insights": ["排序取倒数第k个是O(nlogn)，但第k大不需要完全排序", "堆的直觉：维护大小为k的小顶堆，堆顶就是第k大", "快速选择：利用快排的partition，只递归包含答案的一侧，平均O(n)", "为什么平均O(n)：T(n)=T(n/2)+O(n)，展开是等比数列求和=2n"], "templateCode": "class Solution:\n    def findKthLargest(self, nums: List[int], k: int) -> int:\n        # 模板：排序后取倒数第k个\n        nums.sort()\n        return nums[-k]", "optimizedCode": "class Solution:\n    def findKthLargest(self, nums: List[int], k: int) -> int:\n        # 优化：快速选择，平均O(n)\n        import random\n        target = len(nums) - k  # 第k大=排序后第target个\n        def partition(lo, hi):\n            pivot = random.randint(lo, hi)\n            nums[pivot], nums[hi] = nums[hi], nums[pivot]\n            j = lo\n            for i in range(lo, hi):\n                if nums[i] <= nums[hi]:\n                    nums[i], nums[j] = nums[j], nums[i]\n                    j += 1\n            nums[j], nums[hi] = nums[hi], nums[j]\n            return j\n        lo, hi = 0, len(nums) - 1\n        while lo <= hi:\n            p = partition(lo, hi)\n            if p == target:\n                return nums[p]\n            elif p < target:\n                lo = p + 1\n            else:\n                hi = p - 1\n        return -1"}, {"id": 23, "name": "合并K个升序链表", "difficulty": "困难", "insights": ["朴素：两两合并，每次O(n)，共k次→O(kn)，链表越来越长更慢", "堆优化：把每个链表的头节点入堆，每次弹出最小并推入其后继", "分治合并：两两配对合并，每轮链表数减半，总共O(nlogk)", "堆vs分治：堆是增量式的，分治是递归式的，时间复杂度相同但常数不同"], "templateCode": "class Solution:\n    def mergeKLists(self, lists: List[Optional[ListNode]]) -> Optional[ListNode]:\n        # 模板：两两合并\n        if not lists:\n            return None\n        def merge(a, b):\n            dummy = ListNode(0)\n            cur = dummy\n            while a and b:\n                if a.val <= b.val:\n                    cur.next = a\n                    a = a.next\n                else:\n                    cur.next = b\n                    b = b.next\n                cur = cur.next\n            cur.next = a or b\n            return dummy.next\n        result = lists[0]\n        for i in range(1, len(lists)):\n            result = merge(result, lists[i])\n        return result", "optimizedCode": "class Solution:\n    def mergeKLists(self, lists: List[Optional[ListNode]]) -> Optional[ListNode]:\n        # 优化：最小堆，每次取最小节点，O(nlogk)\n        import heapq\n        heap = []\n        # 用index区分不同链表节点（val相同时比较用）\n        for i, node in enumerate(lists):\n            if node:\n                heapq.heappush(heap, (node.val, i, node))\n        dummy = ListNode(0)\n        cur = dummy\n        while heap:\n            val, i, node = heapq.heappop(heap)\n            cur.next = node\n            cur = cur.next\n            if node.next:\n                heapq.heappush(heap, (node.next.val, i, node.next))\n        return dummy.next"}, {"id": 169, "name": "多数元素", "difficulty": "简单", "insights": ["约束的本质：多数元素>n/2次，意味着它比所有其他元素之和还多", "配对消除思想：把每个多数元素和一个非多数元素配对抵消，多数元素一定有剩余", "为什么不是哈希计数：>n/2这个约束强到不需要全记——只需维护当前谁领先", "Boyer-Moore的本质：维护候选者+计数器，遇同+1异-1，归零换人，等价在线配对消除"], "templateCode": "class Solution:\n    def majorityElement(self, nums: List[int]) -> int:\n        # 模板：哈希计数，找出现超过n/2次的元素\n        from collections import Counter\n        count = Counter(nums)\n        n = len(nums)\n        for num, cnt in count.items():\n            if cnt > n // 2:\n                return num\n        return -1", "optimizedCode": "class Solution:\n    def majorityElement(self, nums: List[int]) -> int:\n        # 优化：Boyer-Moore投票法，O(1)空间\n        candidate = None\n        count = 0\n        for num in nums:\n            if count == 0:\n                candidate = num\n                count = 1\n            elif num == candidate:\n                count += 1\n            else:\n                count -= 1\n        return candidate"}, {"id": 287, "name": "寻找重复数", "difficulty": "中等", "insights": ["鸽巢原理保证存在性：n+1个数塞进[1,n]的n个坑，至少一个坑里有俩", "约束排除了朴素解法：哈希违反O(1)空间，排序违反不可修改，双重循环违反<O(n²)", "值域二分：不操作数组本身，对答案范围做二分", "数组即链表：nums[i]在[1,n]内可看作指针i→nums[i]，重复值=环的入口", "Floyd龟兔：快慢指针第一次相遇后，再从起点走必在环入口相遇"], "templateCode": "class Solution:\n    def findDuplicate(self, nums: List[int]) -> int:\n        # 模板：值域二分，统计<=mid的个数\n        left, right = 1, len(nums) - 1\n        while left < right:\n            mid = (left + right) // 2\n            cnt = sum(1 for x in nums if x <= mid)\n            if cnt > mid:\n                right = mid\n            else:\n                left = mid + 1\n        return left", "optimizedCode": "class Solution:\n    def findDuplicate(self, nums: List[int]) -> int:\n        # 优化：Floyd环检测，O(1)空间O(n)时间\n        slow = fast = 0\n        # 第一次相遇\n        while True:\n            slow = nums[slow]\n            fast = nums[nums[fast]]\n            if slow == fast:\n                break\n        # 从起点和相遇点同时走，在环入口相遇\n        slow = 0\n        while slow != fast:\n            slow = nums[slow]\n            fast = nums[fast]\n        return slow"}]}];
</script>
<script>
const emojis = ['📈','🕸️','🌳','💰','🧮','🔗','📚','🔍','💡','🔲','⛰️','🌊','🪟','📌','📌'];
const categories = categoriesData;

let total=0,easy=0,med=0,hard=0;
categories.forEach(c=>c.problems.forEach(p=>{total++;if(p.difficulty==='Easy')easy++;else if(p.difficulty==='Hard')hard++;else med++;}));
document.getElementById('totalCount').textContent=total;
document.getElementById('catCount').textContent=categories.length;
document.getElementById('easyCount').textContent=easy;
document.getElementById('medCount').textContent=med;
document.getElementById('hardCount').textContent=hard;

const navEl=document.getElementById('sidebarNav');
categories.forEach((c,i)=>{
  const div=document.createElement('div');
  div.className='cat-link';
  div.innerHTML='<span class="ce">'+(emojis[i]||'📌')+'</span><span style="flex:1">'+c.category+'</span><span class="cc">'+c.problems.length+'</span>';
  div.onclick=()=>{document.getElementById('cat-'+i)?.scrollIntoView({behavior:'smooth',block:'start'});closeMobile()};
  navEl.appendChild(div);
  c.problems.forEach(p=>{
    const a=document.createElement('div');
    a.className='prob-link';
    a.textContent=p.id+'. '+p.name;
    a.onclick=()=>{document.getElementById('p-'+p.id)?.scrollIntoView({behavior:'smooth',block:'start'});closeMobile()};
    navEl.appendChild(a);
  });
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function copyCode(btn){
  const code=btn.closest('.code-section').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='已复制 ✓';setTimeout(()=>btn.textContent='复制',1500)});
}

const contentEl=document.getElementById('content');
categories.forEach((c,ci)=>{
  const sec=document.createElement('div');
  sec.className='category';sec.id='cat-'+ci;
  let h='<h2>'+(emojis[ci]||'📌')+' '+c.category+'</h2>';
  h+='<div class="cat-essence">'+c.categoryEssence+'</div>';
  
  // Template box
  const t=c.template;
  h+='<div class="template-box"><div class="template-header"><span class="title">📐 '+t.title+'</span><span class="tag">统一框架</span></div>';
  h+='<div class="template-explain">'+t.explain+'</div>';
  h+='<div class="template-code"><pre><code class="language-python">'+esc(t.code)+'</code></pre></div></div>';
  
  // Problems
  c.problems.forEach(p=>{
    const dc=p.difficulty==='Easy'?'easy':p.difficulty==='Hard'?'hard':'medium';
    h+='<div class="problem-card" id="p-'+p.id+'" data-id="'+p.id+'" data-name="'+esc(p.name)+'" data-insights="'+esc((p.insights||[]).join(' '))+'">';
    h+='<div class="problem-header"><span class="pid">#'+p.id+'</span><span class="pname">'+p.name+'</span><span class="diff '+dc+'">'+p.difficulty+'</span><span class="arrow">▶</span></div>';
    h+='<div class="problem-body">';
    
    // Insights
    if(p.insights&&p.insights.length){
      h+='<div class="insight-box"><div class="label">🎯 关键洞察</div><ul>';
      p.insights.forEach(ins=>{h+='<li>'+esc(ins)+'</li>'});
      h+='</ul></div>';
    }
    
    // Template code
    if(p.templateCode){
      h+='<div class="code-section"><div class="code-header"><span class="code-label template-label">📝 模板解法</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre><code class="language-python">'+esc(p.templateCode)+'</code></pre></div>';
    }
    
    // Optimized code
    if(p.optimizedCode){
      h+='<div class="code-section"><div class="code-header"><span class="code-label optimized-label">⚡ 优化解法</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre><code class="language-python">'+esc(p.optimizedCode)+'</code></pre></div>';
    }
    
    h+='</div></div>';
  });
  
  sec.innerHTML=h;
  sec.querySelectorAll('.template-code pre code').forEach(b=>hljs.highlightElement(b));
  sec.querySelectorAll('.problem-header').forEach(hdr=>{
    hdr.onclick=()=>{
      const card=hdr.parentElement;
      card.classList.toggle('open');
      if(card.classList.contains('open')&&!card.dataset.hl){
        card.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
        card.dataset.hl='1';
      }
    };
  });
  contentEl.appendChild(sec);
});

document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  document.querySelectorAll('.problem-card').forEach(card=>{
    const m=!q||card.dataset.id.includes(q)||card.dataset.name.toLowerCase().includes(q)||card.dataset.insights.toLowerCase().includes(q);
    card.style.display=m?'':'none';
  });
  document.querySelectorAll('.category').forEach(sec=>{
    const v=sec.querySelectorAll('.problem-card:not([style*="display: none"])');
    sec.style.display=v.length?'':'none';
  });
});

const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const i=e.target.id.replace('cat-','');document.querySelectorAll('.cat-link').forEach((l,li)=>l.classList.toggle('active',li==i))}})},{threshold:.1});
categories.forEach((_,i)=>{const el=document.getElementById('cat-'+i);if(el)obs.observe(el)});

window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  document.getElementById('progressBar').style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100+'%';
  document.getElementById('backTop').classList.toggle('visible',h.scrollTop>400);
});
document.getElementById('backTop').onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

function closeMobile(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}
document.getElementById('menuToggle').onclick=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show')};
document.getElementById('sidebarOverlay').onclick=closeMobile;

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=Math.abs(e.changedTouches[0].clientY-ty);if(dy>60)return;if(tx<30&&dx>60)document.getElementById('sidebar').classList.add('open');else if(dx<-60&&document.getElementById('sidebar').classList.contains('open'))closeMobile()},{passive:true});
</script>
</body>
</html>
